<script>
const questionsData = [
{ num:1, q:"Схема процесса передачи информации. Понятия: система электросвязи, линия связи, канал связи. Модели: AWGN, многолучевой.",
  short:`<p><strong>Кратко:</strong> Инфо → сообщение → эл. сигнал → радиосигнал → канал+помехи → приём → сообщение. AWGN – белый шум. Многолучевой – отражения.</p>`,
  full:`<p><strong>Схема передачи информации:</strong></p><div class="svg-container"><svg width="700" height="180" viewBox="0 0 700 180"><rect x="10" y="70" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="45" y="94" font-size="11" text-anchor="middle">Источник</text><line x1="80" y1="90" x2="110" y2="90" stroke="#0077b6" stroke-width="1.5"/><rect x="110" y="70" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="150" y="94" font-size="11" text-anchor="middle">Кодер</text><line x1="190" y1="90" x2="220" y2="90" stroke="#0077b6"/><rect x="220" y="70" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="260" y="94" font-size="11" text-anchor="middle">Модулятор</text><line x1="300" y1="90" x2="330" y2="90" stroke="#0077b6"/><rect x="330" y="70" width="80" height="40" fill="#ffe0e0" stroke="#b60000" rx="6"/><text x="370" y="94" font-size="11" text-anchor="middle">Канал+Помехи</text><line x1="410" y1="90" x2="440" y2="90" stroke="#0077b6"/><rect x="440" y="70" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="480" y="94" font-size="11" text-anchor="middle">Демодулятор</text><line x1="520" y1="90" x2="550" y2="90" stroke="#0077b6"/><rect x="550" y="70" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="585" y="94" font-size="11" text-anchor="middle">Получатель</text><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0077b6"/></marker></defs></svg></div><p><strong>Понятия:</strong> Система электросвязи – техника+среда. Линия – физическая среда. Канал – линия+шумы+обработка.</p><p><strong>Модели:</strong> AWGN: r(t)=s(t)+n(t); многолучевой: r(t)=Σ aₖ·s(t-τₖ)+n(t).</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО + МНОГОЛУЧЕВОЙ КАНАЛ:</strong></p><div class="svg-container"><svg width="600" height="180" viewBox="0 0 600 180"><rect x="20" y="70" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="60" y="94" font-size="12" text-anchor="middle">Передатчик</text><line x1="100" y1="90" x2="130" y2="90" stroke="#0077b6"/><path d="M130 90 L180 50 L230 90 L280 130 L330 90" stroke="#ff9900" fill="none" stroke-dasharray="4,3"/><circle cx="180" cy="50" r="4" fill="#ff9900"/><circle cx="280" cy="130" r="4" fill="#ff9900"/><line x1="330" y1="90" x2="360" y2="90" stroke="#0077b6"/><rect x="360" y="70" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="400" y="94" font-size="12" text-anchor="middle">Приёмник</text><text x="230" y="30" font-size="11" fill="#ff9900" text-anchor="middle">Многолучевость (отражения)</text></svg></div><p><strong>AWGN:</strong> спектральная плотность N₀/2, автокорреляция (N₀/2)·δ(τ). <strong>Многолучевой:</strong> частотно-селективные замирания, RAKE-приёмник, OFDM.</p>`
},
{ num:2, q:"Классификация видов сигналов: по виду передаваемого сообщения, по форме сигнала во временной области, по способам математического представления и характеру физического процесса (случайный / неслучайный).",
  short:`<p><strong>По виду сообщения:</strong> речь, музыка, текст, изображение, видео.<br><strong>По форме:</strong> аналоговый, дискретный, цифровой.<br><strong>По мат. представлению:</strong> детерминированный / случайный.<br><strong>По характеру:</strong> случайный / неслучайный.</p>`,
  full:`<p><strong>1. По виду сообщения:</strong> речь (300-3400 Гц), музыка (20-20000 Гц), текст, изображение, видео.</p><p><strong>2. По форме во времени:</strong> аналоговый (непрерывный), дискретный (отсчёты), цифровой (квантованный).</p><p><strong>3. По мат. представлению:</strong> детерминированный – точная формула; случайный – вероятностные характеристики.</p><p><strong>4. По характеру процесса:</strong> случайный (шум) / неслучайный (синус, меандр).</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> Аналоговый: s(t)=A·cos(ωt+φ). Дискретный: s[n]=A·cos(2πFn+φ). Детерминированный: энергия E=∫|s|²dt, спектр S(f). Случайный: матожидание m(t), дисперсия D(t), корреляция B(τ). Примеры: синус (детерм.), белый шум (случайный).</p><div class="svg-container"><svg width="500" height="120" viewBox="0 0 500 120"><path d="M20 60 L70 20 L120 60 L170 100 L220 60" fill="none" stroke="#0077b6" stroke-width="2"/><text x="120" y="115" font-size="10" text-anchor="middle">Аналоговый</text><path d="M270 60 L290 30 L310 60 L330 90 L350 60" fill="none" stroke="#e67e22" stroke-width="2"/><text x="380" y="60" font-size="10" fill="#e67e22">Дискретные отсчёты ●</text></svg></div>`
},
{ num:3, q:"Виды сигналов: узкополосные (bandpass), низкочастотные (baseband), сложные. Одномерные и многомерные. Параметры сигналов. База сигнала.",
  short:`<p><strong>Baseband</strong> – спектр от 0. <strong>Bandpass</strong> – вокруг несущей. <strong>База B=T·Δf</strong>. Простые B≈1, сложные B>>1.</p>`,
  full:`<p><strong>Спектры baseband и bandpass:</strong></p><div class="svg-container"><svg width="600" height="200" viewBox="0 0 600 200"><line x1="50" y1="160" x2="550" y2="160" stroke="#333" stroke-width="1.5"/><line x1="50" y1="30" x2="50" y2="170" stroke="#333"/><path d="M80 150 L120 150 L140 60 L180 150 L220 150" fill="#7fb3d5" opacity="0.6" stroke="#2c6e9e" stroke-width="1.5"/><text x="150" y="180" font-size="12" text-anchor="middle">Baseband</text><path d="M350 150 L380 70 L410 150 L440 150 L470 70 L500 150" fill="#d5987f" opacity="0.6" stroke="#b64a1a" stroke-width="1.5"/><text x="425" y="180" font-size="12" text-anchor="middle">Bandpass вокруг f₀</text></svg></div><p><strong>База:</strong> B = T × Δf. B≈1 – простой (прямоугольный импульс). B>>1 – сложный (шумоподобный, выигрыш G=10·log₁₀(B) дБ).</p>`,
  detailed:`<p><strong>ПОДРОБНО + ГРАФИКИ:</strong> Параметры: длительность T, ширина спектра Δf, динамический диапазон, пиковая/средняя мощность. База – число степеней свободы. Пример: M-последовательность с B=1023 даёт выигрыш 30 дБ.</p><div class="svg-container"><svg width="400" height="150" viewBox="0 0 400 150"><rect x="30" y="30" width="140" height="90" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="100" y="60" font-size="12" text-anchor="middle" font-weight="bold">Простой B≈1</text><text x="100" y="90" font-size="11" text-anchor="middle">∆f·T ≈ 1</text><rect x="220" y="30" width="140" height="90" fill="#ffe0cc" stroke="#e67e22" rx="6"/><text x="290" y="60" font-size="12" text-anchor="middle" font-weight="bold">Сложный B≫1</text><text x="290" y="90" font-size="11" text-anchor="middle">∆f·T = 100…10000</text></svg></div>`
},
{ num:4, q:"Структурная схема современной системы передачи информации. Суть обработки сообщений или сигналов в каждом из ее элементов.",
  short:`<p>Источник → кодер источника (сжатие) → канальный кодер (избыточность) → модулятор → канал → демодулятор → канальный декодер → декодер источника → получатель.</p>`,
  full:`<p><strong>Схема с пояснениями:</strong></p><div class="svg-container"><svg width="800" height="200" viewBox="0 0 800 200"><rect x="10" y="80" width="60" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="40" y="104" font-size="10" text-anchor="middle">ИИ</text><line x1="70" y1="100" x2="95" y2="100" stroke="#0077b6"/><rect x="95" y="70" width="80" height="60" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="135" y="92" font-size="9" text-anchor="middle">Кодер</text><text x="135" y="106" font-size="8" text-anchor="middle">источника</text><line x1="175" y1="100" x2="200" y2="100" stroke="#0077b6"/><rect x="200" y="70" width="80" height="60" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="240" y="92" font-size="9" text-anchor="middle">Канальный</text><text x="240" y="106" font-size="8" text-anchor="middle">кодер</text><line x1="280" y1="100" x2="305" y2="100" stroke="#0077b6"/><rect x="305" y="80" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="340" y="104" font-size="10" text-anchor="middle">Модулятор</text><line x1="375" y1="100" x2="400" y2="100" stroke="#0077b6"/><rect x="400" y="80" width="70" height="40" fill="#ffe0e0" stroke="#b60000" rx="6"/><text x="435" y="104" font-size="10" text-anchor="middle">Канал</text><line x1="470" y1="100" x2="495" y2="100" stroke="#0077b6"/><rect x="495" y="80" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="530" y="104" font-size="10" text-anchor="middle">Демод</text><line x1="565" y1="100" x2="590" y2="100" stroke="#0077b6"/><rect x="590" y="70" width="80" height="60" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="630" y="92" font-size="9" text-anchor="middle">Канальный</text><text x="630" y="106" font-size="8" text-anchor="middle">декодер</text><line x1="670" y1="100" x2="695" y2="100" stroke="#0077b6"/><rect x="695" y="70" width="80" height="60" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="735" y="92" font-size="9" text-anchor="middle">Декодер</text><text x="735" y="106" font-size="8" text-anchor="middle">источника</text></svg></div><p><strong>Суть:</strong> кодирование источника – сжатие; канальное кодирование – защита от ошибок; модуляция – перенос на несущую.</p>`,
  detailed:`<p><strong>ПОЛНОСТЬЮ:</strong> Каждый блок описан: ИИ (текст/голос) → АЦП → кодер источника (MP3, JPEG) → канальный кодер (турбокод, LDPC) → перемежитель → модулятор (BPSK/QAM) → формирователь импульсов → квадратурный смеситель → УМ → линия связи → LNA → квадратурный демодулятор → демодулятор (LLR) → деинтерлейвер → канальный декодер (Витерби) → декодер источника → ЦАП → получатель.</p>`
},
{ num:5, q:"Помехи в канале связи, виды источников помех, классификация видов помех, примеры. Узкополосная, сосредоточенная помеха. Заградительная помеха. Повышение помехоустойчивости канала связи.",
  short:`<p><strong>Источники:</strong> грозы, другие передатчики, тепловой шум. <strong>Узкополосная</strong> – Δf_п << Δf_с. <strong>Сосредоточенная</strong> – синусоидальная. <strong>Заградительная</strong> – перекрывает всю полосу. <strong>Методы:</strong> кодирование, расширение спектра, фильтрация.</p>`,
  full:`<p><strong>Классификация:</strong> по спектру (узкополосные/широкополосные), по длительности (непрерывные/импульсные), по происхождению.</p><div class="svg-container"><svg width="600" height="140" viewBox="0 0 600 140"><rect x="20" y="20" width="160" height="100" fill="#ffe0e0" stroke="#b60000" rx="8"/><text x="100" y="50" font-size="12" text-anchor="middle" font-weight="bold">Узкополосная</text><text x="100" y="70" font-size="10" text-anchor="middle">синус 100.1 МГц</text><text x="100" y="90" font-size="10" text-anchor="middle">Δf_п = 100 Гц</text><text x="100" y="110" font-size="10" text-anchor="middle">Δf_с = 100 кГц</text><rect x="220" y="20" width="160" height="100" fill="#fff0cc" stroke="#e67e22" rx="8"/><text x="300" y="50" font-size="12" text-anchor="middle" font-weight="bold">Сосредоточенная</text><text x="300" y="70" font-size="10" text-anchor="middle">CW (синус)</text><text x="300" y="90" font-size="10" text-anchor="middle">одна частота</text><rect x="420" y="20" width="160" height="100" fill="#d0e8f0" stroke="#0077b6" rx="8"/><text x="500" y="50" font-size="12" text-anchor="middle" font-weight="bold">Заградительная</text><text x="500" y="70" font-size="10" text-anchor="middle">намеренно широкая</text><text x="500" y="90" font-size="10" text-anchor="middle">перекрывает сигнал</text></svg></div><p><strong>Помехоустойчивость:</strong> LDPC, турбокоды, DSSS (выигрыш G=B), FHSS, MIMO, ARQ, адаптивная модуляция.</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> Тепловой шум N₀=kT; дробовой шум; фликкер-шум 1/f. Узкополосная: синусоидальная помеха от соседнего передатчика. Заградительная: РЭБ – генератор шума в полосе 20 МГц. Методы: свёрточные коды + Витерби (4-6 дБ), турбокоды (приближение к Шеннону), LDPC (DVB-S2, 5G). DSSS: каждый бит умножается на ПСП, выигрыш G=T_b/T_c. FHSS: 1600 хоп/с в Bluetooth.</p>`
},
{ num:6, q:"Примеры представления сигналов математическими выражениями. Запись аналогового и дискретного гармонического сигнала. Отличие в математическом описании детерминированных и случайных сигналов.",
  short:`<p><strong>Аналоговый:</strong> s(t)=A·cos(2πft+φ). <strong>Дискретный:</strong> s[n]=A·cos(2πFn+φ). <strong>Детерминированный</strong> – точная формула. <strong>Случайный</strong> – вероятностное описание.</p>`,
  full:`<p><strong>Аналоговый гармонический:</strong> s(t)=A·cos(2πf₀t+φ). <strong>Дискретный:</strong> s[n]=A·cos(2πf₀nT+φ)=A·cos(2πFn+φ), где F=f₀/f_д.</p><p><strong>Детерминированные:</strong> s(t)=sinc(πt/τ), можно вычислить энергию и спектр. <strong>Случайные:</strong> n(t) ~ N(0,σ²), описываются плотностью p(x), матожиданием, дисперсией, корреляцией.</p>`,
  detailed:`<p><strong>ПОДРОБНО:</strong> Аналоговый: s(t)=10·cos(2000πt+π/6). Дискретный при f_д=8 кГц: s[n]=10·cos(2π·1000·n/8000+π/6)=10·cos(0.25πn+π/6). Детерминированный: E=∫|s|²dt, S(f)=∫s(t)e^{-j2πft}dt. Случайный: стационарный процесс с B(τ)=E[X(t)X(t+τ)], спектральная плотность G(f)=∫B(τ)e^{-j2πfτ}dτ (Винера-Хинчина).</p><div class="formula">E = ∫_{-∞}^{∞} |s(t)|² dt = ∫_{-∞}^{∞} |S(f)|² df</div>`
},
{ num:7, q:"Энергия и мощность сигналов, понятие энергетических и мощностных сигналов. Взаимная энергия ортогональных сигналов.",
  short:`<p><strong>Энергия:</strong> E=∫|s|²dt. <strong>Мощность:</strong> P=lim 1/T∫|s|²dt. Энергетический – конечная E. Мощностной – конечная P. Ортогональные: ∫s₁s₂dt=0.</p>`,
  full:`<p><strong>Энергетический сигнал:</strong> E конечна (одиночный импульс). <strong>Мощностной сигнал:</strong> P>0 (синусоида, последовательность импульсов). Взаимная энергия ортогональных сигналов равна нулю: ∫s₁(t)s₂(t)dt=0.</p><div class="formula">E = ∫|s(t)|² dt, P = lim_{T→∞} (1/T)∫_{-T/2}^{T/2} |s(t)|² dt</div>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> Для s(t)=A·rect(t/τ) → E=A²τ. Для s(t)=A·cos(ωt) → P=A²/2. Ортогональность: sin(2πk t/T) и cos(2πm t/T) на интервале [0,T] ортогональны. Применение: CDMA (коды Уолша), OFDM (поднесущие).</p><div class="svg-container"><svg width="400" height="120" viewBox="0 0 400 120"><path d="M30 60 L80 20 L130 60 L180 100 L230 60" fill="none" stroke="#0077b6" stroke-width="2"/><text x="130" y="115" font-size="10" text-anchor="middle">s₁(t)</text><path d="M230 60 L280 40 L330 80 L380 50" fill="none" stroke="#e67e22" stroke-width="2"/><text x="305" y="35" font-size="10" fill="#e67e22">s₂(t)</text><text x="200" y="30" font-size="10" fill="#2e7d32">∫ s₁·s₂ = 0</text></svg></div>`
},
{ num:8, q:"Классификация способов представления сигналов. Векторное представление сигналов. Обобщенный ряд Фурье, его необходимость.",
  short:`<p>Способы: временное, спектральное, векторное. Векторное: сигнал как точка в многомерном пространстве. Обобщённый ряд Фурье: разложение по ортогональному базису.</p>`,
  full:`<p><strong>Векторное представление:</strong> s(t)=∑ c_k ψ_k(t), где ψ_k – ортонормированный базис. Координаты c_k = ∫ s(t) ψ_k(t) dt. <strong>Обобщённый ряд Фурье</strong> нужен для анализа, сжатия, передачи сигналов. Пример: разложение по sin/cos – классический ряд Фурье.</p>`,
  detailed:`<p><strong>ПОДРОБНО:</strong> Базис может быть из полиномов Лежандра, функций Уолша, вейвлетов. Векторное представление позволяет вычислять расстояние между сигналами (энергию разности). Используется в демодуляции QAM: сигнальное созвездие – это векторное представление в двумерном пространстве I/Q.</p><div class="svg-container"><svg width="300" height="200" viewBox="0 0 300 200"><line x1="30" y1="170" x2="270" y2="170" stroke="#333"/><line x1="150" y1="30" x2="150" y2="190" stroke="#333"/><circle cx="90" cy="130" r="6" fill="#0077b6"/><text x="85" y="125" font-size="10">c₁</text><circle cx="210" cy="100" r="6" fill="#0077b6"/><text x="215" y="95" font-size="10">c₂</text><text x="150" y="195" font-size="10" text-anchor="middle">Базисные функции</text></svg></div>`
},
{ num:9, q:"Ортогональность сигналов. Ортонормированный базис. Примеры использования ортогональных сигналов в области связи.",
  short:`<p>Ортогональны если ∫s₁·s₂=0. Ортонормированный базис – ортогональные функции с единичной нормой. Примеры: OFDM, CDMA, I/Q.</p>`,
  full:`<p><strong>Ортогональность:</strong> ∫_a^b s_i(t)s_j(t)dt=0 при i≠j. <strong>Ортонормированный базис:</strong> дополнительно ∫ψ_k²=1. Примеры: sin/cos разных частот, коды Уолша в CDMA, поднесущие OFDM (разнос Δf=1/T).</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> В OFDM поднесущие exp(j2πkΔf t) ортогональны на интервале T при Δf=1/T. В CDMA коды с нулевой взаимной корреляцией позволяют передавать несколько пользователей одновременно. Квадратурные составляющие I и Q ортогональны, что даёт QAM.</p><div class="svg-container"><svg width="400" height="150" viewBox="0 0 400 150"><path d="M30 80 L80 30 L130 80 L180 130 L230 80" fill="none" stroke="#0077b6" stroke-width="2"/><text x="130" y="25" font-size="10" fill="#0077b6">sin(2πft)</text><path d="M230 80 L280 50 L330 80 L380 110 L430 80" fill="none" stroke="#e67e22" stroke-width="2"/><text x="330" y="45" font-size="10" fill="#e67e22">cos(2πft)</text><text x="200" y="140" font-size="11" text-anchor="middle">Ортогональны на периоде</text></svg></div>`
},
{ num:10, q:"Понятие спектра сигнала. Спектральный анализ периодических сигналов.",
  short:`<p>Спектр – разложение по частотам. Для периодических – ряд Фурье: дискретные гармоники на частотах k·f₀.</p>`,
  full:`<p><strong>Периодический сигнал:</strong> s(t)=∑ C_k e^{j2πk f₀ t}, f₀=1/T. Спектр – гребёнка дельт на частотах kf₀. Амплитудный спектр – |C_k|. Пример: меандр – только нечётные гармоники.</p><div class="svg-container"><svg width="500" height="150" viewBox="0 0 500 150"><line x1="50" y1="130" x2="450" y2="130" stroke="#333"/><line x1="50" y1="20" x2="50" y2="140" stroke="#333"/><line x1="80" y1="130" x2="80" y2="60" stroke="#0077b6" stroke-width="3"/><line x1="130" y1="130" x2="130" y2="100" stroke="#0077b6" stroke-width="3"/><line x1="180" y1="130" x2="180" y2="50" stroke="#0077b6" stroke-width="3"/><line x1="230" y1="130" x2="230" y2="110" stroke="#0077b6" stroke-width="3"/><line x1="280" y1="130" x2="280" y2="90" stroke="#0077b6" stroke-width="3"/><text x="50" y="150" font-size="10" text-anchor="middle">f₀</text><text x="130" y="150" font-size="10" text-anchor="middle">2f₀</text><text x="180" y="150" font-size="10" text-anchor="middle">3f₀</text></svg></div>`,
  detailed:`<p><strong>ПОДРОБНО:</strong> Коэффициенты C_k = (1/T)∫_0^T s(t)e^{-j2πk f₀ t}dt. Для меандра со скважностью 2: C_k = 0 при чётных k. Спектральный анализ используется для измерения гармоник, расчёта фильтров.</p>`
},
{ num:11, q:"Понятие спектра сигнала. Спектральный анализ непериодических сигналов.",
  short:`<p>Непериодический – спектр непрерывный. Прямое преобразование Фурье: S(f)=∫ s(t) e^{-j2πft} dt.</p>`,
  full:`<p><strong>Преобразование Фурье:</strong> S(f)=∫_{-∞}^{∞} s(t)e^{-j2πft}dt. Обратное: s(t)=∫_{-∞}^{∞} S(f)e^{j2πft}df. Спектр – непрерывная функция частоты. Пример: прямоугольный импульс – S(f)=Aτ·sinc(πfτ).</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> Для одиночного прямоугольного импульса S(f)=Aτ·sin(πfτ)/(πfτ). Ширина главного лепестка по нулям 2/τ. Теорема Парсеваля: ∫|s|²dt = ∫|S(f)|²df. Преобразование Фурье – основа спектрального анализа, фильтрации, модуляции.</p><div class="svg-container"><svg width="500" height="150" viewBox="0 0 500 150"><line x1="50" y1="130" x2="450" y2="130" stroke="#333"/><line x1="50" y1="20" x2="50" y2="140" stroke="#333"/><path d="M80 130 L150 130 L200 50 L250 130 L320 130" fill="none" stroke="#0077b6" stroke-width="2"/><text x="200" y="40" font-size="10" text-anchor="middle">|S(f)|</text><text x="230" y="145" font-size="10" text-anchor="middle">f</text></svg></div>`
},
{ num:12, q:"Понятие спектра сигнала. Амплитудный спектр последовательности прямоугольных импульсов, меандрового сигнала, пилообразного сигнала.",
  short:`<p>Последовательность прямоугольников – огибающая sinc. Меандр – только нечётные гармоники. Пила – спад ~1/k.</p>`,
  full:`<p><strong>Прямоугольные импульсы:</strong> |C_k| = (Aτ/T)·|sinc(πkτ/T)|. <strong>Меандр (τ=T/2):</strong> чётные гармоники отсутствуют. <strong>Пилообразный:</strong> |C_k| = A/(π|k|) для k≠0 – медленный спад.</p>`,
  detailed:`<p><strong>СПЕКТРЫ:</strong> Для меандра 100 Гц гармоники на 100,300,500... Гц, амплитуды падают как 1/k. Для пилы высокие частоты затухают медленнее (1/k), что даёт больше помех.</p><div class="svg-container"><svg width="500" height="140" viewBox="0 0 500 140"><line x1="30" y1="120" x2="470" y2="120" stroke="#333"/><line x1="30" y1="20" x2="30" y2="130" stroke="#333"/><line x1="60" y1="120" x2="60" y2="40" stroke="#0077b6" stroke-width="3"/><line x1="110" y1="120" x2="110" y2="90" stroke="#0077b6" stroke-width="3"/><line x1="160" y1="120" x2="160" y2="50" stroke="#0077b6" stroke-width="3"/><text x="60" y="135" font-size="10" text-anchor="middle">f₀</text><text x="110" y="135" font-size="10" text-anchor="middle">3f₀</text><text x="160" y="135" font-size="10" text-anchor="middle">5f₀</text><text x="250" y="30" font-size="11" fill="#0077b6">Меандр: нет чётных</text></svg></div>`
},
{ num:13, q:"Понятие спектра сигнала. Спектр одиночного прямоугольный импульса, одиночного меандрового импульса, пилообразного сигнала, радиоимпульса.",
  short:`<p>Одиночный прямоугольный – sinc. Радиоимпульс – sinc, перенесённый на несущую. Пила – спад ~1/f.</p>`,
  full:`<p><strong>Прямоугольный импульс:</strong> S(f)=Aτ·sinc(πfτ). <strong>Радиоимпульс:</strong> s(t)=A·rect(t/τ)·cos(2πf₀t) → спектр – два sinc-лепестка вокруг ±f₀, ширина ~2/τ.</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> Для радиоимпульса S(f) = (Aτ/2)[sinc(π(f-f₀)τ) + sinc(π(f+f₀)τ)]. Применяется в радиолокации и цифровой связи (импульсные системы). Видеоимпульс (baseband) занимает полосу ~1/τ, радиоимпульс – ~2/τ.</p>`
},
{ num:14, q:"Спектральная плотность энергии и мощности. Теорема Парсеваля.",
  short:`<p>Спектральная плотность энергии: |S(f)|². Теорема Парсеваля: ∫|s|²dt = ∫|S(f)|²df – сохранение энергии.</p>`,
  full:`<p><strong>Для энергетических сигналов:</strong> G(f)=|S(f)|² (Дж/Гц). <strong>Для мощностных:</strong> G_p(f)=lim_{T→∞} |S_T(f)|²/T. <strong>Теорема Парсеваля:</strong> энергия во времени = интеграл квадрата спектра.</p>`,
  detailed:`<p><strong>ФИЗИЧЕСКИЙ СМЫСЛ:</strong> сколько энергии сигнала лежит в полосе Δf около f. Теорема Парсеваля: E = ∫|s(t)|²dt = ∫|S(f)|²df. Для рядов Фурье: средняя мощность = ∑|C_k|². Используется при расчёте шумовой полосы.</p><div class="formula">∫_{-∞}^{∞} |s(t)|² dt = ∫_{-∞}^{∞} |S(f)|² df</div>`
},
{ num:15, q:"Понятие эффективной (практической) ширины спектра. Критерии ее определения. Связь между длительностью сигнала и шириной спектра, примеры для прямоугольного импульса.",
  short:`<p>Эффективная Δf – полоса, содержащая 90% энергии. Для прямоугольного импульса Δf·τ ≈ 0,5…1. Принцип неопределённости.</p>`,
  full:`<p><strong>Критерии:</strong> по уровню -3 дБ, по интегралу 90% энергии. Для прямоугольного импульса Δf·τ ≈ 0,44 (по половинной мощности) или 1 (по нулям). Укорочение импульса расширяет спектр.</p>`,
  detailed:`<p><strong>ПРИНЦИП НЕОПРЕДЕЛЁННОСТИ:</strong> Δt·Δf ≥ 1/(4π) для гауссовых сигналов. Для прямоугольного Δf_нули = 2/τ, Δf_3dB ≈ 0,89/τ. Используется при расчёте межсимвольной интерференции.</p><div class="formula">Δf · τ ≈ 1</div>`
},
{ num:16, q:"Спектр радиоимпульса и видеоимпульса. Взаимосвязь длительности импульса с шириной его спектра.",
  short:`<p>Видеоимпульс – спектр от 0 до ~1/τ. Радиоимпульс – спектр вокруг f₀ шириной ~2/τ. Чем короче, тем шире.</p>`,
  full:`<p><strong>Видеоимпульс:</strong> baseband, ширина Δf≈1/τ. <strong>Радиоимпульс:</strong> bandpass, Δf≈2/τ. Соотношение Δf·τ ≈ 1 для радиоимпульса.</p>`,
  detailed:`<p><strong>ПРИМЕР:</strong> τ=1 мкс → видеоимпульс занимает ~1 МГц, радиоимпульс на f₀=100 МГц занимает 2 МГц (от 99 до 101 МГц). Основа импульсных систем: высокое разрешение по времени требует широкой полосы.</p>`
},
{ num:17, q:"Автокорреляционная функция детерминированного сигнала, ее свойства. Коэффициент корреляции.",
  short:`<p>АКФ B(τ)=∫ s(t)s(t+τ)dt. Свойства: чётность, B(0)=энергия, |B(τ)|≤B(0). Коэффициент корреляции ρ(τ)=B(τ)/B(0).</p>`,
  full:`<p><strong>АКФ:</strong> B(τ)=∫_{-∞}^{∞} s(t)s(t+τ)dt. Свойства: 1) B(0)=E; 2) B(-τ)=B(τ); 3) |B(τ)| ≤ B(0). Коэффициент корреляции ρ(τ)=B(τ)/B(0) – мера похожести сигнала с самим собой при сдвиге.</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> Для sinc-импульса АКФ – тоже sinc. Для шумоподобного сигнала (m-последовательность) АКФ имеет узкий пик и низкие боковые лепестки – используется в DSSS для синхронизации.</p><div class="svg-container"><svg width="400" height="150" viewBox="0 0 400 150"><line x1="30" y1="130" x2="370" y2="130" stroke="#333"/><line x1="200" y1="20" x2="200" y2="140" stroke="#333"/><path d="M30 130 L100 130 L150 30 L200 130 L250 130 L300 40 L350 130" fill="none" stroke="#0077b6" stroke-width="2"/><text x="200" y="20" font-size="10" text-anchor="middle">B(τ)</text><text x="200" y="145" font-size="10" text-anchor="middle">τ</text></svg></div>`
},
{ num:18, q:"Функция корреляции кодов Баркера, M-последовательностей. Требования к форме АКФ при реализации технологии DSSS.",
  short:`<p>Коды Баркера – боковые лепестки ≤1. M-последовательности – периодическая АКФ с боковым -1/N. Для DSSS нужна АКФ с острым пиком.</p>`,
  full:`<p><strong>Коды Баркера:</strong> длина 13: +++---+++----+, АКФ: пик 13, боковые 0 или 1. <strong>M-последовательности:</strong> длина N=2ⁿ-1, периодическая АКФ: пик N, боковые -1. Для DSSS нужна узкая АКФ для точной синхронизации и малые боковые, чтобы не мешали многолучевые копии.</p>`,
  detailed:`<p><strong>ПРИМЕНЕНИЕ:</strong> В GPS C/A-код (1023 чипа) даёт выигрыш обработки 30 дБ. Коррелятор выделяет сигнал даже при SNR = -20 дБ. Коды Баркера используются в синхропреамбулах (IEEE 802.11).</p>`
},
{ num:19, q:"Взаимно корреляционная функция двух сигналов, ее свойства. Привести пример графика функции взаимной корреляции для двух сигналов.",
  short:`<p>ВКФ B₁₂(τ)=∫ s₁(t)s₂(t+τ)dt. B₁₂(τ)=B₂₁(-τ). Пример: для синуса и косинуса ВКФ=0.</p>`,
  full:`<p><strong>ВКФ:</strong> B₁₂(τ)=∫_{-∞}^{∞} s₁(t)s₂(t+τ)dt. Свойства: B₁₂(τ)=B₂₁(-τ). Если сигналы ортогональны, B₁₂(τ)=0 при всех τ.</p>`,
  detailed:`<p><strong>ПРИМЕР ГРАФИКА:</strong> Для двух прямоугольных импульсов разной длительности ВКФ имеет треугольную форму с максимумом при совмещении фронтов. Используется в синхронизации (поиск преамбулы) и в Rake-приёмниках.</p><div class="svg-container"><svg width="400" height="150" viewBox="0 0 400 150"><line x1="30" y1="130" x2="370" y2="130" stroke="#333"/><line x1="200" y1="20" x2="200" y2="140" stroke="#333"/><path d="M30 130 L150 130 L200 40 L250 130 L370 130" fill="none" stroke="#e67e22" stroke-width="2"/><text x="200" y="35" font-size="10" text-anchor="middle">B₁₂(τ)</text></svg></div>`
},
{ num:20, q:"Корреляционная функция случайных сигналов. Связь спектральной плотности мощности и корреляционной функции случайного процесса.",
  short:`<p>Для стационарного процесса: B(τ)=E[X(t)X(t+τ)]. Теорема Винера-Хинчина: G(f)=∫B(τ)e^{-j2πfτ}dτ.</p>`,
  full:`<p><strong>Автокорреляция случайного процесса:</strong> B(τ)=E[(X(t)-m)(X(t+τ)-m)]. <strong>Спектральная плотность мощности:</strong> G(f)=∫_{-∞}^{∞} B(τ)e^{-j2πfτ}dτ. Для белого шума B(τ)=(N₀/2)δ(τ), G(f)=N₀/2.</p>`,
  detailed:`<p><strong>ТЕОРЕМА ВИНЕРА-ХИНЧИНА:</strong> связывает временное и частотное описание случайных процессов. На практике: измеряем B(τ) осциллографом, получаем G(f) через FFT. Используется для расчёта помехоустойчивости.</p><div class="formula">G(f) = ∫_{-∞}^{∞} B(τ) e^{-j2πfτ} dτ</div>`
},
{ num:21, q:"Применение корреляционной функции в системах связи.",
  short:`<p>Синхронизация, обнаружение сигналов, Rake-приёмник, оценка канала, CDMA, DSSS.</p>`,
  full:`<p><strong>Применение:</strong> 1) согласованный фильтр (оптимальный приём); 2) поиск синхронизации по преамбуле; 3) Rake-приёмник – сбор многолучевых копий; 4) CDMA – разделение пользователей по кодам; 5) DSSS – сжатие спектра; 6) OFDM – оценка сдвига символа.</p>`,
  detailed:`<p><strong>ПРИМЕР В GPS:</strong> приёмник коррелирует входной сигнал с локальной копией C/A-кода. Пик корреляции даёт псевдодальность. Корреляционный приёмник – оптимальный по критерию максимума отношения сигнал/шум.</p>`
},
{ num:22, q:"Представление сигнала как случайного процесса. Примеры надобности в системах и сетях связи. Описание случайного процесса (через функцию, дисперсию).",
  short:`<p>Сигнал с шумом – случайный процесс. Описывается матожиданием m(t), дисперсией D(t), корреляцией B(τ).</p>`,
  full:`<p><strong>Примеры:</strong> тепловой шум, замирания в радиоканале, речевой сигнал. <strong>Описание:</strong> плотность вероятности p(x), матожидание m(t)=E[X(t)], дисперсия D(t)=E[(X(t)-m(t))²], корреляционная функция.</p>`,
  detailed:`<p><strong>МОДЕЛЬ:</strong> X(t)=s(t)+n(t), где n(t) – случайный шум. Плотность вероятности – гауссовская. Дисперсия – средняя мощность переменной составляющей. Используется для расчёта BER с помощью Q-функции.</p>`
},
{ num:23, q:"Законы распределения случайных процессов. Примеры их использования.",
  short:`<p>Гаусс (шум), Рэлей (замирания без LOS), Райс (с LOS), равномерное (квантование).</p>`,
  full:`<p><strong>Гауссовское:</strong> тепловой шум. <strong>Рэлеевское:</strong> огибающая при многолучевости без прямой видимости. <strong>Райсовское:</strong> с мощным прямым лучом. <strong>Логнормальное:</strong> теневые замирания.</p>`,
  detailed:`<p><strong>ФОРМУЛЫ:</strong> Рэлей: f(r)= (r/σ²)exp(-r²/(2σ²)). Райс: f(r)=(r/σ²)exp(-(r²+s²)/(2σ²))·I₀(rs/σ²). Применяются при моделировании каналов LTE и спутниковой связи.</p>`
},
{ num:24, q:"Канал Райса и Рэлея. Случайные процессы в них. Законы распределения Райса и Рэлея.",
  short:`<p>Рэлей – нет прямой видимости, огибающая по Рэлею. Райс – есть LOS, огибающая по Райсу с параметром K.</p>`,
  full:`<p><strong>Рэлеевский канал:</strong> комплексная огибающая – гауссовский процесс с нулевым средним, модуль – рэлеевское распределение. <strong>Райсовский канал:</strong> среднее отлично от нуля, параметр K = (мощность LOS)/(мощность рассеянной компоненты). При K=0 – Рэлей.</p>`,
  detailed:`<p><strong>ПРИМЕР:</strong> В городе канал часто рэлеевский (глубокие замирания). В спутниковой связи (прямая видимость) – райсовский с K=10 дБ. Вероятность ошибки в райсовском канале ниже.</p>`
},
{ num:25, q:"Понятие стационарных случайных процессов. Примеры стационарных сигналов, области их возникновения.",
  short:`<p>Стационарный – матожидание и дисперсия постоянны, корреляция зависит от разности моментов. Пример: тепловой шум.</p>`,
  full:`<p><strong>Стационарный в широком смысле:</strong> m(t)=const, B(t₁,t₂)=B(τ). Эргодический процесс: среднее по времени = среднему по ансамблю. Примеры: шум резистора, стационарные помехи.</p>`,
  detailed:`<p><strong>НЕСТАЦИОНАРНЫЕ:</strong> голос, музыка, сигнал с замираниями (на коротких интервалах квазистационарны). Стационарность позволяет измерять характеристики по одной реализации (спектроанализатор).</p>`
},
{ num:26, q:"Виды шумов. Белый шум. Канал с АБГШ (AWGN). Понятие, особенности, области возникновения.",
  short:`<p>Шум: тепловой, дробовой, фликкер. Белый шум – равномерная спектральная плотность, АКФ=δ(τ). AWGN – простейшая модель канала.</p>`,
  full:`<p><strong>Тепловой шум:</strong> N₀=kT. <strong>Дробовой:</strong> в полупроводниках. <strong>Фликкер-шум:</strong> 1/f. <strong>Белый шум:</strong> G(f)=N₀/2, B(τ)=(N₀/2)δ(τ). <strong>Канал AWGN:</strong> r(t)=s(t)+n(t). Эталон для расчёта помехоустойчивости.</p>`,
  detailed:`<p><strong>ОСОБЕННОСТИ:</strong> белый шум – математическая абстракция (бесконечная мощность). На практике – квазибелый в рабочей полосе. Вероятность ошибки BPSK в AWGN: P_b = Q(√(2E_b/N₀)). Используется в космической и волоконно-оптической связи.</p><div class="formula">P_b = Q(√(2E_b/N₀))</div>`
},
{ num:27, q:"Структурная схема проводной системы связи (при низкочастотной модуляции).",
  short:`<p>Источник → кодер → формирователь импульсов → драйвер линии → кабель → эквалайзер → детектор → получатель.</p>`,
  full:`<p><strong>Проводная связь (baseband):</strong> биты → скремблер → кодер (MLT-3, PAM-5) → формирующий ФНЧ → драйвер → кабель (витая пара) → предусилитель → корректор → регенератор (пороговое устройство) → декодер → получатель. Пример: 1000BASE-T.</p>`,
  detailed:`<p><strong>ПРОБЛЕМЫ:</strong> межсимвольная интерференция, отражения. Используются адаптивные эквалайзеры (LMS). Детектор – пороговый: для PAM-5 – 4 порога. Без переноса на несущую.</p>`
},
{ num:28, q:"Теорема Котельникова, ряд Котельникова. Функции отсчетов. Причины возникновения погрешностей восстановления сигнала. Спектр дискретного сигнала.",
  short:`<p>Сигнал с F_max восстанавливается по отсчётам с f_д ≥ 2F_max. Ряд: s(t)=∑ s(kT) sinc(π(t-kT)/T). Алиасинг при f_д < 2F_max.</p>`,
  full:`<p><strong>Теорема Котельникова:</strong> s(t)=∑_{k=-∞}^{∞} s(kT) sinc(π(t-kT)/T), T=1/(2F_max). <strong>Функции отсчёта:</strong> sinc. <strong>Погрешности:</strong> наложение спектров (элайзинг) при f_д < 2F_max, конечная длительность сигнала. Спектр дискретного сигнала – периодический с периодом f_д.</p>`,
  detailed:`<p><strong>СПЕКТР ДИСКРЕТНОГО СИГНАЛА:</strong> S_д(f)= (1/T)∑ S(f - m f_д). Антиалиасинговый ФНЧ перед АЦП обязателен. Ряд Котельникова – частный случай ортогонального разложения.</p><div class="formula">f_д ≥ 2F_max</div>`
},
{ num:29, q:"Кабельные системы связи с импульсной модуляцией. Демодуляция/детектирование низкочастотного сигнала (как последовательности видеоимпульсов), пороговый приёмник.",
  short:`<p>Импульсная модуляция (PAM) – изменение амплитуды импульсов. Пороговый приёмник: сравнивает напряжение с порогом.</p>`,
  full:`<p><strong>PAM (импульсно-амплитудная модуляция):</strong> биты кодируются уровнями амплитуды. Демодулятор: выделяет отсчёты, АЦП, решающее устройство (сравнение с порогом). Для PAM-2 порог = A/2.</p>`,
  detailed:`<p><strong>ПРИМЕР PAM-2 (NRZ):</strong> бит 1 – уровень +A, бит 0 – 0. Пороговый приёмник: если u > A/2 – 1, иначе 0. Вероятность ошибки в AWGN: P_b = Q(√(2E_b/N₀)). Используется в Ethernet 10BASE-T.</p>`
},
{ num:30, q:"Методы повышения помехоустойчивости систем передачи сигналов. Критерий помехоустойчивости. Технологии, повышающие помехоустойчивость системы связи.",
  short:`<p>Критерий – минимум BER. Методы: кодирование, расширение спектра, разнесение, фильтрация, адаптивная модуляция.</p>`,
  full:`<p><strong>Критерий Котельникова:</strong> максимум отношения правдоподобия. <strong>Методы:</strong> 1) помехоустойчивое кодирование (LDPC, турбо); 2) DSSS (выигрыш G=B); 3) FHSS; 4) MIMO; 5) ARQ/HARQ; 6) адаптивная модуляция (AMC).</p>`,
  detailed:`<p><strong>СОВРЕМЕННЫЕ СИСТЕМЫ:</strong> 5G использует LDPC и полярные коды, MIMO 4×4, адаптивную модуляцию от QPSK до 256QAM. Критерий – минимум вероятности ошибки бита при заданном SNR.</p>`
},
{ num:31, q:"Понятие пропускной способности. Теорема Шеннона-Хартли.",
  short:`<p>C = W·log₂(1 + SNR). Максимальная скорость без ошибок в канале с AWGN.</p>`,
  full:`<p><strong>Теорема Шеннона:</strong> C = W·log₂(1 + SNR) бит/с. Если R < C, существует код с вероятностью ошибки сколь угодно малой. Если R > C – ошибки неизбежны.</p>`,
  detailed:`<p><strong>ПРИМЕР:</strong> телефонный канал 3.1 кГц, SNR=30 дБ → C ≈ 30 кбит/с. Для ADSL с W=1 МГц, SNR=20 дБ → C ≈ 6.6 Мбит/с. Турбокоды приближаются к пределу Шеннона на 0.1 дБ.</p><div class="formula">C = W·log₂(1 + \frac{P}{N₀W})</div>`
},
{ num:32, q:"Понятие цифровой модуляции. Импульсная и полосовая модуляция. Необходимость в применении цифровой модуляции.",
  short:`<p>Цифровая модуляция – отображение битов в аналоговый сигнал. Импульсная (PAM) – для проводов, полосовая (PSK,QAM) – для радиоканалов.</p>`,
  full:`<p><strong>Необходимость:</strong> передача цифровых данных по аналоговой среде, частотное разделение, борьба с шумами, спектральная эффективность. Импульсная – baseband, полосовая – перенос на несущую.</p>`,
  detailed:`<p><strong>ПРИМЕРЫ:</strong> Ethernet (PAM-5), WiFi (OFDM с BPSK/QAM), спутниковая связь (QPSK, 8PSK, 16APSK). Без модуляции цифровая связь невозможна.</p>`
},
{ num:33, q:"Базовые виды цифровой модуляции, их сравнение и область применения. Понятие битовой и символьной скоростей.",
  short:`<p>BPSK (1 бит/сим), QPSK (2), 16QAM (4). Символьная скорость R_sym = R_b / log₂(M). BPSK – самая помехоустойчивая, QAM – высокая скорость.</p>`,
  full:`<p><strong>Битовая скорость:</strong> R_b = R_sym · log₂(M). <strong>Сравнение при BER=10⁻⁶:</strong> BPSK: 9.6 дБ, QPSK: 9.6 дБ, 16QAM: 15.5 дБ, 64QAM: 21 дБ. Область: BPSK – спутниковая, GPS; QPSK – LTE, DVB; QAM – WiFi, 5G.</p>`,
  detailed:`<p><strong>ПРИМЕР:</strong> полоса 200 кГц, R_sym=200 кБод. BPSK даёт 200 кбит/с, QPSK – 400 кбит/с, 16QAM – 800 кбит/с. Адаптивная модуляция переключает M по качеству канала.</p>`
},
{ num:34, q:"Классификация видов цифровой модуляции.",
  short:`<p>По параметру: ASK, FSK, PSK, QAM. По размерности: M-ASK, M-PSK, M-QAM. С памятью и без памяти.</p>`,
  full:`<p><strong>Классификация:</strong> 1) по модулируемому параметру: амплитудная (ASK), частотная (FSK), фазовая (PSK), комбинированная (QAM). 2) по непрерывности фазы: CPFSK, MSK. 3) по памяти: без памяти (независимые символы) и с памятью (CPM). 4) по числу несущих: однонесущая (SC), многонесущая (OFDM).</p>`,
  detailed:`<p><strong>ПРИМЕРЫ:</strong> GMSK (GSM) – с памятью; OFDM – многонесущая с QAM. Выбор модуляции под канал: для нелинейного усилителя – PSK или FSK, для линейного – QAM.</p>`
},
{ num:35, q:"Модуляция M-ASK и APSK, принцип формирования M-ASK сигнала. Диаграмма созвездий ASK-4 сигнала, график сигнала во временной области, сравнение с другими видами модуляции.",
  short:`<p>M-ASK – меняется амплитуда, фаза постоянна. ASK-4 – 4 уровня, 2 бита/символ. APSK – комбинация ASK+PSK (кольца).</p>`,
  full:`<p><strong>ASK-4 созвездие:</strong> амплитуды -3d, -d, +d, +3d. <strong>APSK:</strong> точки на окружностях (DVB-S2: 16APSK). Сравнение: ASK чувствительна к нелинейности, APSK устойчивее в спутниковых каналах.</p>`,
  detailed:`<p><strong>ДИАГРАММА ASK-4:</strong></p><div class="svg-container"><svg width="300" height="120" viewBox="0 0 300 120"><line x1="30" y1="60" x2="270" y2="60" stroke="#333"/><circle cx="70" cy="60" r="6" fill="#0077b6"/><text x="70" y="45" font-size="10" text-anchor="middle">-3d</text><circle cx="120" cy="60" r="6" fill="#0077b6"/><text x="120" y="45" font-size="10" text-anchor="middle">-d</text><circle cx="180" cy="60" r="6" fill="#0077b6"/><text x="180" y="75" font-size="10" text-anchor="middle">+d</text><circle cx="230" cy="60" r="6" fill="#0077b6"/><text x="230" y="75" font-size="10" text-anchor="middle">+3d</text><text x="270" y="65" font-size="11" fill="#333">I</text></svg></div>`
},
{ num:36, q:"Модуляция BPSK. Область применения. Диаграмма созвездий BPSK сигнала, график сигнала во временной области, сравнение с другими видами модуляции.",
  short:`<p>BPSK: фаза 0° и 180°, 1 бит/символ. Применение: GPS, спутниковая связь. Самая помехоустойчивая.</p>`,
  full:`<p><strong>Созвездие BPSK:</strong> две точки на оси I.</p><div class="svg-container"><svg width="200" height="200" viewBox="0 0 200 200"><line x1="30" y1="100" x2="170" y2="100" stroke="#333"/><line x1="100" y1="20" x2="100" y2="180" stroke="#333"/><circle cx="60" cy="100" r="8" fill="#0077b6"/><circle cx="140" cy="100" r="8" fill="#0077b6"/><text x="60" y="85" font-size="12" text-anchor="middle">0°</text><text x="140" y="85" font-size="12" text-anchor="middle">180°</text><text x="180" y="105" font-size="11">I</text></svg></div><p><strong>Временной график:</strong> скачки фазы на 180°.</p><div class="svg-container"><svg width="400" height="100" viewBox="0 0 400 100"><line x1="20" y1="50" x2="380" y2="50" stroke="#333"/><path d="M30 20 L70 20 L70 80 L110 80 L110 20 L150 20 L150 80 L190 80 L190 20 L230 20 L230 80 L270 80 L270 20" fill="none" stroke="#0077b6" stroke-width="2"/></svg></div><p><strong>Вероятность ошибки:</strong> P_b = Q(√(2E_b/N₀)). Сравнение: QPSK в 2 раза быстрее, но при той же E_b/N₀ BER такая же.</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> BPSK используется в глубокой космической связи (станция «Вояджер»). Дифференциальная DBPSK (Bluetooth, RFID) – не требует когерентной синхронизации, но проигрывает 1-2 дБ.</p>`
},
{ num:37, q:"Модуляция QPSK. Область применения. Диаграмма созвездий QPSK, график сигнала во временной области, сравнение с другими видами модуляции.",
  short:`<p>QPSK – 4 фазы (45°,135°,-45°,-135°), 2 бита/символ. Применение: LTE, DVB, Wi-Fi.</p>`,
  full:`<p><strong>Созвездие QPSK:</strong> 4 точки в квадрате.</p><div class="svg-container"><svg width="200" height="200" viewBox="0 0 200 200"><line x1="30" y1="100" x2="170" y2="100" stroke="#333"/><line x1="100" y1="20" x2="100" y2="180" stroke="#333"/><circle cx="60" cy="60" r="6" fill="#0077b6"/><circle cx="140" cy="60" r="6" fill="#0077b6"/><circle cx="60" cy="140" r="6" fill="#0077b6"/><circle cx="140" cy="140" r="6" fill="#0077b6"/><text x="170" y="105" font-size="11">I</text><text x="105" y="190" font-size="11">Q</text></svg></div><p>Временной график – изменение фазы на 90°. Сравнение: QPSK в 2 раза быстрее BPSK при той же полосе, требует такой же E_b/N₀.</p>`,
  detailed:`<p><strong>ДЕТАЛЬНО:</strong> QPSK можно рассматривать как два независимых BPSK на I и Q. Вероятность ошибки примерно такая же, как у BPSK. Используется в стандартах 4G, 5G (как низший режим), DVB-S.</p>`
},
{ num:38, q:"Модуляция DBPSK. Область применения. Диаграмма созвездий DBPSK, график сигнала во временной области, сравнение с другими видами модуляции.",
  short:`<p>DBPSK – дифференциальная BPSK, информация в разности фаз. Некогерентный приём. Bluetooth, RFID.</p>`,
  full:`<p><strong>Принцип:</strong> бит 0 – фаза не меняется, бит 1 – инверсия на 180°. Созвездие – как у BPSK. Демодуляция: сравнение фазы текущего символа с предыдущим. Потеря ~1-2 дБ по сравнению с когерентной BPSK.</p>`,
  detailed:`<p><strong>ДЕМОДУЛЯЦИЯ DBPSK:</strong> перемножаем принятый символ с задержанным на время символа. Если произведение >0 – бит 0, <0 – бит 1. Используется в стандарте IEEE 802.15.4 (Zigbee).</p>`
},
{ num:39, q:"Модуляция DQPSK. Область применения. Диаграмма созвездий DQPSK, график сигнала во временной области. Отличие дифференциальной модуляции от QPSK.",
  short:`<p>DQPSK – дифференциальная QPSK: изменение фазы 0°,90°,180°,270°. Не требует абсолютной фазы. Потеря 2-3 дБ.</p>`,
  full:`<p><strong>Отличие от QPSK:</strong> в QPSK символ привязан к абсолютной фазе (нужна синхронизация). В DQPSK информация в разности фаз. Применение: IS-54, DECT, Bluetooth (EDR).</p>`,
  detailed:`<p><strong>ДЕКОДИРОВАНИЕ:</strong> сдвигаем сигнал на T, перемножаем с текущим, определяем квадратурную разность. Помехоустойчивость хуже QPSK на 2-3 дБ, но проще реализация при быстрых замираниях.</p>`
},
{ num:40, q:"Модуляция QAM, разложение модулированного сигнала на I и Q составляющие. Диаграмма созвездий QAM-4, QAM-8, QAM-16. Область применения.",
  short:`<p>QAM – меняется амплитуда и фаза. QAM-4=QPSK. QAM-16 – 4×4, 4 бита/символ. Применение: WiFi, 4G/5G, DVB-T.</p>`,
  full:`<p><strong>Разложение на I и Q:</strong> s(t)=I·cos(ωt)+Q·sin(ωt). <strong>Созвездия:</strong> QAM-4 (квадрат), QAM-8 (крестовая), QAM-16 (4×4).</p><div class="svg-container"><svg width="400" height="140" viewBox="0 0 400 140"><line x1="40" y1="70" x2="130" y2="70" stroke="#333"/><line x1="85" y1="30" x2="85" y2="110" stroke="#333"/><circle cx="55" cy="55" r="4" fill="#0077b6"/><circle cx="115" cy="55" r="4" fill="#0077b6"/><circle cx="55" cy="85" r="4" fill="#0077b6"/><circle cx="115" cy="85" r="4" fill="#0077b6"/><text x="85" y="125" font-size="10" text-anchor="middle">QAM-4</text><line x1="170" y1="70" x2="260" y2="70" stroke="#333"/><line x1="215" y1="30" x2="215" y2="110" stroke="#333"/><circle cx="185" cy="45" r="4" fill="#e67e22"/><circle cx="215" cy="55" r="4" fill="#e67e22"/><circle cx="245" cy="65" r="4" fill="#e67e22"/><text x="215" y="125" font-size="10" text-anchor="middle">QAM-8 (крест)</text><line x1="290" y1="70" x2="380" y2="70" stroke="#333"/><line x1="335" y1="30" x2="335" y2="110" stroke="#333"/><circle cx="305" cy="40" r="3" fill="#2e7d32"/><circle cx="335" cy="40" r="3" fill="#2e7d32"/><circle cx="365" cy="40" r="3" fill="#2e7d32"/><circle cx="305" cy="100" r="3" fill="#2e7d32"/><text x="335" y="125" font-size="10" text-anchor="middle">QAM-16</text></svg></div><p>Применение: WiFi 6 (1024QAM), 5G (256QAM).</p>`,
  detailed:`<p><strong>ФОРМИРОВАНИЕ QAM:</strong> биты → отображение в комплексное число a+jb → формирующий фильтр → квадратурный смеситель. BER для QAM-M: P_b ≈ (4/√M)Q(√(3·SNR/(M-1))).</p>`
},
{ num:41, q:"Сравнение по характеристикам различных цифровых видов модуляции. Система связи с адаптивной модуляцией.",
  short:`<p>BPSK – низкая скорость, высокая помехоустойчивость. QAM – высокая скорость, требует высокого SNR. AMC переключает модуляцию по качеству канала.</p>`,
  full:`<p><strong>Сравнение при BER=10⁻⁶ (AWGN):</strong> BPSK: 9.6 дБ, QPSK: 9.6 дБ, 16QAM: 15.5 дБ, 64QAM: 21 дБ. <strong>AMC (Adaptive Modulation and Coding):</strong> измеряет SNR, выбирает M и кодовую скорость. Используется в LTE, 5G, WiFi.</p>`,
  detailed:`<p><strong>АЛГОРИТМ AMC:</strong> приёмник измеряет CQI, передаёт обратно. Передатчик выбирает модуляцию и код. Например: при плохом сигнале QPSK R=1/3, при хорошем – 256QAM R=5/6. Повышает среднюю пропускную способность.</p>`
},
{ num:42, q:"Структурная схема системы связи с квадратурным модулятором. Baseband модулятор. Принцип работы.",
  short:`<p>Отображение битов в I/Q → ЦАП → ФНЧ → смесители (cos, sin) → сумматор. Baseband часть – формирование I/Q.</p>`,
  full:`<p><strong>Схема квадратурного модулятора:</strong></p><div class="svg-container"><svg width="600" height="180" viewBox="0 0 600 180"><rect x="10" y="20" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="50" y="44" font-size="10" text-anchor="middle">Биты</text><line x1="90" y1="40" x2="110" y2="40" stroke="#0077b6"/><rect x="110" y="20" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="150" y="44" font-size="10" text-anchor="middle">I/Q отобр</text><line x1="190" y1="40" x2="210" y2="40" stroke="#0077b6"/><rect x="210" y="20" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="250" y="44" font-size="10" text-anchor="middle">ФНЧ</text><line x1="290" y1="40" x2="310" y2="40" stroke="#0077b6"/><rect x="310" y="10" width="60" height="30" fill="#ffe0cc" stroke="#e67e22" rx="6"/><text x="340" y="30" font-size="9" text-anchor="middle">cos</text><rect x="310" y="60" width="60" height="30" fill="#ffe0cc" stroke="#e67e22" rx="6"/><text x="340" y="80" font-size="9" text-anchor="middle">sin</text><line x1="370" y1="25" x2="390" y2="25" stroke="#0077b6"/><line x1="370" y1="75" x2="390" y2="75" stroke="#0077b6"/><circle cx="400" cy="50" r="20" fill="none" stroke="#0077b6" stroke-width="1.5"/><text x="400" y="55" font-size="12" text-anchor="middle">+</text><line x1="420" y1="50" x2="450" y2="50" stroke="#0077b6" marker-end="url(#a)"/><defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0077b6"/></marker></defs></svg></div><p>Baseband модулятор – цифровая часть, выдающая I/Q. Приёмник – квадратурный демодулятор.</p>`,
  detailed:`<p><strong>ПРЯМОЕ ПРЕОБРАЗОВАНИЕ (zero-IF):</strong> смесители работают на частоте сигнала. Недостатки: DC offset, I/Q дисбаланс. Борьба: калибровка, DC блоки. Схема – основа SDR (Software Defined Radio).</p>`
},
{ num:43, q:"Корреляционный приемник. Структурная схема. Когерентный и некогерентный прием сигналов.",
  short:`<p>Корреляционный приёмник – умножает входной сигнал на опорный и интегрирует. Когерентный знает фазу, некогерентный – нет.</p>`,
  full:`<p><strong>Схема корреляционного приёмника для BPSK:</strong></p><div class="svg-container"><svg width="500" height="140" viewBox="0 0 500 140"><rect x="20" y="30" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="60" y="54" font-size="10" text-anchor="middle">r(t)</text><line x1="100" y1="50" x2="130" y2="50" stroke="#0077b6"/><rect x="130" y="30" width="80" height="40" fill="#ffe0cc" stroke="#e67e22" rx="6"/><text x="170" y="54" font-size="10" text-anchor="middle">× cos</text><line x1="210" y1="50" x2="240" y2="50" stroke="#0077b6"/><rect x="240" y="30" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="280" y="54" font-size="10" text-anchor="middle">∫ dt</text><line x1="320" y1="50" x2="350" y2="50" stroke="#0077b6"/><rect x="350" y="30" width="80" height="40" fill="#d0f0d0" stroke="#2e7d32" rx="6"/><text x="390" y="54" font-size="10" text-anchor="middle">Порог</text><line x1="430" y1="50" x2="470" y2="50" stroke="#0077b6" marker-end="url(#a)"/><defs><marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0077b6"/></marker></defs></svg></div><p><strong>Когерентный приём:</strong> требует точной фазовой синхронизации (PLL). <strong>Некогерентный:</strong> использует огибающую (детектор) или дифференциальный детектор (DBPSK). Потеря 1-3 дБ.</p>`,
  detailed:`<p><strong>СОГЛАСОВАННЫЙ ФИЛЬТР:</strong> эквивалентен коррелятору, реализуется на ПЛИС. Корреляционный приёмник оптимален для AWGN. В GPS используется множество параллельных корреляторов.</p>`
},
{ num:44, q:"Примеры технологий современных систем связи. Предпосылки изобретения технологии OFDM. Нежелательные эффекты в канале связи, борьба с ними.",
  short:`<p>Технологии: OFDM, MIMO, турбокоды. OFDM пришёл из-за сложности эквалайзера при многолучевости. Эффекты: PAPR, сдвиг частоты. Борьба: CP, предкодирование.</p>`,
  full:`<p><strong>Предпосылки OFDM:</strong> в широкополосных каналах многолучевость требует сложного эквалайзера во временной области. OFDM разбивает канал на узкие поднесущие, где канал почти плоский. <strong>Эффекты:</strong> высокий пик-фактор (PAPR), чувствительность к частотным сдвигам. <strong>Борьба:</strong> циклический префикс, методы снижения PAPR (clipping, TR), подстройка частоты.</p>`,
  detailed:`<p><strong>СОВРЕМЕННЫЕ ТЕХНОЛОГИИ:</strong> OFDM (WiFi, LTE, 5G), MIMO (пространственное мультиплексирование), турбокоды и LDPC (приближение к Шеннону), полярные коды (5G). Циклический префикс (CP) – копия конца символа в начало, длиннее импульсной характеристики канала – убивает ISI и ICI.</p>`
},
{ num:45, q:"Технология OFDM (Orthogonal Frequency-Division Multiplexing). Принцип технологии. Достоинства и недостатки. Области применения.",
  short:`<p>OFDM – параллельная передача на ортогональных поднесущих. Достоинства: устойчивость к многолучевости, простой эквалайзер. Недостатки: PAPR, синхронизация.</p>`,
  full:`<p><strong>Принцип:</strong> данные распределяются по N поднесущим с разносом Δf=1/T, ортогональность обеспечивается IFFT/FFT. <strong>Достоинства:</strong> простой эквалайзер (одно комплексное умножение), гибкое распределение ресурсов, высокая спектральная эффективность. <strong>Недостатки:</strong> высокий PAPR (до 12 дБ), чувствительность к фазовому шуму и сдвигу частоты. <strong>Применение:</strong> WiFi (802.11a/g/n/ac/ax), LTE/5G (OFDMA), DVB-T, ADSL/VDSL, PLC.</p>`,
  detailed:`<p><strong>OFDM В LTE:</strong> размер FFT=2048, spacing 15 кГц, CP 4.7 мкс (обычный) или 16.7 мкс (расширенный). OFDMA – разным пользователям выделяются разные поднесущие. PAPR решается предкодированием (DFT-s-OFDM в uplink LTE).</p>`
},
{ num:46, q:"Структурная схема системы связи с технологией OFDM. Назначение блоков IFFT (ОБПФ) и CP.",
  short:`<p>Передатчик: QAM-символы → IFFT → добавление CP → ЦАП → смеситель. IFFT создаёт временную область, CP устраняет ISI.</p>`,
  full:`<p><strong>Схема OFDM передатчика:</strong> биты → кодер → отображение в QAM → распределение по поднесущим → IFFT → добавление CP → ЦАП → квадратурный модулятор. <strong>Назначение IFFT:</strong> преобразовать частотное представление во временное с сохранением ортогональности. <strong>CP (циклический префикс):</strong> копирование последних L отсчётов в начало, поглощает ISI от многолучевости.</p>`,
  detailed:`<p><strong>БЕЗ CP:</strong> предыдущий OFDM-символ затекал бы в следующий. CP делает свёртку с каналом циклической, что позволяет использовать частотную коррекцию (одно комплексное умножение на поднесущую после FFT). На приёмнике: удаление CP → FFT → эквалайзер → демодуляция.</p><div class="svg-container"><svg width="500" height="100" viewBox="0 0 500 100"><rect x="20" y="30" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="60" y="54" font-size="10" text-anchor="middle">QAM символы</text><line x1="100" y1="50" x2="120" y2="50" stroke="#0077b6"/><rect x="120" y="30" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="160" y="54" font-size="10" text-anchor="middle">IFFT</text><line x1="200" y1="50" x2="220" y2="50" stroke="#0077b6"/><rect x="220" y="30" width="80" height="40" fill="#ffe0cc" stroke="#e67e22" rx="6"/><text x="260" y="54" font-size="10" text-anchor="middle">+ CP</text><line x1="300" y1="50" x2="320" y2="50" stroke="#0077b6"/><rect x="320" y="30" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="360" y="54" font-size="10" text-anchor="middle">ЦАП</text></svg></div>`
},
{ num:47, q:"Технология LoRa CSS. Принцип технологии. Вид сигнала. Достоинства и недостатки. Область применения.",
  short:`<p>LoRa – Chirp Spread Spectrum: частота линейно растёт (up-chirp). Дальность, низкое энергопотребление, низкая скорость. IoT.</p>`,
  full:`<p><strong>Принцип CSS:</strong> символ кодируется начальной частотой чирпа в полосе BW. Частота меняется от f₀ до f₀+BW за символ. <strong>Вид сигнала:</strong> линейно-частотно-модулированный (ЛЧМ) импульс. <strong>Достоинства:</strong> дальность до 15 км, чувствительность -130 дБм, устойчивость к доплеру и узкополосным помехам. <strong>Недостатки:</strong> низкая скорость (до 50 кбит/с). <strong>Применение:</strong> LoRaWAN, умный город, сельское хозяйство, датчики.</p>`,
  detailed:`<p><strong>ПАРАМЕТРЫ LoRa:</strong> SF (Spreading Factor) от 7 до 12, BW 125/250/500 кГц. Демодуляция – корреляция с обратным чирпом даёт пик, определяющий символ. CSS была изобретена давно, LoRa сделала её дешёвой и массовой.</p>`
},
{ num:48, q:"Технология расширения спектра FHSS. Принцип технологии. Вид сигнала. Достоинства и недостатки. Область применения.",
  short:`<p>FHSS – псевдослучайное переключение несущей. Сигнал – короткие пакеты на разных частотах. Устойчив к помехам. Bluetooth, военная связь.</p>`,
  full:`<p><strong>Принцип FHSS:</strong> частота несущей меняется по псевдослучайному закону в широкой полосе. Длительность хопа T_h. Приёмник синхронизирован. <strong>Вид сигнала:</strong> узкополосные вспышки на разных частотах. <strong>Достоинства:</strong> устойчивость к узкополосным помехам, скрытность, возможность одновременной работы нескольких сетей. <strong>Недостатки:</strong> требуется точная синхронизация, невысокая скорость. <strong>Применение:</strong> Bluetooth (1600 хоп/с), старые военные рации, Zigbee.</p>`,
  detailed:`<p><strong>МЕДЛЕННАЯ/БЫСТРАЯ FHSS:</strong> медленная – несколько бит на хоп; быстрая – несколько хопов на бит. Bluetooth использует 79 каналов по 1 МГц. Без FHSS невозможна работа в зашумлённом диапазоне 2.4 ГГц.</p>`
},
{ num:49, q:"Технология расширения спектра DSSS. Принцип технологии. Вид сигнала. Достоинства и недостатки. Область применения.",
  short:`<p>DSSS – бит умножается на ПСП, спектр расширяется. Приём – корреляция. Применение: GPS, CDMA, Wi-Fi 802.11b.</p>`,
  full:`<p><strong>Принцип DSSS:</strong> исходный бит длительностью T_b заменяется последовательностью чипов (ПСП) длительностью T_c, T_b = N·T_c. Выигрыш обработки G = T_b/T_c = N. Сигнал широкополосный, похож на шум. При приёме корреляция с той же ПСП сжимает спектр. <strong>Достоинства:</strong> помехоустойчивость, скрытность, работа с отрицательным SNR, кодовое разделение (CDMA). <strong>Недостатки:</strong> требуется синхронизация по чипам. <strong>Применение:</strong> GPS (C/A-код 1023 чипа, G=30 дБ), 3G CDMA2000, WCDMA, Wi-Fi 802.11b (11 Мчип/с).</p>`,
  detailed:`<p><strong>RAKE-ПРИЁМНИК:</strong> собирает энергию многолучевых копий. В GPS коррелятор накапливает за 1 мс, выделяя пик даже при сигнале на 20 дБ ниже шума. Без DSSS GPS бы не работал.</p><div class="formula">G = 10·log₁₀(N) дБ</div>`
}
];
questionsData.sort((a,b)=>a.num-b.num);
function escapeHtml(s){return s;}
let currentFilter='';
function render(){
    const c=document.getElementById('questionsContainer');
    const f=questionsData.filter(i=>i.q.toLowerCase().includes(currentFilter.toLowerCase())||i.short.toLowerCase().includes(currentFilter.toLowerCase())||i.full.toLowerCase().includes(currentFilter.toLowerCase())||i.detailed.toLowerCase().includes(currentFilter.toLowerCase()));
    if(!f.length){c.innerHTML='<div style="padding:32px;text-align:center;">❌ Ничего не найдено</div>';return;}
    c.innerHTML=f.map((it,idx)=>`
        <div class="question-card" data-idx="${idx}">
            <div class="question-header"><div class="q-num">${it.num}.</div><div class="q-text">${it.q}</div><div class="toggle-icon">▼</div></div>
            <div class="answer-panel"><div class="level-buttons"><button class="level-btn" data-level="short">🔹 Поверхностно</button><button class="level-btn" data-level="full">🔸 Полноценно</button><button class="level-btn" data-level="detailed">🔺 Очень подробно</button></div><div class="answer-content" id="ans-${idx}">${it.short}</div></div>
        </div>`).join('');
    document.querySelectorAll('.question-card').forEach(card=>{
        const h=card.querySelector('.question-header'),p=card.querySelector('.answer-panel');
        const i=parseInt(card.getAttribute('data-idx')),it=f[i];
        h.addEventListener('click',(e)=>{if(e.target.classList?.contains('level-btn'))return;p.classList.toggle('show');h.querySelector('.toggle-icon').textContent=p.classList.contains('show')?'▲':'▼';});
        const btns=card.querySelectorAll('.level-btn');
        btns.forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();let l=btn.getAttribute('data-level'),c=l==='short'?it.short:l==='full'?it.full:it.detailed;document.getElementById(`ans-${i}`).innerHTML=c;btns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');});if(btn.getAttribute('data-level')==='short')btn.classList.add('active');});
    });
}
document.getElementById('searchInput').addEventListener('input',e=>{currentFilter=e.target.value;render();});
render();
</script>
</body>
</html>
