<script>
const questionsData = [
{
  num:1,
  q:"Схема процесса передачи информации: нарисовать информацию, сообщение, электрический сигнал, радио сигнал, влияние помех, принимаемый сигнал и сообщение. Понятие «система электросвязи», «линия связи», «канал связи». Модели каналов связи: канал с AWGN, канал с многолучевым распространением.",
  short:`<p><strong>Кратко:</strong> Информация (абстракция) → сообщение (биты) → электрический сигнал (напряжение) → радиосигнал (модулированная несущая) → линия связи + помехи → принимаемый сигнал → демодуляция → принятое сообщение.</p><p><strong>Понятия:</strong> Система электросвязи – техника + среда. Линия – физическая среда (медь, оптоволокно, эфир). Канал – линия + шумы + искажения + обработка.</p><p><strong>Модели каналов:</strong> AWGN – аддитивный белый гауссов шум (r(t)=s(t)+n(t)). Многолучевой – сигнал приходит несколькими путями (r(t)=Σ aₖ·s(t-τₖ)+n(t)).</p>`,
  full:`<p><strong>Схема процесса передачи информации (каждый элемент графически):</strong></p>
<div class="svg-container"><svg width="750" height="220" viewBox="0 0 750 220"><rect x="10" y="30" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="45" y="54" font-size="10" text-anchor="middle">Информация</text><line x1="80" y1="50" x2="110" y2="50" stroke="#0077b6"/><rect x="110" y="30" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="145" y="54" font-size="10" text-anchor="middle">Сообщение</text><line x1="180" y1="50" x2="210" y2="50" stroke="#0077b6"/><rect x="210" y="30" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="250" y="44" font-size="9" text-anchor="middle">Электрический</text><text x="250" y="56" font-size="9" text-anchor="middle">сигнал</text><line x1="290" y1="50" x2="320" y2="50" stroke="#0077b6"/><rect x="320" y="30" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="355" y="54" font-size="10" text-anchor="middle">Радиосигнал</text><line x1="390" y1="50" x2="420" y2="50" stroke="#0077b6"/><rect x="420" y="10" width="90" height="40" fill="#ffe0e0" stroke="#b60000" rx="6"/><text x="465" y="34" font-size="10" text-anchor="middle">Влияние</text><text x="465" y="46" font-size="10" text-anchor="middle">помех</text><line x1="510" y1="30" x2="540" y2="30" stroke="#0077b6"/><rect x="540" y="10" width="90" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="585" y="34" font-size="10" text-anchor="middle">Принимаемый</text><text x="585" y="46" font-size="10" text-anchor="middle">сигнал</text><line x1="630" y1="30" x2="660" y2="30" stroke="#0077b6"/><rect x="660" y="30" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="695" y="54" font-size="10" text-anchor="middle">Сообщение</text><text x="370" y="100" font-size="11" fill="#b60000" text-anchor="middle">✖ Помехи добавляются в канале</text></svg></div>
<p><strong>Понятия:</strong><br>• <strong>Система электросвязи</strong> – совокупность технических средств и среды распространения, обеспечивающая передачу информации от отправителя к получателю. Пример: сотовая сеть, спутниковая связь, Интернет.<br>• <strong>Линия связи</strong> – физическая среда, по которой распространяется сигнал: витая пара (Cat5e), коаксиальный кабель, оптоволокно, радиоканал.<br>• <strong>Канал связи</strong> – математическая модель, описывающая преобразование сигнала при прохождении через линию связи с учётом шумов, фильтрации, искажений и эффектов многолучевости.</p>
<p><strong>Модели каналов связи:</strong><br>• <strong>Канал с AWGN (Additive White Gaussian Noise):</strong> r(t)=s(t)+n(t), где n(t) – белый гауссовский шум со спектральной плотностью N₀/2. Простейшая модель, используется как эталон.<br>• <strong>Канал с многолучевым распространением:</strong> r(t)=Σ aₖ·s(t-τₖ)+n(t). Сигнал приходит по нескольким путям (прямой луч, отражения от зданий, земли), что вызывает частотно-селективные замирания.</p>`,
  detailed:`<p><strong>ПОДРОБНЕЙШЕЕ ОПИСАНИЕ КАЖДОГО ЭТАПА СХЕМЫ:</strong></p>
<ol><li><strong>Информация</strong> – абстрактная сущность, которую нужно передать (текст, звук, изображение). На этом этапе нет сигнала, только смысл.</li><li><strong>Сообщение</strong> – информация, представленная в виде последовательности символов (буквы, биты). Для цифровой связи – двоичные символы 0 и 1.</li><li><strong>Электрический сигнал</strong> – напряжение или ток, изменяющийся во времени пропорционально сообщению. Пример: импульсы уровня +5В (логическая 1) и 0В (логический 0).</li><li><strong>Радиосигнал</strong> – электрический сигнал, перенесённый на высокую несущую частоту f₀ с помощью модуляции (умножение на cos(2πf₀t)). Форма: s_radio(t)=A(t)·cos(2πf₀t+φ(t)).</li><li><strong>Влияние помех</strong> – в линии связи к сигналу добавляются шумы (тепловой, импульсный), происходит затухание, искажения, многолучевость.</li><li><strong>Принимаемый сигнал</strong> – искажённая версия переданного сигнала. Математически: r(t)=s(t)+n(t) для AWGN, или r(t)=Σ aₖ·s(t-τₖ)+n(t) для многолучевого канала.</li><li><strong>Принятое сообщение</strong> – результат демодуляции и декодирования. Из-за помех может содержать ошибки по сравнению с исходным сообщением.</li></ol>
<p><strong>ПОНЯТИЯ (расширенно):</strong><br>• <strong>Система электросвязи</strong> = отправитель + кодеры + модулятор + передатчик + линия связи + приёмник + демодулятор + декодеры + получатель.<br>• <strong>Линия связи</strong> – физический объект: медный провод, оптическое волокно, радиотрасса. Характеризуется затуханием (дБ/км), полосой пропускания, волновым сопротивлением.<br>• <strong>Канал связи</strong> – математическая модель, включающая линию, все преобразования, шумы и искажения. Используется для расчёта вероятности ошибки и пропускной способности.</p>
<p><strong>МОДЕЛИ КАНАЛОВ (подробно):</strong><br>✔ <strong>AWGN:</strong> Спектральная плотность мощности шума G_n(f)=N₀/2 Вт/Гц. Автокорреляция B_n(τ)=(N₀/2)·δ(τ). Вероятность ошибки для BPSK в AWGN: P_b = Q(√(2E_b/N₀)).<br>✔ <strong>Многолучевой канал:</strong> Импульсная характеристика h(t)=Σ aₖ·δ(t-τₖ). Комплексная частотная характеристика H(f)=Σ aₖ·e^{-j2πfτₖ}. Вызывает частотно-селективные замирания – на одних частотах сигнал усиливается, на других гасится. Борьба: RAKE-приёмник (собирает энергию лучей) и OFDM (превращает канал в набор плоских подканалов).</p>
<div class="svg-container"><svg width="600" height="160" viewBox="0 0 600 160"><rect x="20" y="50" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="60" y="74" font-size="12" text-anchor="middle">Передатчик</text><line x1="100" y1="70" x2="130" y2="70" stroke="#0077b6"/><path d="M130 70 L180 30 L230 70 L280 110 L330 70" stroke="#ff9900" fill="none" stroke-dasharray="4,3"/><circle cx="180" cy="30" r="4" fill="#ff9900"/><circle cx="280" cy="110" r="4" fill="#ff9900"/><line x1="330" y1="70" x2="360" y2="70" stroke="#0077b6"/><rect x="360" y="50" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="400" y="74" font-size="12" text-anchor="middle">Приёмник</text><text x="230" y="20" font-size="11" fill="#ff9900" text-anchor="middle">Многолучевость: отражённые лучи</text></svg></div>`
},
{
  num:2,
  q:"Классификация видов сигналов: по виду передаваемого сообщения, по форме сигнала во временной области, по способам математического представления и характеру физического процесса (случайный / неслучайный).",
  short:`<p><strong>По виду передаваемого сообщения:</strong> речь, музыка, текст, изображение, видео.</p><p><strong>По форме сигнала во временной области:</strong> аналоговый (непрерывный по уровню и времени), дискретный (отсчёты), цифровой (квантованный).</p><p><strong>По способам математического представления:</strong> детерминированный (описывается точной формулой), случайный (вероятностными характеристиками).</p><p><strong>По характеру физического процесса:</strong> случайный / неслучайный.</p>`,
  full:`<p><strong>1. По виду передаваемого сообщения:</strong></p><ul><li>Речь (300–3400 Гц) – аналоговый сигнал с микрофона.</li><li>Музыка (20–20000 Гц) – широкополосный сигнал.</li><li>Текст – дискретные символы, преобразуются в биты.</li><li>Изображение – двумерный массив пикселей, после развёртки – видеосигнал до 6 МГц.</li><li>Видео – последовательность изображений + звук, требует сжатия (MPEG, H.264).</li></ul><p><strong>2. По форме сигнала во временной области:</strong></p><div class="svg-container"><svg width="500" height="140" viewBox="0 0 500 140"><line x1="30" y1="70" x2="470" y2="70" stroke="#333"/><path d="M30 40 L80 40 L80 100 L130 100 L130 40 L180 40 L180 100 L230 100 L230 40 L280 40 L280 100 L330 100 L330 40 L380 40 L380 100 L430 100 L430 70" fill="none" stroke="#0077b6" stroke-width="2"/><text x="55" y="35" font-size="10" text-anchor="middle">1</text><text x="105" y="115" font-size="10" text-anchor="middle">0</text><text x="155" y="35" font-size="10" text-anchor="middle">1</text><text x="205" y="115" font-size="10" text-anchor="middle">0</text><text x="255" y="35" font-size="10" text-anchor="middle">1</text><text x="305" y="115" font-size="10" text-anchor="middle">0</text><text x="355" y="35" font-size="10" text-anchor="middle">1</text><text x="405" y="115" font-size="10" text-anchor="middle">0</text><text x="250" y="20" font-size="12" fill="#0077b6" text-anchor="middle">Цифровой сигнал (биты)</text></svg></div><p><strong>3. По способам математического представления:</strong> Детерминированный сигнал – можно вычислить в любой момент по формуле: s(t)=A·cos(2πft+φ). Случайный сигнал – описывается плотностью вероятности p(x), матожиданием m(t)=E[X(t)], дисперсией D(t)=E[(X(t)-m(t))²], корреляционной функцией B(t₁,t₂).</p><p><strong>4. По характеру физического процесса:</strong> Случайный процесс (тепловой шум, речевой сигнал, замирания) / неслучайный (синусоида, меандр, прямоугольный импульс).</p>`,
  detailed:`<p><strong>ПОДРОБНАЯ КЛАССИФИКАЦИЯ С ПРИМЕРАМИ И ГРАФИКАМИ:</strong></p>
<p><strong>📂 По виду передаваемого сообщения:</strong><br>• Аудио (речь: полоса 300-3400 Гц, музыка: 20-20000 Гц) – после АЦП превращается в цифровой поток.<br>• Текст – каждый символ кодируется кодом ASCII/Unicode (8-16 бит).<br>• Изображение – растровое (пиксели) или векторное. Для передачи по каналу сжимается JPEG.<br>• Видео – последовательность кадров (25-60 кадров/с) + звук. Сжатие H.264/HEVC.</p>
<p><strong>📊 По форме сигнала во временной области:</strong><br>• <strong>Аналоговый:</strong> s(t) ∈ ℝ, определён в каждый момент. Пример: напряжение на выходе микрофона.<br>• <strong>Дискретный по времени:</strong> s[n]=s(nT) – последовательность отсчётов. Получается после дискретизации.<br>• <strong>Цифровой (квантованный):</strong> каждый отсчёт принадлежит конечному множеству уровней. Пример: PCM (импульсно-кодовая модуляция).</p>
<p><strong>📐 По способам математического представления:</strong><br><strong>Детерминированный сигнал:</strong> может быть описан аналитически. Энергия E=∫|s(t)|²dt, спектр S(f)=∫s(t)e^{-j2πft}dt. Пример: s(t)=A·rect(t/τ), s(t)=sinc(πt/τ).<br><strong>Случайный сигнал:</strong> для описания используются вероятностные характеристики. Пример: белый гауссовский шум n(t) с E[n(t)]=0, E[n(t)n(t+τ)]=(N₀/2)δ(τ). Для стационарного случайного процесса применяется теорема Винера-Хинчина: G(f)=∫B(τ)e^{-j2πfτ}dτ.</p>
<p><strong>🧬 По характеру физического процесса:</strong><br>Выделяют также стационарные (матожидание постоянно, корреляция зависит только от разности моментов) и нестационарные, эргодические (среднее по времени равно среднему по ансамблю) и неэргодические. Примеры стационарных: тепловой шум, стационарные помехи. Нестационарные: речевой сигнал, замирания в канале при движении.</p>
<p><strong>Пример детерминированного сигнала:</strong> s(t)=10·sinc(1000t).<br><strong>Пример случайного сигнала:</strong> n(t) – гауссовский шум с дисперсией σ²=0.1 В².</p>`
},
{
  num:3,
  q:"Виды сигналов: узкополосные (bandpass), низкочастотные (baseband), сложные. Одномерные и многомерные. Параметры сигналов. База сигнала.",
  short:`<p><strong>Низкочастотные (baseband):</strong> спектр от 0 до F_max. Пример: звук с микрофона.</p><p><strong>Узкополосные (bandpass):</strong> спектр сосредоточен вокруг несущей f₀, полоса Δf << f₀. Пример: радиосигнал.</p><p><strong>Сложные сигналы:</strong> база B = T·Δf >> 1 (шумоподобные).</p><p><strong>Одномерные:</strong> один параметр (амплитуда от времени). <strong>Многомерные:</strong> вектор (I/Q составляющие).</p><p><strong>Параметры сигналов:</strong> длительность T, ширина спектра Δf, мощность, динамический диапазон.</p><p><strong>База сигнала:</strong> B = T × Δf. Если B≈1 – простой сигнал, B>>1 – сложный.</p>`,
  full:`<p><strong>Виды сигналов:</strong></p><div class="svg-container"><svg width="600" height="180" viewBox="0 0 600 180"><line x1="50" y1="140" x2="550" y2="140" stroke="#333"/><line x1="50" y1="30" x2="50" y2="150" stroke="#333"/><path d="M80 130 L120 130 L140 50 L180 130 L220 130" fill="#7fb3d5" opacity="0.6" stroke="#2c6e9e" stroke-width="1.5"/><text x="150" y="165" font-size="12" text-anchor="middle">Baseband (0 ÷ F_max)</text><path d="M350 130 L380 60 L410 130 L440 130 L470 60 L500 130" fill="#d5987f" opacity="0.6" stroke="#b64a1a" stroke-width="1.5"/><text x="425" y="165" font-size="12" text-anchor="middle">Bandpass (вокруг f₀)</text><line x1="380" y1="135" x2="380" y2="145" stroke="#b64a1a"/><line x1="470" y1="135" x2="470" y2="145" stroke="#b64a1a"/><text x="425" y="55" font-size="11" fill="#b64a1a" text-anchor="middle">Δf</text></svg></div><p><strong>Сложные сигналы:</strong> база B = T·Δf >> 1. Применяются в GPS, CDMA, радиолокации для повышения помехоустойчивости. Выигрыш обработки G = 10·log₁₀(B) дБ.</p><p><strong>Одномерные и многомерные сигналы:</strong> Одномерный – скалярная функция s(t). Многомерный – векторная функция, например квадратурное представление: s(t)=I(t)·cos(ωt)+Q(t)·sin(ωt). Многомерность позволяет увеличить скорость передачи.</p><p><strong>Параметры сигналов:</strong> длительность T (с), ширина спектра Δf (Гц), динамический диапазон = 20·log₁₀(макс/мин) дБ, пиковая мощность P_peak, средняя мощность P_avg, пик-фактор = P_peak/P_avg.</p><p><strong>База сигнала:</strong> B = T·Δf. Для прямоугольного импульса B≈1 (простейший). Для M-последовательности длины 1023 B=1023 – сложный сигнал.</p>`,
  detailed:`<p><strong>ПОДРОБНО О ВИДАХ СИГНАЛОВ И БАЗЕ:</strong></p>
<p><strong>🔹 Низкочастотные (baseband):</strong> спектр начинается от 0 Гц. Ширина спектра Δf ≈ 1/τ, где τ – длительность импульса. Примеры: звук с микрофона (20 Гц – 20 кГц), видеосигнал, сигналы в Ethernet (PAM-5). Используются в проводных линиях, так как не требуют переноса на несущую.</p>
<p><strong>🔸 Узкополосные (bandpass):</strong> спектр сконцентрирован вокруг несущей f₀, причём Δf ≪ f₀. Получаются умножением baseband-сигнала на гармоническое колебание: s_radio(t)=s_base(t)·cos(2πf₀t). Пример: радиосигнал после модуляции (BPSK, QPSK, QAM).</p>
<p><strong>🔺 Сложные сигналы (шумоподобные):</strong> база B = T·Δf ≫ 1. Чем больше база, тем выше помехоустойчивость и скрытность. Примеры: M-последовательности, коды Баркера, сигналы с линейной частотной модуляцией (ЛЧМ). В GPS используются C/A-коды с B=1023, что даёт выигрыш обработки 30 дБ.</p>
<p><strong>📐 Одномерные и многомерные сигналы:</strong><br>• Одномерный: s(t) – скаляр. Пример: обычный синус, меандр.<br>• Многомерный: представляется вектором (s₁(t), s₂(t), …, s_n(t)). Частный случай – квадратурное представление: (I(t), Q(t)). Позволяет передавать два потока данных в одной полосе частот (QAM).</p>
<p><strong>⚙️ Параметры сигналов (подробно):</strong><br>• Длительность T: время существования сигнала (для импульсных) или характерный интервал (для длительных).<br>• Ширина спектра Δf: обычно определяется по уровню -3 дБ или по интегралу 90% энергии.<br>• Динамический диапазон: отношение максимальной мгновенной мощности к минимальной воспринимаемой.<br>• Пиковая мощность: квадрат максимальной амплитуды.<br>• Средняя мощность: для периодического сигнала P_avg = (1/T)∫|s(t)|²dt.<br>• Пик-фактор (PAR, PAPR): отношение пиковой мощности к средней. Для синуса PAR=2 (3 дБ), для OFDM может достигать 12 дБ.</p>
<p><strong>🧮 База сигнала – ключевая характеристика:</strong><br><div class="formula">B = T × Δf</div>Физический смысл: число независимых отсчётов (степеней свободы) сигнала. Для прямоугольного импульса длительностью τ ширина спектра Δf ≈ 1/τ, произведение ≈1. Для шумоподобного сигнала B = 100…10000. База определяет выигрыш обработки в DSSS: G = 10·log₁₀(B) дБ.</p>
<div class="svg-container"><svg width="500" height="150" viewBox="0 0 500 150"><rect x="30" y="30" width="180" height="90" fill="#d0e8f0" stroke="#0077b6" rx="8"/><text x="120" y="60" font-size="14" text-anchor="middle" font-weight="bold">Простой сигнал</text><text x="120" y="85" font-size="12" text-anchor="middle">B = T·Δf ≈ 1</text><text x="120" y="105" font-size="11" text-anchor="middle">пример: прямоугольный импульс</text><rect x="260" y="30" width="200" height="90" fill="#ffe0cc" stroke="#e67e22" rx="8"/><text x="360" y="60" font-size="14" text-anchor="middle" font-weight="bold">Сложный сигнал</text><text x="360" y="85" font-size="12" text-anchor="middle">B = T·Δf ≫ 1</text><text x="360" y="105" font-size="11" text-anchor="middle">пример: M-последовательность B=1023</text></svg></div>`
},

  num:4,
  q:"Структурная схема современной системы передачи информации. Суть обработки сообщений или сигналов в каждом из ее элементов.",
  short:`<p>Источник → кодирование источника (сжатие) → канальное кодирование (избыточность) → модулятор → канал связи → демодулятор → канальный декодер → декодер источника → получатель.</p><p>Кодирование источника – уменьшение объёма данных. Канальное кодирование – защита от ошибок. Модуляция – перенос на несущую частоту.</p>`,
  full:`<p><strong>Структурная схема современной системы передачи информации:</strong></p><div class="svg-container"><svg width="900" height="220" viewBox="0 0 900 220"><rect x="10" y="90" width="60" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="40" y="114" font-size="10" text-anchor="middle">ИИ</text><line x1="70" y1="110" x2="95" y2="110" stroke="#0077b6"/><rect x="95" y="80" width="80" height="60" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="135" y="102" font-size="9" text-anchor="middle">Кодер</text><text x="135" y="116" font-size="8" text-anchor="middle">источника</text><line x1="175" y1="110" x2="200" y2="110" stroke="#0077b6"/><rect x="200" y="80" width="80" height="60" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="240" y="102" font-size="9" text-anchor="middle">Канальный</text><text x="240" y="116" font-size="8" text-anchor="middle">кодер</text><line x1="280" y1="110" x2="305" y2="110" stroke="#0077b6"/><rect x="305" y="90" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="340" y="114" font-size="10" text-anchor="middle">Модулятор</text><line x1="375" y1="110" x2="400" y2="110" stroke="#0077b6"/><rect x="400" y="90" width="70" height="40" fill="#ffe0e0" stroke="#b60000" rx="6"/><text x="435" y="114" font-size="10" text-anchor="middle">Канал</text><line x1="470" y1="110" x2="495" y2="110" stroke="#0077b6"/><rect x="495" y="90" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="530" y="114" font-size="10" text-anchor="middle">Демод</text><line x1="565" y1="110" x2="590" y2="110" stroke="#0077b6"/><rect x="590" y="80" width="80" height="60" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="630" y="102" font-size="9" text-anchor="middle">Канальный</text><text x="630" y="116" font-size="8" text-anchor="middle">декодер</text><line x1="670" y1="110" x2="695" y2="110" stroke="#0077b6"/><rect x="695" y="80" width="80" height="60" fill="#d0e8f0" stroke="#0077b6" rx="6"/><text x="735" y="102" font-size="9" text-anchor="middle">Декодер</text><text x="735" y="116" font-size="8" text-anchor="middle">источника</text><line x1="775" y1="110" x2="800" y2="110" stroke="#0077b6"/><rect x="800" y="90" width="60" height="40" fill="#e0f0ff" stroke="#0077b6" rx="6"/><text x="830" y="114" font-size="10" text-anchor="middle">Получатель</text></svg></div><p><strong>Суть обработки в каждом элементе:</strong><br>1. <strong>Источник информации (ИИ)</strong> – создаёт исходное сообщение (текст, речь, изображение).<br>2. <strong>Кодер источника</strong> – сжимает данные, убирая статистическую избыточность (алгоритмы Хаффмана, LZW, MP3, JPEG).<br>3. <strong>Канальный кодер</strong> – добавляет избыточность для борьбы с ошибками (свёрточные коды, турбокоды, LDPC).<br>4. <strong>Модулятор</strong> – отображает биты в аналоговый сигнал (BPSK, QPSK, QAM).<br>5. <strong>Канал связи</strong> – среда передачи + шумы + искажения.<br>6. <strong>Демодулятор</strong> – из принятого аналогового сигнала восстанавливает биты (обычно с мягкими решениями LLR).<br>7. <strong>Канальный декодер</strong> – исправляет ошибки, используя избыточность.<br>8. <strong>Декодер источника</strong> – восстанавливает исходное сообщение (распаковывает).<br>9. <strong>Получатель</strong> – человек или устройство.</p>`,
  detailed:`<p><strong>ПОЛНАЯ СТРУКТУРНАЯ СХЕМА С ПОДРОБНЫМ ОПИСАНИЕМ КАЖДОГО БЛОКА:</strong></p>
<ol><li><strong>Источник информации (ИИ)</strong> – может быть аналоговым (микрофон, камера) или цифровым (файл). Для аналогового источника требуется АЦП.</li><li><strong>АЦП (аналого-цифровой преобразователь)</strong> – выполняет дискретизацию (по Котельникову) и квантование. На выходе – цифровой поток битов.</li><li><strong>Кодер источника (source coding)</strong> – сжатие без потерь (Хаффман, LZW) или с потерями (JPEG для изображений, MP3 для звука, H.264 для видео). Уменьшает битрейт в 5–50 раз за счёт удаления избыточности и незначимых для восприятия деталей.</li><li><strong>Канальный кодер (channel coding)</strong> – вводит контролируемую избыточность. Примеры: свёрточные коды со скоростью R=1/2 (добавляет один избыточный бит на каждый информационный), турбокоды (используются в 3G/4G), LDPC (в DVB-S2, 5G), полярные коды (в 5G). Позволяет обнаруживать и исправлять ошибки на приёме.</li><li><strong>Перемежитель (interleaver)</strong> – перемешивает биты во времени, чтобы пакеты ошибок (например, после замираний) превратились в независимые ошибки, которые легче исправлять декодеру. Используется в каналах с памятью.</li><li><strong>Модулятор (modulator)</strong> – отображает биты в аналоговый сигнал. Для полосовой модуляции: каждый символ (группа битов) задаёт амплитуду и фазу несущей. Примеры: BPSK (1 бит/символ), QPSK (2 бита/символ), 16QAM (4 бита/символ).</li><li><strong>Формирователь импульсов (pulse shaping filter)</strong> – ограничивает спектр сигнала, чтобы он вписался в отведённую полосу частот. Чаще всего используется фильтр с приподнятым косинусом (raised cosine) с параметром roll-off α (0.2–0.35).</li><li><strong>Квадратурный смеситель</strong> – умножает I-составляющую на cos(2πf₀t), Q-составляющую на sin(2πf₀t) и складывает. Получается радиосигнал: s(t)=I(t)·cos(ω₀t)+Q(t)·sin(ω₀t).</li><li><strong>Усилитель мощности (PA)</strong> – увеличивает мощность сигнала для передачи через антенну. Имеет нелинейную характеристику, что важно для сигналов с высоким PAPR (OFDM).</li><li><strong>Линия связи (канал)</strong> – физическая среда: медный кабель, оптоволокно, радиотрасса. На этом этапе добавляются шумы (AWGN), затухание, многолучевость, доплеровский сдвиг.</li><li><strong>Малошумящий усилитель (LNA)</strong> – на входе приёмника усиливает слабый сигнал, внося минимальный собственный шум.</li><li><strong>Квадратурный демодулятор</strong> – умножает принятый сигнал на cos(ω₀t) и sin(ω₀t), затем пропускает через ФНЧ, выделяя I и Q составляющие.</li><li><strong>Демодулятор (мягкий)</strong> – вычисляет для каждого бита логарифм отношения правдоподобия (LLR). LLR = ln(P(бит=1|сигнал)/P(бит=0|сигнал)). Знак LLR даёт жёсткое решение, а модуль – уверенность.</li><li><strong>Деинтерлейвер</strong> – восстанавливает исходный порядок битов.</li><li><strong>Канальный декодер</strong> – использует избыточность для исправления ошибок. Для свёрточных кодов – алгоритм Витерби, для турбокодов – итеративный декодер (MAP/BCJR), для LDPC – алгоритм передачи сообщений (belief propagation).</li><li><strong>Декодер источника</strong> – распаковывает сжатые данные, восстанавливая исходный формат (например, декодирование JPEG/MP3).</li><li><strong>ЦАП (цифро-аналоговый преобразователь)</strong> – если получателю нужен аналоговый сигнал (звук, видео).</li><li><strong>Получатель</strong> – человек или устройство, воспринимающее информацию.</li></ol>
<p><strong>КЛЮЧЕВАЯ СУТЬ:</strong> Кодер источника уменьшает объём данных, канальный кодер защищает от ошибок, модулятор адаптирует сигнал к среде. На приёме – обратные преобразования с исправлением ошибок.</p>`
},
{
  num:5,
  q:"Помехи в канале связи, виды источников помех, классификация видов помех, примеры. Узкополосная, сосредоточенная помеха. Заградительная помеха. Повышение помехоустойчивости канала связи.",
  short:`<p><strong>Виды источников помех:</strong> естественные (грозы, Солнце), техногенные (другие передатчики, ЛЭП), внутренние (тепловой шум).</p><p><strong>Классификация помех:</strong> по спектру (узкополосные, широкополосные), по длительности (непрерывные, импульсные).</p><p><strong>Узкополосная помеха:</strong> Δf_п << Δf_с. Пример: синусоида от соседнего передатчика. <strong>Сосредоточенная:</strong> частный случай, строго гармоническая. <strong>Заградительная:</strong> искусственно создаваемая, перекрывает всю полосу сигнала.</p><p><strong>Повышение помехоустойчивости:</strong> кодирование, расширение спектра (DSSS, FHSS), пространственное разнесение (MIMO), фильтрация, адаптивная модуляция.</p>`,
  full:`<p><strong>Источники помех:</strong><br>• <strong>Естественные:</strong> грозовые разряды (импульсные, широкополосные), солнечные вспышки, космическое радиоизлучение (радиогалактики, Юпитер).<br>• <strong>Техногенные:</strong> другие радиопередатчики (интерференция), линии электропередач (коронный разряд), искрение в электродвигателях, зажигание автомобилей, гармоники цифровых устройств.<br>• <strong>Внутриаппаратные:</strong> тепловой (джонсоновский) шум резисторов (N₀=kT), дробовой шум в полупроводниках, фликкер-шум (1/f).</p><div class="svg-container"><svg width="600" height="140" viewBox="0 0 600 140"><rect x="20" y="20" width="160" height="100" fill="#ffe0e0" stroke="#b60000" rx="8"/><text x="100" y="50" font-size="12" text-anchor="middle" font-weight="bold">Узкополосная</text><text x="100" y="70" font-size="10" text-anchor="middle">синус 100.1 МГц</text><text x="100" y="90" font-size="10" text-anchor="middle">Δf_п = 100 Гц</text><text x="100" y="110" font-size="10" text-anchor="middle">Δf_с = 100 кГц</text><rect x="220" y="20" width="160" height="100" fill="#fff0cc" stroke="#e67e22" rx="8"/><text x="300" y="50" font-size="12" text-anchor="middle" font-weight="bold">Сосредоточенная</text><text x="300" y="70" font-size="10" text-anchor="middle">CW (синус)</text><text x="300" y="90" font-size="10" text-anchor="middle">одна частота</text><rect x="420" y="20" width="160" height="100" fill="#d0e8f0" stroke="#0077b6" rx="8"/><text x="500" y="50" font-size="12" text-anchor="middle" font-weight="bold">Заградительная</text><text x="500" y="70" font-size="10" text-anchor="middle">намеренно широкая</text><text x="500" y="90" font-size="10" text-anchor="middle">перекрывает сигнал</text></svg></div><p><strong>Классификация помех:</strong><br>• <strong>По спектру:</strong> узкополосные (Δf_п << Δf_с), широкополосные (Δf_п ≥ Δf_с, например AWGN).<br>• <strong>По длительности:</strong> непрерывные (действуют постоянно), импульсные (короткие всплески).<br>• <strong>По происхождению:</strong> естественные, техногенные, внутриаппаратные.</p><p><strong>Повышение помехоустойчивости:</strong> помехоустойчивое кодирование (LDPC, турбокоды), расширение спектра (DSSS с выигрышем G=B, FHSS), пространственное разнесение (MIMO, антенные решётки), адаптивная фильтрация (режекторные фильтры для узкополосных помех, LMS/RLS), методы с обратной связью (ARQ, HARQ), адаптивная модуляция и кодирование (AMC).</p>`,
  detailed:`<p><strong>ПОДРОБНЕЙШАЯ КЛАССИФИКАЦИЯ ПОМЕХ И МЕТОДЫ БОРЬБЫ:</strong></p>
<p><strong>📌 Источники помех (расширенно):</strong><br>• <strong>Естественные:</strong> грозовые разряды (длительность ~50 мкс, спектр до 100 МГц), солнечные вспышки (излучение в широком диапазоне), космический фон (микроволновое излучение с температурой ~2.7 К).<br>• <strong>Техногенные:</strong> индустриальные помехи от сварочных аппаратов, электродвигателей, линий электропередач (гармоники 50 Гц и выше), работа соседних радиопередатчиков (интерференция), цифровые устройства (тактовые частоты и их гармоники).<br>• <strong>Внутриаппаратные:</strong> тепловой шум – спектральная плотность N₀=kT, где k=1.38·10⁻²³ Дж/К, T – абсолютная температура. При T=290 К N₀≈4·10⁻²¹ Вт/Гц (≈ -174 дБм/Гц). Дробовой шум – возникает при прохождении тока через потенциальный барьер (p-n переход). Фликкер-шум (1/f) – преобладает на низких частотах.</p>
<p><strong>📊 Классификация помех (детально):</strong><br><strong>По спектру:</strong><br>- <strong>Узкополосная помеха (Нarrowband interference):</strong> Δf_п ≪ Δf_с. Пример: синусоидальный сигнал от другого передатчика на частоте 100.1 МГц при полезном сигнале 100 МГц ± 50 кГц. Ширина спектра помехи 100 Гц, сигнала 100 кГц. Подавляется режекторным фильтром.<br>- <strong>Сосредоточенная помеха (CW – Continuous Wave):</strong> частный случай узкополосной, строго гармоническая: I(t)=A·cos(2πf_п t+φ). Математически – одна спектральная линия.<br>- <strong>Заградительная помеха (Barrage jamming):</strong> специально создаваемая в радиоэлектронной борьбе помеха, занимающая полосу, равную или большую полосы сигнала. Может быть шумовой (AWGN) или состоять из множества узкополосных сигналов.<br>- <strong>Широкополосная (флуктуационная):</strong> спектр помехи перекрывает сигнал. Пример: белый гауссовский шум с постоянной спектральной плотностью G_n(f)=N₀/2.<br><strong>По длительности:</strong><br>- <strong>Непрерывные:</strong> действуют постоянно (тепловой шум, помеха от соседней радиостанции).<br>- <strong>Импульсные:</strong> короткие всплески с большой амплитудой и низкой скважностью. Пример: помехи от зажигания автомобиля (длительность 1–10 мкс, частота следования 100–1000 Гц), атмосферные трески.</p>
<p><strong>🛡️ Повышение помехоустойчивости (методы с количественными оценками):</strong><br>1. <strong>Помехоустойчивое кодирование (канальное кодирование):</strong><br>   • Свёрточные коды + декодер Витерби – выигрыш 4-6 дБ при BER=10⁻⁵.<br>   • Турбокоды (3G/4G) – приближаются к пределу Шеннона на 0.5–1 дБ.<br>   • LDPC (DVB-S2, 5G) – при длине кода 64800 бит могут работать в 0.1 дБ от предела.<br>   • Полярные коды (5G для канала управления).<br>2. <strong>Расширение спектра (Spread Spectrum):</strong><br>   • DSSS (Direct Sequence): бит умножается на ПСП с частотой чипов f_c = N·f_b. Выигрыш обработки G = N = T_b/T_c = B (база сигнала). Для GPS C/A-код N=1023 → G=30 дБ.<br>   • FHSS (Frequency Hopping): частота несущей прыгает по псевдослучайному закону (Bluetooth: 1600 хоп/с, 79 каналов). Помеха задевает только часть пакетов.<br>   • Chirp (LoRa CSS): устойчив к доплеру и узкополосным помехам.<br>3. <strong>Пространственная обработка (антенные решётки, MIMO):</strong><br>   • Адаптивная диаграмма направленности (алгоритмы LMS, RLS) – формирует «ноль» в сторону источника помехи. Подавление до 20–30 дБ.<br>   • MIMO с разнесением (STBC, пространственное мультиплексирование) – улучшение SNR за счёт сложения сигналов от разных антенн.<br>4. <strong>Фильтрация помех:</strong><br>   • Режекторные фильтры (вырезают узкую полосу) – для CW помех.<br>   • Адаптивные фильтры (LMS, RLS) – для меняющихся условий.<br>   • Подавление в частотной области (FFT + вырезание пиков спектра).<br>5. <strong>Методы с обратной связью:</strong><br>   • ARQ (Automatic Repeat reQuest) – переспрос ошибочных пакетов.<br>   • HARQ (Hybrid ARQ) – комбинация ARQ с кодированием, используется в LTE/5G.<br>6. <strong>Адаптивная модуляция и кодирование (AMC):</strong><br>   • При плохом канале – низшая модуляция (BPSK) и низкая кодовая скорость (R=1/3).<br>   • При хорошем канале – 256QAM и высокая кодовая скорость (R=5/6).<br>   • Повышает среднюю пропускную способность в 2-4 раза по сравнению с фиксированной модуляцией.</p>
<p><strong>Критерий помехоустойчивости</strong> – минимум вероятности ошибки бита (BER) при заданном отношении сигнал/шум (SNR) или максимум отношения правдоподобия (критерий Котельникова).</p>`
},
{
  num:6,
  q:"Примеры представления сигналов математическими выражениями. Запись аналогового и дискретного гармонического сигнала. Отличие в математическом описании детерминированных и случайных сигналов.",
  short:`<p><strong>Аналоговый гармонический сигнал:</strong> s(t)=A·cos(2πft+φ).</p><p><strong>Дискретный гармонический сигнал:</strong> s[n]=A·cos(2πFn+φ), где F = f/f_д – нормированная частота.</p><p><strong>Детерминированный сигнал</strong> – точное значение в любой момент, описывается функцией. Пример: s(t)=sinc(πt/τ).</p><p><strong>Случайный сигнал</strong> – описывается вероятностными характеристиками: плотностью p(x), матожиданием m(t), дисперсией D(t), корреляцией B(τ).</p>`,
  full:`<p><strong>Примеры математического представления сигналов:</strong></p><p><strong>Аналоговый гармонический сигнал:</strong> <div class="formula">s(t)=A·cos(2πf₀t+φ)</div> где A – амплитуда (В), f₀ – частота (Гц), φ – начальная фаза (рад). Сигнал определён для любого t ∈ ℝ.</p><p><strong>Дискретный гармонический сигнал (после дискретизации с частотой f_д):</strong> <div class="formula">s[n]=s(nT)=A·cos(2πf₀·nT+φ)=A·cos(2πF n+φ)</div> где T=1/f_д – период дискретизации, F = f₀/f_д – нормированная частота (0 ≤ F ≤ 0.5 по Котельникову).</p><p><strong>Детерминированные сигналы:</strong> описываются точной функцией времени. Примеры:<br>• Прямоугольный импульс: s(t)=A·rect(t/τ) = A при |t|<τ/2, иначе 0.<br>• Функция sinc: s(t)=A·sinc(πt/τ)=A·sin(πt/τ)/(πt/τ).<br>• Экспоненциальный импульс: s(t)=A·e^{-t/τ}·1(t).<br>Для детерминированных сигналов определены энергия E=∫|s(t)|²dt, преобразование Фурье S(f)=∫s(t)e^{-j2πft}dt.</p><p><strong>Случайные сигналы:</strong> описываются вероятностными характеристиками:<br>• Плотность вероятности p(x).<br>• Матожидание m(t)=E[X(t)]=∫x·p(x,t)dx.<br>• Дисперсия D(t)=E[(X(t)-m(t))²].<br>• Корреляционная функция B(t₁,t₂)=E[(X(t₁)-m(t₁))·(X(t₂)-m(t₂))].<br>Пример: белый гауссовский шум n(t) с E[n(t)]=0, E[n(t)n(t+τ)]=(N₀/2)δ(τ).</p>`,
  detailed:`<p><strong>ПОДРОБНОЕ ОПИСАНИЕ С ФОРМУЛАМИ И ПРИМЕРАМИ:</strong></p>
<p><strong>📈 Аналоговый гармонический сигнал (непрерывный):</strong><br><div class="formula">s(t)=A·cos(2πf₀t+φ) = A·cos(ω₀t+φ)</div> где ω₀=2πf₀ – круговая частота (рад/с). Сигнал периодический с периодом T₀=1/f₀. Энергия на периоде: E_период = A²·T₀/2. Средняя мощность: P_ср = A²/2.</p>
<p><strong>📉 Дискретный гармонический сигнал (отсчёты):</strong><br>Получается из аналогового путём дискретизации с периодом T = 1/f_д:<br><div class="formula">s[n]=s(nT)=A·cos(2πf₀ nT + φ) = A·cos(2πF n + φ)</div> где F = f₀/f_д – нормированная частота. По теореме Котельникова, для восстановления без потерь необходимо f_д ≥ 2f₀, т.е. F ≤ 0.5. Если F > 0.5, возникает алиасинг – высокие частоты маскируются под низкие.</p>
<p><strong>🔷 Детерминированные сигналы (примеры с формулами):</strong><br>• <strong>Прямоугольный импульс:</strong> s(t)=A·rect(t/τ) = A при |t| ≤ τ/2, иначе 0. Спектр S(f)=Aτ·sinc(πfτ). Энергия E=A²τ.<br>• <strong>Гауссов импульс:</strong> s(t)=A·exp(-t²/(2σ²)). Спектр S(f)=Aσ√(2π)·exp(-2π²σ²f²) – тоже гауссов. Обладает минимальным произведением Δt·Δf.<br>• <strong>Радиоимпульс:</strong> s(t)=A·rect(t/τ)·cos(2πf₀t). Спектр S(f)=(Aτ/2)[sinc(π(f-f₀)τ)+sinc(π(f+f₀)τ)].<br>• <strong>Линейно-частотно-модулированный (ЛЧМ):</strong> s(t)=A·rect(t/τ)·cos(2πf₀t+πμt²), где μ – скорость изменения частоты.</p>
<p><strong>🎲 Случайные сигналы (математическое описание):</strong><br>Случайный процесс X(t) – семейство случайных величин, индексированных временем. Для его полного описания нужна многомерная плотность вероятности. На практике чаще используют моменты первого и второго порядка:<br>• <strong>Матожидание (среднее значение):</strong> m_X(t)=E[X(t)].<br>• <strong>Дисперсия (мощность переменной составляющей):</strong> D_X(t)=E[(X(t)-m_X(t))²].<br>• <strong>Корреляционная функция:</strong> B_X(t₁,t₂)=E[(X(t₁)-m_X(t₁))·(X(t₂)-m_X(t₂))].<br>Для стационарного в широком смысле процесса m_X(t)=const, B_X(t₁,t₂)=B_X(τ), где τ=t₂-t₁.<br><strong>Примеры:</strong><br>• <strong>Белый гауссовский шум (WGN):</strong> E[n(t)]=0, B_n(τ)=(N₀/2)δ(τ). Спектральная плотность G_n(f)=N₀/2.<br>• <strong>Цветной шум (например, на выходе RC-фильтра):</strong> B_n(τ)=(N₀/(4RC))·exp(-|τ|/(RC)).</p>
<p><strong>🔁 Отличие в математическом описании:</strong><br>Для детерминированных сигналов мы имеем точные значения s(t) для любого t. Все интегралы (энергия, преобразование Фурье) сходятся. Для случайных сигналов мы оперируем средними по ансамблю. Если процесс эргодический, то среднее по времени равно среднему по ансамблю, что позволяет оценивать характеристики по одной реализации.</p>
<p><strong>Пример для экзамена:</strong><br>Детерминированный: s(t)=10·sinc(1000t). Вычислить энергию E=10²·(1/1000)=0.1 Дж.<br>Случайный: n(t) – гауссовский процесс с E[n]=0, E[n²]=0.01 В². Найти вероятность того, что |n|>0.1 В: P=2·Q(0.1/0.1)=2·Q(1)≈0.317.</p>`
},

  num:7,
  q:"Энергия и мощность сигналов, понятие энергетических и мощностных сигналов. Взаимная энергия ортогональных сигналов.",
  short:`<p><strong>Энергия сигнала:</strong> E = ∫|s(t)|²dt. <strong>Мощность сигнала:</strong> P = lim_{T→∞} (1/T)∫|s(t)|²dt.</p><p><strong>Энергетический сигнал</strong> – имеет конечную энергию (одиночный импульс). <strong>Мощностной сигнал</strong> – имеет конечную среднюю мощность (периодический сигнал, случайный стационарный).</p><p><strong>Взаимная энергия ортогональных сигналов:</strong> ∫ s₁(t)s₂(t)dt = 0.</p>`,
  full:`<p><strong>Энергия сигнала (для детерминированных сигналов конечной длительности):</strong> <div class="formula">E = ∫_{-∞}^{∞} |s(t)|² dt</div> Единица измерения: Джоуль (Дж).</p><p><strong>Средняя мощность сигнала:</strong> <div class="formula">P = lim_{T→∞} \\frac{1}{T} ∫_{-T/2}^{T/2} |s(t)|² dt</div> Единица измерения: Ватт (Вт).</p><p><strong>Энергетические сигналы:</strong> E < ∞, P = 0. Пример: одиночный прямоугольный импульс, одиночный радиоимпульс, функции с финитным спектром.</p><p><strong>Мощностные сигналы:</strong> P > 0, E = ∞. Пример: синусоида (P=A²/2), периодическая последовательность импульсов, стационарный случайный процесс.</p><p><strong>Взаимная энергия двух сигналов:</strong> <div class="formula">E_{12} = ∫_{-∞}^{∞} s₁(t)s₂(t) dt</div> Если сигналы ортогональны, то E₁₂ = 0.</p>`,
  detailed:`<p><strong>ПОДРОБНОЕ ОПИСАНИЕ ЭНЕРГИИ, МОЩНОСТИ И ОРТОГОНАЛЬНОСТИ:</strong></p>
<p><strong>📐 Энергия сигнала (физический смысл):</strong> Энергия, выделяемая на резисторе сопротивлением 1 Ом, если сигнал s(t) – напряжение. Для сигнала с конечной длительностью или быстро убывающего (s(t)→0 при t→±∞) энергия конечна.</p>
<p><strong>Пример вычисления энергии:</strong><br>• Прямоугольный импульс: s(t)=A·rect(t/τ). E = ∫_{-τ/2}^{τ/2} A² dt = A²τ.<br>• Экспоненциальный импульс: s(t)=A·e^{-t/τ}·1(t). E = ∫_{0}^{∞} A²·e^{-2t/τ} dt = A²τ/2.<br>• Синусоида (на конечном интервале T): E = (A²/2)·T (при целом числе периодов).</p>
<p><strong>📊 Средняя мощность (физический смысл):</strong> Среднее значение квадрата сигнала за большое время. Для периодических сигналов с периодом T₀: P = (1/T₀)∫_{0}^{T₀} |s(t)|²dt.<br>• Синусоида: s(t)=A·cos(ωt) → P = A²/2.<br>• Меандр (скважность 2, амплитуда A): P = A²/2.<br>• Последовательность прямоугольных импульсов с амплитудой A, длительностью τ, периодом T: P = A²·(τ/T).</p>
<p><strong>🔍 Классификация сигналов по энергии/мощности:</strong><br>• <strong>Энергетические сигналы</strong> – используются в импульсных системах (радиолокация, UWB). Ключевая характеристика – форма импульса, ширина спектра.<br>• <strong>Мощностные сигналы</strong> – используются в непрерывной связи (радиовещание, сотовая связь). Ключевая характеристика – отношение сигнал/шум (SNR).</p>
<p><strong>🔗 Взаимная энергия и ортогональность:</strong><br><div class="formula">E_{12} = ∫_{-∞}^{∞} s₁(t)s₂(t) dt</div> Если E₁₂ = 0, сигналы ортогональны. <strong>Физический смысл:</strong> ортогональные сигналы можно передавать одновременно по одному каналу без взаимных помех при использовании оптимального приёма (корреляционного).<br><strong>Примеры ортогональных сигналов:</strong><br>• sin(2πf₀t) и cos(2πf₀t) на интервале, кратном периоду.<br>• Два прямоугольных импульса, неперекрывающиеся во времени.<br>• Коды Уолша в CDMA.<br>• Поднесущие OFDM с разносом Δf=1/T.</p>

{
  num:8,
  q:"Классификация способов представления сигналов. Векторное представление сигналов. Обобщенный ряд Фурье, его необходимость.",
  short:`<p><strong>Способы представления сигналов:</strong> временное (осциллограмма), спектральное (частотная область), векторное (в ортогональном базисе).</p><p><strong>Векторное представление:</strong> сигнал s(t) представляется вектором (c₁, c₂, …, c_N) в N-мерном пространстве, где c_k = ∫ s(t) ψ_k(t) dt, а ψ_k(t) – ортонормированные базисные функции.</p><p><strong>Обобщённый ряд Фурье:</strong> s(t) = Σ a_k φ_k(t), где φ_k(t) – ортогональные функции. Необходим для аппроксимации, сжатия, анализа сигналов.</p>`,
  full:`<p><strong>Классификация способов представления сигналов:</strong><br>1. <strong>Временное представление:</strong> s(t) как функция времени. Наглядно показывает форму, длительность, амплитуду. Используется в осциллографах.<br>2. <strong>Спектральное представление:</strong> S(f) = ∫ s(t)e^{-j2πft}dt – комплексная спектральная плотность. Показывает распределение энергии/мощности по частотам.<br>3. <strong>Векторное представление:</strong> сигнал разлагается по ортогональному базису {ψ_k(t)}: s(t) ≈ Σ c_k ψ_k(t). Координаты c_k = ∫ s(t) ψ_k(t) dt. Сигнал отображается точкой в многомерном пространстве (сигнальное созвездие).<br>4. <strong>Статистическое представление:</strong> для случайных сигналов – плотности вероятности, моменты, корреляционные функции.</p><p><strong>Векторное представление сигналов:</strong> Позволяет использовать геометрические методы для анализа помехоустойчивости. Расстояние между векторами (Евклидова норма) равно энергии разности сигналов. Для двоичных сигналов вероятность ошибки определяется расстоянием между созвездиями.</p><p><strong>Обобщённый ряд Фурье:</strong> s(t) = Σ_{k=1}^{∞} a_k φ_k(t), где φ_k(t) – ортогональные функции, т.е. ∫ φ_i(t)φ_j(t)dt = 0 при i≠j. Коэффициенты a_k = (∫ s(t)φ_k(t)dt) / (∫ φ_k²(t)dt). <strong>Необходимость:</strong> позволяет анализировать и синтезировать сигналы с заданными свойствами, сжимать данные, реализовывать оптимальные приёмники.</p>`,
  detailed:`<p><strong>ПОДРОБНО О ВСЕХ СПОСОБАХ ПРЕДСТАВЛЕНИЯ СИГНАЛОВ:</strong></p>
<p><strong>📈 1. Временное представление (осциллограмма):</strong><br>s(t) – график зависимости напряжения/тока от времени. Достоинства: наглядность, легко измерить амплитуду, длительность, фронты. Недостатки: не видно частотного состава. Применение: контроль формы сигнала, измерение задержек.</p>
<p><strong>🌊 2. Спектральное представление (частотная область):</strong><br>Для периодических сигналов – ряд Фурье (дискретные гармоники). Для непериодических – преобразование Фурье S(f) – непрерывный спектр. Достоинства: видно, какие частоты содержит сигнал, легко рассчитать фильтрацию. Недостатки: теряется информация о временной структуре (но можно использовать кратковременное преобразование Фурье – спектрограмму).</p>
<p><strong>📐 3. Векторное представление (в ортогональном базисе):</strong><br>Выбираем ортонормированный базис {ψ_k(t)}: ∫ ψ_i(t)ψ_j(t)dt = δ_{ij} (дельта Кронекера). Тогда любой сигнал из пространства L₂ можно представить в виде s(t) = Σ_{k=1}^{∞} c_k ψ_k(t), где c_k = ∫ s(t) ψ_k(t) dt. Вектор (c₁, c₂, …, c_N) – координаты сигнала в N-мерном пространстве. На практике N конечно (сигнал имеет ограниченную полосу и длительность).<br><strong>Пример:</strong> для квадратурной модуляции базисные функции ψ₁(t)=√(2/T)·cos(2πf₀t) и ψ₂(t)=√(2/T)·sin(2πf₀t). Тогда сигнал s(t)=I·ψ₁(t)+Q·ψ₂(t), а вектор (I,Q) – сигнальное созвездие.<br><strong>Преимущества:</strong> геометрическая интерпретация помехоустойчивости – вероятность ошибки определяется расстоянием между точками созвездия.</p>
<p><strong>📊 4. Обобщённый ряд Фурье (почему он необходим):</strong><br>Классический ряд Фурье использует sin/cos – это частный случай обобщённого. Но можно выбирать другие ортогональные базисы в зависимости от задачи:<br>• <strong>Базис Хаара (ступенчатые функции):</strong> используется в вейвлет-анализе.<br>• <strong>Базис Уолша (прямоугольные функции +1/-1):</strong> применяется в цифровой обработке сигналов для быстрых преобразований.<br>• <strong>Базис из сдвинутых sinc-функций:</strong> ряд Котельникова для восстановления сигнала по отсчётам.<br>• <strong>Базис из экспоненциальных функций (e^{j2πkf₀t}):</strong> комплексный ряд Фурье.<br><strong>Необходимость обобщённого ряда Фурье:</strong> позволяет адаптировать разложение под свойства сигнала, достичь наилучшей аппроксимации при ограниченном числе членов (сжатие). В системах связи используется для ортогонального мультиплексирования (OFDM, CDMA).</p>

  num:9,
  q:"Ортогональность сигналов. Ортонормированный базис. Примеры использования ортогональных сигналов в области связи.",
  short:`<p><strong>Ортогональность сигналов:</strong> ∫ s_i(t) s_j(t) dt = 0 при i≠j.</p><p><strong>Ортонормированный базис:</strong> ортогональные функции с единичной нормой (∫ ψ_k²(t) dt = 1).</p><p><strong>Примеры использования в связи:</strong> OFDM (ортогональные поднесущие), CDMA (коды Уолша), квадратурная модуляция (cos и sin ортогональны).</p>`,
  full:`<p><strong>Ортогональность сигналов:</strong> Два сигнала s₁(t) и s₂(t) ортогональны на интервале [a,b], если их скалярное произведение равно нулю: ∫_a^b s₁(t) s₂(t) dt = 0. Физический смысл: при передаче ортогональных сигналов по одному каналу они не создают взаимных помех при оптимальном (корреляционном) приёме.</p><p><strong>Ортонормированный базис:</strong> Система функций {ψ_k(t)} называется ортонормированной, если ∫ ψ_i(t) ψ_j(t) dt = δ_{ij} (δ_{ij}=1 при i=j, иначе 0). Любой сигнал из пространства L₂ можно разложить по такому базису: s(t) = Σ c_k ψ_k(t), где c_k = ∫ s(t) ψ_k(t) dt.</p><p><strong>Примеры использования ортогональных сигналов в связи:</strong><br>1. <strong>OFDM (Orthogonal Frequency-Division Multiplexing):</strong> Поднесущие ψ_k(t)=e^{j2πkΔf t} ортогональны на интервале T, если Δf = 1/T. Благодаря этому поднесущие не мешают друг другу, и можно использовать простое FFT-демодулирование.<br>2. <strong>CDMA (Code Division Multiple Access):</strong> Коды Уолша (Walsh-Hadamard) ортогональны: ∫ W_i(t) W_j(t) dt = 0 при i≠j. Позволяют разным пользователям передавать сигналы одновременно в одной полосе частот.<br>3. <strong>Квадратурная модуляция (QAM, QPSK):</strong> Функции cos(2πf₀t) и sin(2πf₀t) ортогональны на интервале T, кратном периоду. Это позволяет передавать два независимых потока (I и Q) в одной полосе.<br>4. <strong>Разложение в ряд Фурье:</strong> Синусы и косинусы разных частот ортогональны на интервале, кратном периоду.<br>5. <strong>Коды Баркера и M-последовательности:</strong> Имеют малую взаимную корреляцию (приближённую ортогональность), используются для синхронизации и расширения спектра.</p>`,
  detailed:`<p><strong>ПОДРОБНОЕ ОБЪЯСНЕНИЕ ОРТОГОНАЛЬНОСТИ И ЕЁ ПРИМЕНЕНИЯ:</strong></p>
<p><strong>📐 Математическое определение ортогональности:</strong><br>Сигналы s₁(t) и s₂(t) ортогональны на интервале [a,b] с весом w(t), если:<br><div class="formula">∫_a^b s₁(t) s₂(t) w(t) dt = 0</div> Чаще всего w(t)=1. В комплексном случае используется скалярное произведение ∫ s₁(t) s₂*(t) dt = 0.</p>
<p><strong>📊 Ортонормированный базис:</strong> Помимо ортогональности требуется нормировка: ∫ ψ_k²(t) dt = 1. Тогда разложение s(t) = Σ c_k ψ_k(t) имеет коэффициенты c_k = ∫ s(t) ψ_k(t) dt. Это точный аналог разложения вектора по ортонормированному базису в евклидовом пространстве. Квадрат нормы (энергия) сигнала: E = Σ c_k² (теорема Парсеваля для обобщённого ряда).</p>
<p><strong>📡 Пример 1: OFDM (поднесущие ортогональны)</strong><br>Поднесущие: ψ_k(t)=e^{j2πkΔf t} для k=0,…,N-1 на интервале [0,T]. Их скалярное произведение:<br>∫_0^T e^{j2πkΔf t}·e^{-j2πmΔf t} dt = ∫_0^T e^{j2π(k-m)Δf t} dt = T·δ_{km} при Δf = 1/T. Таким образом, поднесущие ортогональны. Это позволяет передавать символы независимо по каждой поднесущей и использовать FFT для демодуляции.</p>
<p><strong>📡 Пример 2: CDMA (коды Уолша)</strong><br>Коды Уолша длины N = 2^n – это матрица ортогональных последовательностей из +1 и -1. Например, для N=4:<br>W₀ = (1,1,1,1), W₁=(1,-1,1,-1), W₂=(1,1,-1,-1), W₃=(1,-1,-1,1). Скалярное произведение любых двух разных кодов равно 0. В системах CDMA каждый пользователь передаёт свой сигнал, умноженный на уникальный код Walsh. На приёме корреляция с нужным кодом выделяет сигнал этого пользователя, подавляя остальных.</p>
<p><strong>📡 Пример 3: Квадратурная модуляция (I/Q)</strong><br>Базисные функции: ψ_I(t)=√(2/T)·cos(2πf₀t), ψ_Q(t)=√(2/T)·sin(2πf₀t). Их скалярное произведение на интервале T, кратном периоду несущей, равно 0. Поэтому сигнал s(t)=I·ψ_I(t)+Q·ψ_Q(t) может передавать 2 бита на символ (QPSK) или больше (QAM).</p>
<p><strong>📡 Пример 4: Ряд Котельникова (функции отсчётов)</strong><br>Базисные функции ψ_k(t)=sinc(π(t-kT)/T) ортогональны: ∫ sinc(π(t-kT)/T)·sinc(π(t-mT)/T) dt = T·δ_{km}. Это позволяет восстанавливать сигнал по его отсчётам.</p>
<p><strong>📡 Пример 5: Коды Баркера и M-последовательности (псевдоортогональность)</strong><br>Для DSSS нужны последовательности с малой взаимной корреляцией. Коды Баркера длиной 13 имеют пик АКФ 13 и боковые лепестки 0 или ±1. M-последовательности длины N=2ⁿ-1 имеют периодическую АКФ с боковым лепестком -1/N. Это позволяет разным пользователям с разными сдвигами не мешать друг другу.</p>

{
  num:10,
  q:"Понятие спектра сигнала. Спектральный анализ периодических сигналов.",
  short:`<p><strong>Спектр сигнала</strong> – разложение сигнала на гармонические составляющие (синусоиды) с указанием их амплитуд, частот и фаз.</p><p><strong>Спектральный анализ периодических сигналов</strong> выполняется с помощью ряда Фурье. Спектр периодического сигнала – дискретный (линейчатый): частоты кратны f₀=1/T, амплитуды гармоник определяются коэффициентами ряда Фурье.</p>`,
  full:`<p><strong>Понятие спектра сигнала:</strong> Спектр – это представление сигнала в частотной области. Он показывает, какие синусоидальные (экспоненциальные) компоненты входят в состав сигнала и с какими амплитудами и фазами.</p><p><strong>Спектральный анализ периодических сигналов:</strong> Периодический сигнал с периодом T (f₀=1/T) можно представить в виде ряда Фурье:</p><div class="formula">s(t) = Σ_{k=-∞}^{∞} C_k e^{j2πk f₀ t}</div><p>где C_k – комплексные коэффициенты: <div class="formula">C_k = \\frac{1}{T} ∫_{0}^{T} s(t) e^{-j2πk f₀ t} dt</div></p><p><strong>Амплитудный спектр:</strong> |C_k| – амплитуда k-й гармоники. <strong>Фазовый спектр:</strong> arg(C_k) – начальная фаза.</p><p><strong>Свойства:</strong> Спектр периодического сигнала – дискретный (линейчатый). Расстояние между гармониками равно f₀ = 1/T. Огибающая спектра определяется формой одного периода.</p>`,
  detailed:`<p><strong>ПОДРОБНО О СПЕКТРЕ И РЯДЕ ФУРЬЕ ДЛЯ ПЕРИОДИЧЕСКИХ СИГНАЛОВ:</strong></p>
<p><strong>📈 Понятие спектра (физический смысл):</strong> Любой сигнал можно представить как сумму синусоид разных частот. Совокупность частот, амплитуд и начальных фаз образует спектр. Спектр показывает, как энергия (или мощность) сигнала распределена по частотам.</p>
<p><strong>📊 Ряд Фурье в тригонометрической форме:</strong><br><div class="formula">s(t) = a₀ + Σ_{k=1}^{∞} [a_k cos(2πk f₀ t) + b_k sin(2πk f₀ t)]</div>где:<br>a₀ = (1/T)∫_0^T s(t) dt – постоянная составляющая,<br>a_k = (2/T)∫_0^T s(t) cos(2πk f₀ t) dt,<br>b_k = (2/T)∫_0^T s(t) sin(2πk f₀ t) dt.<br>Амплитуда k-й гармоники: A_k = √(a_k² + b_k²), начальная фаза: φ_k = -arctg(b_k/a_k).</p>
<p><strong>📊 Ряд Фурье в комплексной форме:</strong><br><div class="formula">s(t) = Σ_{k=-∞}^{∞} C_k e^{j2πk f₀ t}</div><div class="formula">C_k = \\frac{1}{T} ∫_{0}^{T} s(t) e^{-j2πk f₀ t} dt = \\frac{1}{2}(a_k - jb_k) для k>0, C_{-k}=C_k*</div>Амплитудный спектр |C_k| – чётная функция k, фазовый спектр arg(C_k) – нечётная.</p>
<p><strong>📌 Пример: спектр меандра (прямоугольные импульсы со скважностью 2, амплитуда A, период T).</strong><br>a₀ = 0 (нет постоянной составляющей), a_k = 0 для чётных k, a_k = 2A/(πk) для нечётных k, b_k = 0. Ряд: s(t) = Σ_{m=0}^{∞} (2A/(π(2m+1)))·cos(2π(2m+1)f₀ t).<br>Амплитудный спектр: |C_k| = A/(π|k|) для нечётных k, 0 для чётных.</p>
<div class="svg-container"><svg width="500" height="150" viewBox="0 0 500 150"><line x1="50" y1="130" x2="450" y2="130" stroke="#333"/><line x1="50" y1="20" x2="50" y2="140" stroke="#333"/><line x1="80" y1="130" x2="80" y2="60" stroke="#0077b6" stroke-width="3"/><text x="80" y="145" font-size="10" text-anchor="middle">f₀</text><line x1="130" y1="130" x2="130" y2="90" stroke="#0077b6" stroke-width="3"/><text x="130" y="145" font-size="10" text-anchor="middle">3f₀</text><line x1="180" y1="130" x2="180" y2="50" stroke="#0077b6" stroke-width="3"/><text x="180" y="145" font-size="10" text-anchor="middle">5f₀</text><line x1="230" y1="130" x2="230" y2="100" stroke="#0077b6" stroke-width="3"/><text x="230" y="145" font-size="10" text-anchor="middle">7f₀</text><text x="250" y="30" font-size="12" fill="#0077b6" text-anchor="middle">Амплитудный спектр меандра (только нечётные гармоники)</text></svg></div>
<p><strong>📌 Пример: спектр последовательности прямоугольных импульсов с длительностью τ и периодом T (скважность Q=T/τ).</strong><br>Коэффициенты C_k = (Aτ/T)·sinc(πkτ/T) = (A/Q)·sinc(πk/Q). Огибающая спектра – функция sinc. Нули огибающей при k = m·Q, m=±1,±2,…<br>При Q=2 (меандр) нули при чётных k, что подтверждает предыдущий пример.</p>
<p><strong>🔧 Применение спектрального анализа периодических сигналов:</strong><br>• Расчёт гармоник в сетях электропитания (качество электроэнергии).<br>• Анализ искажений в усилителях (коэффициент нелинейных искажений).<br>• Синтез сигналов с заданным спектром (например, тестовые сигналы).<br>• В системах связи – анализ взаимных помех между разными несущими.</p>
<p><strong>⚡ Теорема Парсеваля для периодических сигналов:</strong><br>Средняя мощность сигнала равна сумме квадратов амплитуд гармоник:<br><div class="formula">P_ср = \\frac{1}{T} ∫_0^T s²(t) dt = a₀² + \\frac{1}{2} Σ_{k=1}^{∞} (a_k² + b_k²) = Σ_{k=-∞}^{∞} |C_k|²</div></p>`
}

function escapeHtml(s){return s;}
let currentFilter='';
function render(){
    const c=document.getElementById('questionsContainer');
    const f=questionsData.filter(i=>i.q.toLowerCase().includes(currentFilter.toLowerCase())||i.short.toLowerCase().includes(currentFilter.toLowerCase())||i.full.toLowerCase().includes(currentFilter.toLowerCase())||i.detailed.toLowerCase().includes(currentFilter.toLowerCase()));
    if(!f.length){c.innerHTML='<div style="padding:32px;text-align:center;">❌ Ничего не найдено</div>';return;}
    c.innerHTML=f.map((it,idx)=>`
        <div class="question-card" data-idx="${idx}">
            <div class="question-header"><div class="q-num">${it.num}.</div><div class="q-text">${it.q}</div><div class="toggle-icon">▼</div></div>
            <div class="answer-panel"><div class="level-buttons"><button class="level-btn" data-level="short">🔹 Поверхностно</button><button class="level-btn" data-level="full">🔸 Полноценно</button><button class="level-btn" data-level="detailed">🔺 Очень подробно</button></div><div class="answer-content" id="ans-${idx}">${it.short}</div></div>
        </div>`).join('');
    document.querySelectorAll('.question-card').forEach(card=>{
        const h=card.querySelector('.question-header'),p=card.querySelector('.answer-panel');
        const i=parseInt(card.getAttribute('data-idx')),it=f[i];
        h.addEventListener('click',(e)=>{if(e.target.classList?.contains('level-btn'))return;p.classList.toggle('show');h.querySelector('.toggle-icon').textContent=p.classList.contains('show')?'▲':'▼';});
        const btns=card.querySelectorAll('.level-btn');
        btns.forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();let l=btn.getAttribute('data-level'),c=l==='short'?it.short:l==='full'?it.full:it.detailed;document.getElementById(`ans-${i}`).innerHTML=c;btns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');});if(btn.getAttribute('data-level')==='short')btn.classList.add('active');});
    });
}
document.getElementById('searchInput').addEventListener('input',e=>{currentFilter=e.target.value;render();});
render();
</script>
</body>
</html>
