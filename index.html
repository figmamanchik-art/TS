    const questionsData = [
        { num:1, q:"Схема процесса передачи информации. Понятия: система электросвязи, линия связи, канал связи. Модели: AWGN, многолучевой.",
          short:"Рисуй цепочку: инфо → сообщение → эл. сигнал → радио-сигнал → канал+помехи → прием → сообщение. Система – техника+среда, линия – кабель/эфир, канал – линия+шумы+обработка. AWGN = белый шум, многолучевой – отражения.",
          full:"Структура: источник → сообщение → кодер источника → канальный кодер → модулятор → радио сигнал → линия + помехи → демодулятор → канальный декодер → декодер источника → получатель. Система электросвязи – совокупность устройств и среды. Линия связи – физический тракт (медь, оптика, эфир). Канал связи – математическая модель: линия + фильтрация + шумы + искажения. AWGN – аддитивный белый гауссов шум (спектр N0/2). Многолучевой – импульсная характеристика сумма дельт с разными задержками.",
          detailed:"<strong>Пиздец подробно:</strong> Нарисуй от руки блоки: Источник (текст/голос) → Сообщение (последовательность символов) → Кодирование источника (сжатие без потерь / MP3) → Канальное кодирование (турбокод, LDPC – добавляем избыточность) → Модулятор (BPSK/QAM) → Формирователь радиосигнала (умножение на несущую cos(2πf₀t)) → Линия связи (эфир, кабель). Помехи: тепловой шум, импульсные, сосредоточенные. Принятый сигнал r(t)=s(t)+n(t) (AWGN) или r(t)=∑ aₖ·s(t-τₖ)+n(t) (многолучевой). Демодулятор вычисляет логарифм правдоподобия. <strong>AWGN:</strong> спектральная плотность N₀/2 Вт/Гц, автокорреляция (N₀/2)δ(τ). <strong>Многолучевой:</strong> частотно-селективные замирания, разнесение приёма (RAKE). Система электросвязи – от телефона до спутника. Линия – медная витая пара (cat5e). Канал – модель, по которой считаем BER."
        },
        { num:2, q:"Классификация видов сигналов: по виду сообщения, форме во времени, мат. представлению, случайности.",

          full:"1) Вид сообщения: речь, музыка, изображение, данные. 2) Форма во времени: аналоговый (непрерывный), дискретный (отсчеты), цифровой (квантованный). 3) Мат. представление: детерминированный (точная функция s(t)), случайный (статистическое описание). 4) Физический процесс: стационарный, нестационарный, эргодический.",
          detailed:"<strong>Очень подробно:</strong> <br> • <strong>По виду сообщения</strong> – семантический слой: человеческая речь (300–3400 Гц), музыка (20–20кГц), телевизионное изображение (6–8 МГц), пакеты данных Ethernet.<br> • <strong>По форме сигнала во временной области</strong> – аналоговый: s(t) ∈ ℝ, гладкий. Дискретный: последовательность отсчётов s[n]. Цифровой: конечное множество уровней (0/1 для двоичного).<br> • <strong>По математическому представлению</strong> – детерминированный: s(t)=A·rect(t/τ)·cos(ωt). Случайный: задаётся плотностью вероятности f(x), матожиданием m(t) и корреляционной функцией B(t₁,t₂).<br> • Пример случайного: шум приёмника n(t) с гауссовским распределением N(0, σ²). Детерминированный: sin(2π·1000t)."
        },
        { num:3, q:"Виды сигналов: узкополосные (bandpass), низкочастотные (baseband), сложные. Одномерные/многомерные. База сигнала.",
          short:"Baseband – спектр от 0 (звук). Bandpass – вокруг несущей (радиосигнал). Сложные: B=T·F>>1. База = ширина спектра × длительность.",
          full:"Baseband: спектр от 0 до F_max, используется в проводах. Bandpass: спектр сосредоточен около f₀, полоса Δf << f₀. Сложный сигнал – B = T·Δf >> 1. Одномерный – один параметр (амплитуда). Многомерный – вектор (I/Q, поляризация). База – произведение длительности на ширину спектра; определяет сложность сигнала.",
          detailed:"<strong>Детали:</strong> Baseband, например, видеоимпульс: s(t) = A·sinc(πt/τ). Спектр от 0 до ~1/τ. Bandpass: s(t)=A·sinc(πt/τ)·cos(2πf₀t) — спектр в районе f₀. Сложный (шумоподобный): БПШ (псевдослучайная последовательность), база B = T·Δf. Для GPS: B ≈ 1023 (T=1 мс, Δf≈1 МГц). <strong>База сигнала</strong> B = T·Δf. Простые сигналы B≈1 (одиночный импульс: чем короче, тем шире спектр, произведение ~1). Сложные B=100…100000. Применение: помехоустойчивость, скрытность. Многомерные: квадратурная модуляция I(t) и Q(t) — два измерения."

        { num:4, q:"Структурная схема современной системы передачи. Суть обработки в элементах.",

          full:"Источник → АЦП → кодер источника (MPEG, JPEG) → канальный кодер (турбо, LDPC) → перемежитель → модулятор (QAM, OFDM) → передатчик (усиление, фильтр) → канал связи. На приёме: усилитель → демодулятор (мягкие решения) → декодер канала (итеративный) → декодер источника → ЦАП → получатель. Каждый блок либо убирает избыточность, либо добавляет, либо преобразует сигнал для физической среды.",
          detailed:"<strong>Полная хуйня:</strong> 1) Источник – голосовой кодек (AMR, EVS) или видео (H.265). 2) Кодер источника – удаляет статистическую избыточность, снижает битрейт в 10 раз. 3) Кодер канала – вводит контролируемую избыточность (скорость кода R=1/2, 2/3...), превращает в помехоустойчивый поток. 4) Перемежитель (interleaver) – разносит биты во времени, чтобы ошибки стали независимыми. 5) Модулятор – отображает биты в символы (I/Q), формирует импульс (raised cosine). 6) Квадратурный смеситель – умножает на cos и sin, переносит на несущую. 7) Усилитель мощности – нелинейный, нужно отступать от насыщения. 8) Канал – добавляет шум, многолучевость. 9) Демодулятор – вычисляет логарифмы отношения правдоподобия (LLR). 10) Декодер канала – турбо-декодер корректирует ошибки. 11) Декодер источника – восстанавливает сигнал с потерями (для видео – блоки DCT)."
        },
        { num:5, q:"Помехи в канале: виды, классификация, узкополосная, сосредоточенная, заградительная. Помехоустойчивость.",
          short:"Источники: грозы, другие передатчики, тепловой шум. Узкополосная – Δf<<Δf_с, сосредоточенная – синус на одной частоте, заградительная – перекрывает всю полосу сигнала. Помехоустойчивость: кодирование, расширение спектра, фильтрация.",
          full:"Классификация по спектру: узкополосные (пик на спектре), широкополосные (AWGN). По длительности: импульсные, непрерывные. Узкополосная помеха: например, синусоидальный сигнал от соседнего передатчика в полосе канала. Сосредоточенная – частный случай узкополосной, часто синусоидальная. Заградительная – намеренное создание помехи в полосе сигнала (РЭБ). Помехоустойчивость: методы – канальное кодирование, ARQ, разнесение, адаптивная фильтрация.",
          detailed:"<strong>Очень подробно:</strong> <br> • <strong>Узкополосная</strong>: Δf_помехи ≤ 0.1·Δf_сигнала. Пример: гармоника от DC-DC преобразователя на частоте 100.001 МГц при сигнале 100 МГц ± 100 кГц. Временная область – почти синус. Подавляется режекторным фильтром.<br> • <strong>Сосредоточенная (CW)</strong>: отдельная спектральная линия. Математически: I(t)=A·cos(2πf_п t+φ). В CDMA такие помехи давят фильтром-гребёнкой.<br> • <strong>Заградительная</strong>: ставят генератор шума с полосой, равной полосе сигнала (например, 20 МГц). Применяется в военных целях. <br> • <strong>Повышение помехоустойчивости:</strong> 1) коды LDPC дают выигрыш до 10 дБ. 2) Расширение спектра (DSSS) – выигрыш обработки G = T_b/T_c. 3) Пространственная фильтрация (антенные решётки) – направляем ноль на источник помехи. 4) Перемежение + свёрточные коды. 5) OFDM с отключением зашумлённых поднесущих."
        },
        { num:6, q:"Примеры мат. представления. Аналоговый и дискретный гармонический сигнал. Детерминированные vs случайные.",
          short:"Аналоговый: s(t)=A·cos(2πft+φ). Дискретный: s[n]=A·cos(2πfn+φ). Детерминированный – знаем точно, случайный – вероятностно.",
          full:"Аналоговый гармонический: s(t)=Acos(2πf₀t+φ). Дискретный (отсчёты через T): s[n]=Acos(2πf₀nT+φ)=Acos(2πFn+φ). Детерминированный сигнал – для любого t можно вычислить (например, sinc(t)). Случайный – задаётся распределением вероятностей: n(t) ~ N(0, σ²).",
          detailed:"<strong>Расшифровка:</strong> Аналоговый – непрерывное время и уровень. Пример: s(t)=5·cos(2π·1000·t + π/3). Дискретный по времени: s[n]=5·cos(2π·0.2·n + π/3), где n целое. Цифровой (квантованный): добавляем операцию квантования Q(s[n]). Детерминированный: можно вычислить энергию, спектр аналитически. Случайный: спектр заменяется спектральной плотностью мощности G(f). Для белого шума G(f)=N₀/2. Речь – случайный процесс, но нестационарный. Гауссовский шум – самый частый случайный сигнал."
        },
        { num:7, q:"Энергия и мощность сигналов, энергетические/мощностные сигналы. Взаимная энергия ортогональных сигналов.",
          short:"Энергия E=∫|s|²dt. Мощность P=lim 1/T∫|s|²dt. Энергетический – E конечна (импульс). Мощностной – P>0 (периодический). Ортогональные: ∫s₁s₂dt=0.",
          full:"Энергия сигнала (для L2): E=∫_{-∞}^{∞}|s(t)|²dt. Если E<∞ – сигнал энергетический (одиночный импульс). Средняя мощность P=lim_{T→∞}(1/T)∫_{-T/2}^{T/2}|s(t)|²dt. Если P конечна и >0 – сигнал мощностной (синусоида, последовательность импульсов). Взаимная энергия двух сигналов: E₁₂=∫s₁(t)s₂(t)dt. Если они ортогональны, E₁₂=0.",
          detailed:"<strong>Пиздец подробно:</strong> Для энергетического сигнала E – число. Пример: s(t)=A·rect(t/τ), E=A²τ. Для мощностного: s(t)=Acos(ωt) → P=A²/2. Класс мощности: периодические и стационарные случайные процессы. <strong>Ортогональность</strong>: на интервале [0,T] функции sin(2πk t/T) и cos(2πm t/T) ортогональны. Взаимная энергия =0 → сигналы не мешают друг другу. В CDMA используют ортогональные коды Уолша. Скалярное произведение в L₂ – основа теории связи."
        },
        { num:8, q:"Классификация способов представления сигналов. Векторное представление. Обобщённый ряд Фурье.",
          short:"Временное, спектральное, векторное. Векторное – сигнал = Σ c_k ψ_k(t). Обобщённый ряд Фурье: разложение по ортогональному базису.",
          full:"Способы: 1) временная область (s(t) осциллограмма). 2) спектральная (S(f) комплексная спектральная плотность). 3) векторное представление в ортогональном базисе: s(t)=∑_{k=1}^{N} c_k φ_k(t). Обобщённый ряд Фурье – аппроксимация сигнала суммой ортогональных функций (полиномы Лежандра, функции Уолша, синусы/косинусы). Необходимость: анализ, сжатие, передача по каналу.",

        },
        { num:9, q:"Ортогональность сигналов. Ортонормированный базис. Примеры в связи.",

          full:"Сигналы ортогональны на интервале [a,b], если ∫_a^b s_i(t)s_j(t)dt=0 при i≠j. Если при этом норма ∫s_i²dt=1 – базис ортонормированный. В OFDM поднесущие разнесены на Δf=1/T, ортогональны на длительности символа. В CDMA используют коды Уолша с нулевой взаимной корреляцией. I и Q составляющие – ортогональны (cos и sin).",

        },

        { num:31, q:"Пропускная способность. Теорема Шеннона-Хартли.",

          short:"DSSS – бит умножается на псевдослучайную последовательность (чипы), спектр расширяется. Приём – корреляция. Применение: GPS, CDMA, Wi-Fi 802.11b.",
          full:"DSSS: исходный поток битов с длительностью T_b умножается на ПСП с длительностью чипа T_c, T_b = N·T_c, N – коэффициент расширения. Передаваемый сигнал – широкополосный, похож на шум. При приёме корреляция с той же ПСП сжимает спектр, помехи расширяются (выигрыш обработки G = T_b/T_c). Достоинства: помехоустойчивость, скрытность, способность работать с отрицательным SNR, кодовое разделение. Недостатки: требуется синхронизация по чипам. Применение: GPS (C/A код 1023 чипа), 3G CDMA2000, WCDMA, Wi-Fi 802.11b (11 Мчип/с).",
          detailed:"<strong>Пример:</strong> в GPS сигнал на 20 дБ ниже шума. Коррелятор накапливает за 1 мс, получая пик. DSSS лежит в основе CDMA: разные пользователи используют разные ПСП с малой взаимной корреляцией. Выигрыш обработки = 10·log₁₀(N). Для GPS N=1023 → 30 дБ."
        }
    ];

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    let currentFilter = '';

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        let filtered = questionsData.filter(item => 
            item.q.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.short.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.full.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.detailed.toLowerCase().includes(currentFilter.toLowerCase())
        );

        if (filtered.length === 0) {
            container.innerHTML = '<div style="padding:32px;text-align:center;">❌ Ничего не найдено</div>';
            return;
        }

        container.innerHTML = filtered.map((item, idx) => {
            return `
            <div class="question-card" data-idx="${idx}" data-num="${item.num}">
                <div class="question-header">
                    <div class="q-num">${item.num}.</div>
                    <div class="q-text">${escapeHtml(item.q)}</div>
                    <div class="toggle-icon">▼</div>
                </div>
                <div class="answer-panel" data-idx="${idx}">
                    <div class="level-buttons">
                        <button class="level-btn" data-level="short">🔹 Поверхностно</button>
                        <button class="level-btn" data-level="full">🔸 Полноценно</button>
                        <button class="level-btn" data-level="detailed">🔺 Очень подробно (формулы, мат)</button>
                    </div>
                    <div class="answer-content" id="answer-${idx}">
                        ${escapeHtml(item.short)}
                    </div>
                </div>
            </div>`;
        }).join('');

        // Привязываем переключение раскрытия и кнопки уровней
        document.querySelectorAll('.question-card').forEach(card => {
            const header = card.querySelector('.question-header');
            const panel = card.querySelector('.answer-panel');
            header.addEventListener('click', (e) => {
                if (e.target.classList && e.target.classList.contains('level-btn')) return;
                panel.classList.toggle('show');
                const icon = header.querySelector('.toggle-icon');
                if (panel.classList.contains('show')) icon.textContent = '▲';
                else icon.textContent = '▼';
            });

            // Кнопки уровней
            const btns = card.querySelectorAll('.level-btn');
            const idxAttr = card.querySelector('.answer-panel').getAttribute('data-idx');
            const idx = parseInt(idxAttr);
            const dataItem = filtered[idx];
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const level = btn.getAttribute('data-level');
                    let newContent = '';
                    if (level === 'short') newContent = dataItem.short;
                    else if (level === 'full') newContent = dataItem.full;
                    else newContent = dataItem.detailed;
                    document.getElementById(`answer-${idx}`).innerHTML = escapeHtml(newContent).replace(/\n/g, '<br>');
                    // подсветка активной кнопки (опционально)
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                // дефолтная: короткий (первая кнопка активна)
                if (btn.getAttribute('data-level') === 'short') btn.classList.add('active');
            });
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentFilter = e.target.value;
        renderQuestions();
    });

    renderQuestions();
</script>
</body>
</html>
