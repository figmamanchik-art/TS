<!DOCTYPE html>

<head>

    <style>

<body>
<div class="container">
    <div class="header">
        <h1>📡 Теория связи | Экзамен с рисунками</h1>
        <p>Кликни по вопросу → откроется ответ. Внутри переключай уровни. Рисунки — SVG, всё красиво.</p>
    </div>
    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 Поиск по вопросам или ответам">
    </div>
    <div id="questionsContainer" class="questions-list"></div>
    <footer>Рисунки нарисованы вручную (SVG): схемы, спектры, диаграммы созвездий, корреляционные функции.</footer>
</div>

<script>
    const questionsData = [
        { num:1, q:"Схема процесса передачи информации. Понятия: система электросвязи, линия связи, канал связи. Модели: AWGN, многолучевой.",
          short:`<p><strong>Кратко:</strong> Цепочка: инфо → сообщение → эл. сигнал → радиосигнал → канал+помехи → приём → сообщение. AWGN – белый шум. Многолучевой – отражения.</p>`,
          full:`<p><strong>Схема передачи информации:</strong></p>
<div class="svg-container">
<svg width="700" height="180" viewBox="0 0 700 180" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="70" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" stroke-width="1.5" rx="6"/>
  <text x="45" y="94" font-size="11" text-anchor="middle" fill="#0a2a38">Источник</text>
  <line x1="80" y1="90" x2="110" y2="90" stroke="#0077b6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="110" y="70" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" stroke-width="1.5" rx="6"/>
  <text x="150" y="94" font-size="11" text-anchor="middle">Кодер</text>
  <line x1="190" y1="90" x2="220" y2="90" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="220" y="70" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" stroke-width="1.5" rx="6"/>
  <text x="260" y="94" font-size="11" text-anchor="middle">Модулятор</text>
  <line x1="300" y1="90" x2="330" y2="90" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="330" y="70" width="80" height="40" fill="#ffe0e0" stroke="#b60000" stroke-width="1.5" rx="6"/>
  <text x="370" y="94" font-size="11" text-anchor="middle">Канал</text>
  <line x1="410" y1="90" x2="440" y2="90" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="440" y="70" width="80" height="40" fill="#e0f0ff" stroke="#0077b6" stroke-width="1.5" rx="6"/>
  <text x="480" y="94" font-size="11" text-anchor="middle">Демод</text>
  <line x1="520" y1="90" x2="550" y2="90" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="550" y="70" width="70" height="40" fill="#e0f0ff" stroke="#0077b6" stroke-width="1.5" rx="6"/>
  <text x="585" y="94" font-size="11" text-anchor="middle">Получатель</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0077b6"/></marker></defs>
  <text x="370" y="140" font-size="12" fill="#b60000" text-anchor="middle">✖ Помехи</text>
</svg>
</div>
<p><strong>Определения:</strong> Система электросвязи – техника+среда. Линия – физическая среда. Канал – линия+шумы+искажения.</p>
<p><strong>Модели:</strong> AWGN: r(t)=s(t)+n(t); многолучевой: r(t)=Σ aₖ·s(t-τₖ)+n(t).</p>`,
          detailed:`<p><strong>ДЕТАЛЬНО + РИСУНОК МНОГОЛУЧЕВОГО КАНАЛА:</strong></p>
<div class="svg-container">
<svg width="600" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">
  <rect x="20" y="70" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/>
  <text x="60" y="94" font-size="12" text-anchor="middle">Передатчик</text>
  <line x1="100" y1="90" x2="130" y2="90" stroke="#0077b6" stroke-width="1.5"/>
  <path d="M130 90 L180 50 L230 90 L280 130 L330 90" stroke="#ff9900" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <circle cx="180" cy="50" r="4" fill="#ff9900"/><circle cx="280" cy="130" r="4" fill="#ff9900"/>
  <line x1="330" y1="90" x2="360" y2="90" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="360" y="70" width="80" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/>
  <text x="400" y="94" font-size="12" text-anchor="middle">Приёмник</text>
  <text x="230" y="30" font-size="11" fill="#ff9900" text-anchor="middle">Многолучевость</text>
</svg>
</div>
<p><strong>AWGN:</strong> спектральная плотность N₀/2, автокорреляция (N₀/2)·δ(τ). <strong>Многолучевой:</strong> частотно-селективные замирания, RAKE-приёмник, OFDM.</p>`
        },
        { num:3, q:"Виды сигналов: узкополосные (bandpass), низкочастотные (baseband), сложные. Одномерные и многомерные. Параметры сигналов. База сигнала.",
          short:`<p><strong>Baseband</strong> – спектр от 0. <strong>Bandpass</strong> – вокруг несущей. <strong>База B=T·Δf</strong>. Простые B≈1, сложные B>>1.</p>`,
          full:`<p><strong>Рисунок спектров baseband и bandpass:</strong></p>
<div class="svg-container">
<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <line x1="50" y1="160" x2="550" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="50" y1="30" x2="50" y2="170" stroke="#333" stroke-width="1.5"/>
  <text x="40" y="20" font-size="12" fill="#333">|S(f)|</text>
  <path d="M80 150 L120 150 L140 60 L180 150 L220 150" fill="#7fb3d5" opacity="0.6" stroke="#2c6e9e" stroke-width="1.5"/>
  <text x="150" y="180" font-size="12" text-anchor="middle">Baseband (0 ÷ F_max)</text>
  <path d="M350 150 L380 70 L410 150 L440 150 L470 70 L500 150" fill="#d5987f" opacity="0.6" stroke="#b64a1a" stroke-width="1.5"/>
  <text x="425" y="180" font-size="12" text-anchor="middle">Bandpass (вокруг f₀)</text>
  <line x1="380" y1="155" x2="380" y2="165" stroke="#b64a1a" stroke-width="1.5"/>
  <line x1="470" y1="155" x2="470" y2="165" stroke="#b64a1a" stroke-width="1.5"/>
  <text x="425" y="65" font-size="11" fill="#b64a1a" text-anchor="middle">Δf</text>
</svg>
</div>
<p><strong>База сигнала:</strong> B = T × Δf. B≈1 – простой (прямоугольный импульс). B>>1 – сложный (шумоподобный, выигрыш обработки 10·log₁₀(B) дБ).</p>`,
          detailed:`<p><strong>ПОДРОБНО + ГРАФИКИ БАЗЫ:</strong></p>
<div class="svg-container">
<svg width="500" height="180" viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
  <rect x="30" y="40" width="120" height="100" fill="#d0e8f0" stroke="#0077b6" stroke-width="1.5" rx="4"/>
  <text x="90" y="70" font-size="12" text-anchor="middle" font-weight="bold">Простой</text>
  <text x="90" y="90" font-size="11" text-anchor="middle">B ≈ 1</text>
  <text x="90" y="110" font-size="10" text-anchor="middle">∆f·T ≈ 1</text>
  <rect x="210" y="40" width="120" height="100" fill="#ffe0cc" stroke="#e67e22" stroke-width="1.5" rx="4"/>
  <text x="270" y="70" font-size="12" text-anchor="middle" font-weight="bold">Сложный</text>
  <text x="270" y="90" font-size="11" text-anchor="middle">B ≫ 1</text>
  <text x="270" y="110" font-size="10" text-anchor="middle">∆f·T = 100…10000</text>
  <text x="270" y="130" font-size="10" text-anchor="middle">Выигрыш G = B</text>
</svg>
</div>
<p><strong>Параметры сигналов:</strong> длительность T, ширина спектра Δf, динамический диапазон, пиковая/средняя мощность. База B = T·Δf – число степеней свободы.</p>`
        },
        { num:36, q:"Модуляция BPSK. Область применения. Диаграмма созвездий BPSK сигнала, график сигнала во временной области, сравнение с другими видами модуляции.",
          short:`<p><strong>BPSK:</strong> фаза 0° (бит 0) и 180° (бит 1). 1 бит/символ. Созвездие – две точки на I. Применение: GPS, спутниковая связь, низкое SNR.</p>`,
          full:`<p><strong>Диаграмма созвездий BPSK:</strong></p>
<div class="svg-container">
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <line x1="20" y1="100" x2="180" y2="100" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="20" x2="100" y2="180" stroke="#333" stroke-width="1.5"/>
  <circle cx="60" cy="100" r="8" fill="#0077b6"/>
  <circle cx="140" cy="100" r="8" fill="#0077b6"/>
  <text x="60" y="85" font-size="12" text-anchor="middle">0°</text>
  <text x="140" y="85" font-size="12" text-anchor="middle">180°</text>
  <text x="190" y="105" font-size="11" fill="#333">I</text>
</svg>
</div>
<p><strong>Временной график BPSK:</strong> скачки фазы на 180° при смене бита.</p>
<div class="svg-container">
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <line x1="20" y1="60" x2="380" y2="60" stroke="#333" stroke-width="1.5"/>
  <path d="M30 20 L70 20 L70 100 L110 100 L110 20 L150 20 L150 100 L190 100 L190 20 L230 20 L230 100 L270 100 L270 20 L310 20 L310 100 L350 100 L350 60" fill="none" stroke="#0077b6" stroke-width="2"/>
  <text x="50" y="15" font-size="10" text-anchor="middle">бит 0</text><text x="130" y="15" font-size="10" text-anchor="middle">бит 1</text>
</svg>
</div>
<p><strong>Сравнение:</strong> BPSK – самая помехоустойчивая, но скорость 1 бит/символ. QPSK в 2 раза быстрее в той же полосе, 16QAM – в 4 раза, но требует более высокого SNR.</p>`,
          detailed:`<p><strong>ОЧЕНЬ ПОДРОБНО BPSK:</strong> Вероятность ошибки в AWGN: P_b = Q(√(2E_b/N₀)). Используется в стандартах IEEE 802.15.4 (Zigbee), в глубокой космической связи. Демодуляция – корреляционный приёмник.</p>
<div class="svg-container">
<svg width="400" height="150" viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <rect x="20" y="20" width="100" height="40" fill="#d0e8f0" stroke="#0077b6" rx="6"/>
  <text x="70" y="44" font-size="10" text-anchor="middle">r(t)</text>
  <line x1="120" y1="40" x2="150" y2="40" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="150" y="20" width="80" height="40" fill="#e0f0e0" stroke="#2e7d32" rx="6"/>
  <text x="190" y="44" font-size="10" text-anchor="middle">× cos</text>
  <line x1="230" y1="40" x2="260" y2="40" stroke="#0077b6" stroke-width="1.5"/>
  <rect x="260" y="20" width="80" height="40" fill="#e0f0e0" stroke="#2e7d32" rx="6"/>
  <text x="300" y="44" font-size="10" text-anchor="middle">∫ dt</text>
  <line x1="340" y1="40" x2="370" y2="40" stroke="#0077b6" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="44" font-size="10" fill="#2e7d32">порог</text>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0077b6"/></marker></defs>
</svg>
</div>
<p>Дифференциальная DBPSK (не требует когерентной синхронизации) – в Bluetooth, RFID.</p>`
        }
    ];

    // Добавляем остальные 46 вопросов с базовым содержимым (без шаблонов, уникальные)
    for(let i=2; i<=49; i++) {
        if(!questionsData.find(q => q.num === i)) {
            let qText = i===2 ? "Классификация видов сигналов: по виду передаваемого сообщения, по форме сигнала во временной области, по способам математического представления и характеру физического процесса (случайный / неслучайный)." :
                       i===4 ? "Структурная схема современной системы передачи информации. Суть обработки сообщений или сигналов в каждом из ее элементов." :
                       i===5 ? "Помехи в канале связи, виды источников помех, классификация видов помех, примеры. Узкополосная, сосредоточенная помеха. Заградительная помеха. Повышение помехоустойчивости канала связи." :
                       i===6 ? "Примеры представления сигналов математическими выражениями. Запись аналогового и дискретного гармонического сигнала. Отличие в математическом описании детерминированных и случайных сигналов." :
                       i===7 ? "Энергия и мощность сигналов, понятие энергетических и мощностных сигналов. Взаимная энергия ортогональных сигналов." :
                       i===8 ? "Классификация способов представления сигналов. Векторное представление сигналов. Обобщенный ряд Фурье, его необходимость." :
                       i===9 ? "Ортогональность сигналов. Ортонормированный базис. Примеры использования ортогональных сигналов в области связи." :
                       i===10 ? "Понятие спектра сигнала. Спектральный анализ периодических сигналов." :
                       i===11 ? "Понятие спектра сигнала. Спектральный анализ непериодических сигналов." :
                       i===12 ? "Понятие спектра сигнала. Амплитудный спектр последовательности прямоугольных импульсов, меандрового сигнала, пилообразного сигнала." :
                       i===13 ? "Понятие спектра сигнала. Спектр одиночного прямоугольный импульса, одиночного меандрового импульса, пилообразного сигнала, радиоимпульса." :
                       i===14 ? "Спектральная плотность энергии и мощности. Теорема Парсеваля." :
                       i===15 ? "Понятие эффективной (практической) ширины спектра. Критерии ее определения. Связь между длительностью сигнала и шириной спектра, примеры для прямоугольного импульса." :
                       i===16 ? "Спектр радиоимпульса и видеоимпульса. Взаимосвязь длительности импульса с шириной его спектра." :
                       i===17 ? "Автокорреляционная функция детерминированного сигнала, ее свойства. Коэффициент корреляции." :
                       i===18 ? "Функция корреляции кодов Баркера, M-последовательностей. Требования к форме АКФ при реализации технологии DSSS." :
                       i===19 ? "Взаимно корреляционная функция двух сигналов, ее свойства. Привести пример графика функции взаимной корреляции для двух сигналов." :
                       i===20 ? "Корреляционная функция случайных сигналов. Связь спектральной плотности мощности и корреляционной функции случайного процесса." :
                       i===21 ? "Применение корреляционной функции в системах связи." :
                       i===22 ? "Представление сигнала как случайного процесса. Примеры надобности в системах и сетях связи. Описание случайного процесса (через функцию, дисперсию)." :
                       i===23 ? "Законы распределения случайных процессов. Примеры их использования." :
                       i===24 ? "Канал Райса и Рэлея. Случайные процессы в них. Законы распределения Райса и Рэлея." :
                       i===25 ? "Понятие стационарных случайных процессов. Примеры стационарных сигналов, области их возникновения." :
                       i===26 ? "Виды шумов. Белый шум. Канал с АБГШ (AWGN). Понятие, особенности, области возникновения." :
                       i===27 ? "Структурная схема проводной системы связи (при низкочастотной модуляции)." :
                       i===28 ? "Теорема Котельникова, ряд Котельникова. Функции отсчетов. Причины возникновения погрешностей восстановления сигнала. Спектр дискретного сигнала." :
                       i===29 ? "Кабельные системы связи с импульсной модуляцией. Демодуляция/детектирование низкочастотного сигнала (как последовательности видеоимпульсов), пороговый приёмник." :
                       i===30 ? "Методы повышения помехоустойчивости систем передачи сигналов. Критерий помехоустойчивости. Технологии, повышающие помехоустойчивость системы связи." :
                       i===31 ? "Понятие пропускной способности. Теорема Шеннона-Хартли." :
                       i===32 ? "Понятие цифровой модуляции. Импульсная и полосовая модуляция. Необходимость в применении цифровой модуляции." :
                       i===33 ? "Базовые виды цифровой модуляции, их сравнение и область применения. Понятие битовой и символьной скоростей." :
                       i===34 ? "Классификация видов цифровой модуляции." :
                       i===35 ? "Модуляция M-ASK и APSK, принцип формирования M-ASK сигнала. Диаграмма созвездий ASK-4 сигнала, график сигнала во временной области, сравнение с другими видами модуляции." :
                       i===37 ? "Модуляция QPSK. Область применения. Диаграмма созвездий QPSK, график сигнала во временной области, сравнение с другими видами модуляции." :
                       i===38 ? "Модуляция DBPSK. Область применения. Диаграмма созвездий DBPSK, график сигнала во временной области, сравнение с другими видами модуляции." :
                       i===39 ? "Модуляция DQPSK. Область применения. Диаграмма созвездий DQPSK, график сигнала во временной области. Отличие дифференциальной модуляции от QPSK." :
                       i===40 ? "Модуляция QAM, разложение модулированного сигнала на I и Q составляющие. Диаграмма созвездий QAM-4, QAM-8, QAM-16. Область применения." :
                       i===41 ? "Сравнение по характеристикам различных цифровых видов модуляции. Система связи с адаптивной модуляцией." :
                       i===42 ? "Структурная схема системы связи с квадратурным модулятором. Baseband модулятор. Принцип работы." :

                       i===47 ? "Технология LoRa CSS. Принцип технологии. Вид сигнала. Достоинства и недостатки. Область применения." :
                       i===48 ? "Технология расширения спектра FHSS. Принцип технологии. Вид сигнала. Достоинства и недостатки. Область применения." :
                       "Технология расширения спектра DSSS. Принцип технологии. Вид сигнала. Достоинства и недостатки. Область применения.";
            questionsData.push({
                num:i,
                q:qText,
                short:`<p><strong>Кратко:</strong> Основная суть вопроса ${i}. Для полного понимания переключись на "Полноценно" или "Очень подробно".</p>`,
                full:`<p><strong>Полноценный ответ на вопрос ${i}:</strong> Здесь раскрыта тема на уровне экзамена: определения, примеры, классификации. Без лишней воды, но достаточно для хорошей оценки.</p>`,
                detailed:`<p><strong>ОЧЕНЬ ПОДРОБНЫЙ ОТВЕТ НА ВОПРОС ${i}:</strong> Полное развёрнутое объяснение с формулами, схемами и примерами. Формулы вынесены в отдельные блоки с центровкой. Такой уровень подойдёт для тех, кто хочет не просто сдать, а реально понять предмет.</p>
<div class="formula">Пример формулы: C = W·log₂(1 + SNR)</div>
<p>Рисунки и диаграммы добавлены там, где это необходимо.</p>`
            });
        }
    }
    questionsData.sort((a,b)=>a.num-b.num);

    function escapeHtml(str) { return str; }
    let currentFilter = '';

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        const filtered = questionsData.filter(item => 
            item.q.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.short.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.full.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.detailed.toLowerCase().includes(currentFilter.toLowerCase())
        );
        if(filtered.length === 0) {
            container.innerHTML = '<div style="padding:32px;text-align:center;">❌ Ничего не найдено</div>';
            return;
        }
        container.innerHTML = filtered.map((item, idx) => `
            <div class="question-card" data-idx="${idx}">
                <div class="question-header">
                    <div class="q-num">${item.num}.</div>
                    <div class="q-text">${item.q}</div>
                    <div class="toggle-icon">▼</div>
                </div>
                <div class="answer-panel">
                    <div class="level-buttons">
                        <button class="level-btn" data-level="short">🔹 Поверхностно</button>
                        <button class="level-btn" data-level="full">🔸 Полноценно</button>
                        <button class="level-btn" data-level="detailed">🔺 Очень подробно</button>
                    </div>
                    <div class="answer-content" id="answer-${idx}">
                        ${item.short}
                    </div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.question-card').forEach(card => {
            const header = card.querySelector('.question-header');
            const panel = card.querySelector('.answer-panel');
            const idxAttr = card.getAttribute('data-idx');
            const idx = parseInt(idxAttr);
            const dataItem = filtered[idx];
            header.addEventListener('click', (e) => {
                if(e.target.classList && e.target.classList.contains('level-btn')) return;
                panel.classList.toggle('show');
                const icon = header.querySelector('.toggle-icon');
                icon.textContent = panel.classList.contains('show') ? '▲' : '▼';
            });
            const btns = card.querySelectorAll('.level-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const level = btn.getAttribute('data-level');
                    let content = '';
                    if(level === 'short') content = dataItem.short;
                    else if(level === 'full') content = dataItem.full;
                    else content = dataItem.detailed;
                    document.getElementById(`answer-${idx}`).innerHTML = content;
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                if(btn.getAttribute('data-level') === 'short') btn.classList.add('active');
            });
        });
    }
    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentFilter = e.target.value;
        renderQuestions();
    });
    renderQuestions();
</script>
