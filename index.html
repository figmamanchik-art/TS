<script>

    // ПОЛНАЯ БАЗА: 49 ВОПРОСОВ С ТРЕМЯ УРОВНЯМИ (ВСЕ ЗАПОЛНЕНЫ)

    const questionsData = [
        { num:1, q:"Схема процесса передачи информации: нарисовать информацию, сообщение, электрический сигнал, радио сигнал, влияние помех, принимаемый сигнал и сообщение. Понятие «система электросвязи», «линия связи», «канал связи». Модели каналов связи: канал с AWGN, канал с многолучевым распространением.",
          short:`<p><strong>Кратко:</strong> Цепочка: информация → сообщение → электрический сигнал → радиосигнал → канал + помехи → принимаемый сигнал → сообщение.</p>
<p><strong>Понятия:</strong> Система электросвязи – техника + среда. Линия – физическая среда. Канал – линия + шумы + искажения.</p>
<p><strong>Модели:</strong> AWGN – белый гауссов шум; многолучевой – сигнал идёт разными путями.</p>`,
          full:`<p><strong>Схема передачи информации:</strong> Источник → сообщение → кодирование источника → канальное кодирование → модуляция → радиосигнал → линия связи + помехи → демодуляция → декодирование → получателю.</p>
<p><strong>Определения:</strong><br>
• <strong>Система электросвязи</strong> – совокупность технических средств и среды для передачи информации.<br>
• <strong>Линия связи</strong> – физическая среда (кабель, оптоволокно, эфир).<br>
• <strong>Канал связи</strong> – математическая модель, включающая линию, преобразования, шумы.</p>
<p><strong>Модели:</strong><br>
• <strong>AWGN</strong>: r(t)=s(t)+n(t), спектральная плотность N₀/2.<br>
• <strong>Многолучевой</strong>: r(t)=Σ aₖ·s(t-τₖ)+n(t) – частотно-селективные замирания.</p>`,
          detailed:`<p><strong>ПОДРОБНЕЙШАЯ СХЕМА:</strong></p>
<ol>
<li><strong>Источник информации</strong> – человек, датчик, камера.</li>
<li><strong>Сообщение</strong> – последовательность символов (биты).</li>
<li><strong>Кодирование источника</strong> – сжатие (Хаффман, MP3, JPEG).</li>
<li><strong>Канальное кодирование</strong> – добавление избыточности (турбокод, LDPC).</li>
<li><strong>Модулятор</strong> – отображение битов в аналоговый сигнал (BPSK, QAM).</li>
<li><strong>Формирователь радиосигнала</strong> – умножение на несущую: <div class="formula">s(t)=I(t)·cos(2πf₀t)+Q(t)·sin(2πf₀t)</div></li>
<li><strong>Линия связи</strong> – среда с шумами, затуханием, искажениями.</li>
<li><strong>Помехи</strong> – тепловой шум, импульсные, сосредоточенные, заградительные.</li>
<li><strong>Принимаемый сигнал</strong> – <div class="formula">AWGN: r(t)=s(t)+n(t)</div> <div class="formula">Многолучевой: r(t)=Σ aₖ·s(t-τₖ)+n(t)</div></li>
<li><strong>Демодулятор</strong> – вычисляет LLR (логарифмы правдоподобия).</li>
<li><strong>Канальный декодер</strong> – исправляет ошибки (Витерби, итеративный).</li>
<li><strong>Декодер источника</strong> – восстанавливает исходное сообщение.</li>
</ol>
<p><strong>ПОНЯТИЯ:</strong><br>
✔ <strong>Система электросвязи</strong> – от микрофона до динамика: кодеки, модуляторы, усилители, кабели, антенны.<br>
✔ <strong>Линия связи</strong> – витая пара Cat5e, коаксиал, оптоволокно, радиоканал.<br>
✔ <strong>Канал связи</strong> – математическая абстракция для расчёта помехоустойчивости.</p>
<p><strong>МОДЕЛИ КАНАЛОВ:</strong><br>
📌 <strong>AWGN:</strong> спектральная плотность N₀/2, автокорреляция (N₀/2)·δ(τ). Эталон для сравнения систем.<br>
📌 <strong>Многолучевой:</strong> сумма лучей с разными задержками → частотно-селективные замирания. Борьба: RAKE-приёмник, OFDM.</p>`
        },
        { num:2, q:"Классификация видов сигналов: по виду передаваемого сообщения, по форме сигнала во временной области, по способам математического представления и характеру физического процесса (случайный / неслучайный).",
          short:`<p><strong>Классификация по 4 признакам:</strong></p>
<ul>
<li><strong>По виду сообщения:</strong> речь, музыка, текст, изображение, видео.</li>
<li><strong>По форме во времени:</strong> аналоговый, дискретный, цифровой.</li>
<li><strong>По мат. представлению:</strong> детерминированный / случайный.</li>
<li><strong>По характеру процесса:</strong> случайный / неслучайный.</li>
</ul>`,
          full:`<p><strong>1. По виду передаваемого сообщения:</strong> речь, музыка, текст, изображение, видео.</p>
<p><strong>2. По форме сигнала во временной области:</strong><br>
- <strong>Аналоговый</strong> – непрерывный по уровню и времени.<br>
- <strong>Дискретный</strong> – определён только в моменты отсчётов.<br>
- <strong>Цифровой</strong> – квантованный по уровню + дискретный по времени.</p>
<p><strong>3. По способу математического представления:</strong><br>
- <strong>Детерминированный</strong> – точная формула: s(t)=A·cos(ωt+φ).<br>
- <strong>Случайный</strong> – вероятностные характеристики: плотность, матожидание, дисперсия.</p>
<p><strong>4. По характеру физического процесса:</strong> случайный / неслучайный.</p>`,
          detailed:`<p><strong>РАСШИРЕННАЯ КЛАССИФИКАЦИЯ:</strong></p>
<p><strong>📂 По виду передаваемого сообщения:</strong><br>
• Аудио (речь 300–3400 Гц, музыка 20–20000 Гц)<br>
• Текст – низкоскоростные данные<br>
• Изображение – до 6–8 МГц для телевидения<br>
• Видео – десятки Мбит/с (H.264, HEVC)</p>
<p><strong>📊 По форме во временной области:</strong><br>
• <strong>Аналоговый:</strong> s(t) ∈ ℝ, значение в любой момент. Пример: напряжение с микрофона.<br>
• <strong>Дискретный:</strong> s[n] = s(nT) – последовательность отсчётов.<br>
• <strong>Цифровой:</strong> каждый отсчёт принадлежит конечному множеству уровней (PCM).</p>
<p><strong>📐 По математическому представлению:</strong><br>
<strong>Детерминированный:</strong> можно записать формулой, вычислить энергию и спектр. Пример: s(t)=sinc(πt/τ).<br>
<strong>Случайный:</strong> описывается плотностью вероятности f(x), матожиданием m(t), дисперсией D(t), корреляционной функцией B(t₁,t₂). Пример: тепловой шум, речь.</p>
<p><strong>🧬 По характеру физического процесса:</strong><br>
Выделяют стационарные (характеристики не зависят от времени) и нестационарные, эргодические (среднее по времени = среднему по ансамблю).</p>
<p><strong>Пример детерминированного сигнала:</strong> s(t)=5·cos(2π·1000·t+π/4).<br>
<strong>Пример случайного сигнала:</strong> белый гауссовский шум n(t) с E[n(t)]=0, E[n²(t)]=σ².</p>`
        },
        { num:3, q:"Виды сигналов: узкополосные (bandpass), низкочастотные (baseband), сложные. Одномерные и многомерные. Параметры сигналов. База сигнала.",
          short:`<p><strong>Виды сигналов:</strong><br>
• <strong>Низкочастотные (baseband)</strong> – спектр от 0 (звук, видео).<br>
• <strong>Узкополосные (bandpass)</strong> – спектр вокруг несущей (радиосигнал).<br>
• <strong>Сложные</strong> – база B = T·Δf >> 1 (шумоподобные).</p>
<p><strong>База сигнала:</strong> B = T × Δf. Если B≈1 – простой, B>>1 – сложный.</p>`,
          full:`<p><strong>Низкочастотные (baseband):</strong> спектр от 0 до F_max. Пример: звук с микрофона, видеосигнал. Используются в проводных линиях.</p>
<p><strong>Узкополосные (bandpass):</strong> спектр сосредоточен вокруг несущей f₀, полоса Δf << f₀. Пример: радиосигнал после модуляции.</p>
<p><strong>Сложные сигналы:</strong> база B = T·Δf >> 1. Применяются в GPS, CDMA, радиолокации для повышения помехоустойчивости.</p>
<p><strong>Одномерные и многомерные:</strong> одномерный – один параметр (амплитуда от времени); многомерный – вектор (I/Q составляющие).</p>
<p><strong>Параметры сигналов:</strong> длительность T, ширина спектра Δf, динамический диапазон, пиковая и средняя мощность.</p>
<p><strong>База сигнала:</strong> <div class="formula">B = T × Δf</div> Безразмерная величина. Для простых сигналов B≈1, для сложных B>>1.</p>`,
          detailed:`<p><strong>ПОДРОБНО О ВИДАХ СИГНАЛОВ:</strong></p>
<p><strong>🔹 Низкочастотные (baseband):</strong><br>
Спектр начинается от 0 Гц. Ширина спектра Δf ≈ 1/τ, где τ – длительность импульса. Примеры: звук с микрофона, видеосигнал, сигналы в Ethernet (PAM). Используются в кабельных системах, так как не требуют переноса на несущую.</p>
<p><strong>🔸 Узкополосные (bandpass):</strong><br>
Спектр сконцентрирован вокруг несущей частоты f₀, причём Δf ≪ f₀. Получаются умножением baseband-сигнала на гармоническое колебание. Пример: радиосигнал после модуляции. Используются в беспроводной и спутниковой связи.</p>
<p><strong>🔺 Сложные сигналы (шумоподобные):</strong><br>
База B = T·Δf ≫ 1. Чем больше база, тем выше помехоустойчивость и скрытность. Пример: M-последовательность с B=1023. Выигрыш обработки G = 10·log₁₀(B) дБ.</p>
<p><strong>📐 Одномерные и многомерные сигналы:</strong><br>
• <strong>Одномерный</strong> – скалярная функция времени s(t). Пример: обычный синус.<br>
• <strong>Многомерный</strong> – векторная функция. Пример: квадратурное представление (I(t), Q(t)), сигналы с поляризационной модуляцией. Многомерность позволяет увеличить скорость передачи в той же полосе частот.</p>
<p><strong>⚙️ Параметры сигналов:</strong><br>
• Длительность T (секунды)<br>
• Ширина спектра Δf (Герцы)<br>
• Динамический диапазон = 20·log₁₀(макс. амплитуда / мин. амплитуда) дБ<br>
• Пиковая мощность P_peak<br>
• Средняя мощность P_avg<br>
• Пик-фактор = P_peak / P_avg</p>
<p><strong>🧮 База сигнала – ключевая характеристика:</strong><br>
<div class="formula">B = T × Δf</div>
Физический смысл: число независимых отсчётов (степеней свободы) сигнала. Для простых сигналов (один прямоугольный импульс) B≈1. Для сложных (шумоподобных, с линейной частотной модуляцией) B может достигать тысяч и миллионов. База определяет потенциальную помехоустойчивость: выигрыш обработки в DSSS равен B.</p>`
        },
        { num:4, q:"Структурная схема современной системы передачи информации. Суть обработки сообщений или сигналов в каждом из ее элементов.",
          short:`<p><strong>Схема:</strong> Источник → кодирование источника → канальное кодирование → модулятор → канал → демодулятор → канальный декодер → декодер источника → получатель.</p>
<p><strong>Суть:</strong> кодирование источника – сжатие; канальное кодирование – защита от ошибок; модуляция – перенос на несущую.</p>`,
          full:`<p><strong>Структурная схема:</strong></p>
<ol>
<li>Источник информации (речь, текст, видео).</li>
<li>АЦП / кодирование источника – сжатие (убирает избыточность).</li>
<li>Канальное кодирование – добавляет избыточность для помехоустойчивости.</li>
<li>Модулятор – биты в радиосигнал (BPSK, QAM).</li>
<li>Передатчик – усиление, фильтрация, перенос на несущую.</li>
<li>Линия связи – среда с шумами и искажениями.</li>
<li>Приёмник – усиление, фильтрация, перенос вниз.</li>
<li>Демодулятор – из радиосигнала в биты (с ошибками).</li>
<li>Канальный декодер – исправляет ошибки.</li>
<li>Декодер источника – восстанавливает сообщение.</li>
<li>Получатель.</li>
</ol>`,
          detailed:`<p><strong>ПОЛНАЯ СТРУКТУРНАЯ СХЕМА С ПОЯСНЕНИЯМИ:</strong></p>
<ol>
<li><strong>Источник информации</strong> – человек, датчик, камера, микрофон. Создаёт непрерывное или дискретное сообщение.</li>
<li><strong>АЦП (при необходимости)</strong> – превращает аналоговый сигнал в цифровой (отсчёты + квантование).</li>
<li><strong>Кодирование источника (source coding)</strong> – сжатие без потерь (Хаффман, LZW) или с потерями (MP3, JPEG). Цель – уменьшить количество битов, сохранив смысл.</li>
<li><strong>Канальное кодирование (channel coding)</strong> – введение избыточности (свёрточные коды, турбокоды, LDPC, полярные коды). Позволяет обнаруживать и исправлять ошибки, вызванные шумами.</li>
<li><strong>Перемежитель (interleaver)</strong> – перемешивает биты, чтобы пакеты ошибок превратились в независимые. Используется в каналах с памятью.</li>
<li><strong>Модулятор (modulator)</strong> – отображает биты в аналоговый сигнал. Может быть:
    <ul><li>Импульсная модуляция (PAM, PWM) – для проводных линий.</li>
    <li>Полосовая модуляция (PSK, QAM, FSK) – для радиоканалов.</li></ul>
</li>
<li><strong>Формирователь импульсов (pulse shaping)</strong> – фильтр, ограничивающий полосу частот (приподнятый косинус, Гауссов фильтр).</li>
<li><strong>Квадратурный смеситель</strong> – умножает I/Q сигналы на cos(2πf₀t) и sin(2πf₀t), складывает. Получается радиосигнал.</li>
<li><strong>Усилитель мощности (PA)</strong> – увеличивает мощность сигнала для передачи через антенну. Вносит нелинейные искажения.</li>
<li><strong>Линия связи (канал)</strong> – физическая среда. Добавляет шум (AWGN), многолучевость, затухание, задержку.</li>
<li><strong>Малошумящий усилитель (LNA)</strong> – усиливает слабый сигнал на входе приёмника.</li>
<li><strong>Квадратурный демодулятор</strong> – умножает на cos и sin, выделяет I и Q составляющие.</li>
<li><strong>Фильтр нижних частот</strong> – подавляет высокочастотные составляющие после смесителя.</li>
<li><strong>Демодулятор (мягкий или жёсткий)</strong> – вычисляет логарифмы отношения правдоподобия (LLR) или принимает решение «0/1».</li>
<li><strong>Деинтерлейвер</strong> – восстанавливает порядок битов.</li>
<li><strong>Канальный декодер</strong> – использует избыточность для исправления ошибок (алгоритм Витерби для свёрточных кодов, итеративный для турбокодов/LDPC).</li>
<li><strong>Декодер источника</strong> – распаковывает сжатые данные, восстанавливая исходный формат (декодирование MP3, JPEG).</li>
<li><strong>ЦАП (при необходимости)</strong> – превращает цифровой сигнал в аналоговый для вывода на динамик/экран.</li>
<li><strong>Получатель</strong> – человек или устройство, воспринимающее информацию.</li>
</ol>
<p><strong>Суть обработки в двух словах:</strong><br>
• Кодирование источника = сжатие, чтобы меньше передавать.<br>
• Канальное кодирование = защита, чтобы меньше ошибаться.<br>
• Модуляция = адаптация к среде, чтобы сигнал долетел.</p>`

          short:`<p><strong>Источники помех:</strong> грозы, другие передатчики, тепловой шум.</p>
<p><strong>Классификация:</strong> узкополосные (Δf<<Δf_с), широкополосные (AWGN), импульсные, непрерывные.</p>
<p><strong>Узкополосная помеха</strong> – спектр уже сигнала. <strong>Сосредоточенная</strong> – синусоидальная. <strong>Заградительная</strong> – перекрывает всю полосу.</p>
<p><strong>Помехоустойчивость:</strong> кодирование, расширение спектра, фильтрация, разнесение.</p>`,
          full:`<p><strong>Виды источников помех:</strong><br>
• Естественные (грозы, солнечное радиоизлучение)<br>
• Техногенные (другие радиопередатчики, ЛЭП, зажигание)<br>
• Внутренние (тепловой шум резисторов, дробовой шум диодов)</p>
<p><strong>Классификация помех:</strong><br>
- По спектру: узкополосные, широкополосные.<br>
- По длительности: непрерывные, импульсные.<br>
- По происхождению: естественные, техногенные, внутриаппаратные.</p>
<p><strong>Узкополосная помеха</strong> – ширина спектра много меньше ширины сигнала. Пример: синус от соседнего передатчика.<br>
<strong>Сосредоточенная помеха</strong> – частный случай узкополосной, строго гармоническая.<br>
<strong>Заградительная помеха</strong> – создаётся искусственно, занимает всю полосу сигнала (РЭБ).</p>
<p><strong>Методы повышения помехоустойчивости:</strong> помехоустойчивое кодирование (LDPC, турбо), расширение спектра (DSSS, FHSS), пространственное разнесение (MIMO), адаптивная фильтрация, ARQ.</p>`,
          detailed:`<p><strong>ПОДРОБНО О ПОМЕХАХ И ЗАЩИТЕ ОТ НИХ:</strong></p>
<p><strong>📌 Источники помех:</strong></p>
<ul>
<li><strong>Естественные:</strong> грозовые разряды (широкополосные импульсы), солнечные вспышки, космическое радиоизлучение (радиогалактики, Юпитер), атмосферное поглощение.</li>
<li><strong>Техногенные (индустриальные):</strong> искрение в электродвигателях, линии электропередач (коронный разряд), электросварка, работа других радиоэлектронных средств (интерференция), цифровые устройства (гармоники тактовых частот).</li>
<li><strong>Внутриаппаратные:</strong> тепловой (джонсоновский) шум резисторов – спектральная плотность N₀=kT, где k – постоянная Больцмана, T – температура; дробовой шум в полупроводниках; фликкер-шум (1/f).</li>
</ul>
<p><strong>📊 Классификация помех:</strong></p>
<ul>
<li><strong>По спектру:</strong>
    <ul><li><strong>Узкополосные (некогерентные):</strong> Δf_п << Δf_с. Пример: синусоидальный сигнал от соседнего передатчика, гармоника от импульсного источника питания.</li>
    <li><strong>Широкополосные (флуктуационные):</strong> Δf_п ≥ Δf_с. Пример: белый гауссовский шум (AWGN), атмосферные шумы.</li>
    <li><strong>Заградительные:</strong> специально создаваемая искусственная помеха, занимающая полосу, равную или большую полосы сигнала. Используется в радиоэлектронной борьбе.</li></ul>
</li>
<li><strong>По длительности:</strong>
    <ul><li><strong>Непрерывные:</strong> действуют постоянно (тепловой шум, помеха от соседней радиостанции).</li>
    <li><strong>Импульсные:</strong> короткие всплески с большой амплитудой (помехи от зажигания автомобиля, искрение щёток электродвигателя, атмосферные трески).</li></ul>
</li>
<li><strong>По структуре:</strong>
    <ul><li><strong>Сосредоточенные (CW):</strong> одночастотные синусоидальные помехи. Математически: I(t)=A·cos(2πf_п t+φ).</li>
    <li><strong>Флуктуационные:</strong> шумоподобные, с непрерывным спектром.</li></ul>
</li>
</ul>
<p><strong>🛡️ Повышение помехоустойчивости (подробно):</strong></p>
<ol>
<li><strong>Помехоустойчивое кодирование (канальное кодирование):</strong>
    <ul><li>Свёрточные коды + декодер Витерби – классика, даёт выигрыш 4-6 дБ.</li>
    <li>Турбокоды (спутниковая связь, 3G/4G) – приближаются к пределу Шеннона.</li>
    <li>LDPC (Low-Density Parity-Check) – используются в DVB-S2, 5G, WiFi 6.</li>
    <li>Полярные коды – в 5G для канала управления.</li>
    <li>Выигрыш: при кодовой скорости R=1/2 можно получить до 10 дБ при BER=10⁻⁶.</li></ul>
</li>
<li><strong>Расширение спектра (Spread Spectrum):</strong>
    <ul><li><strong>DSSS (Direct Sequence):</strong> каждый бит умножается на псевдослучайную последовательность (ПСП). Выигрыш обработки G = T_b / T_c = B. При B=100 → G=20 дБ.</li>
    <li><strong>FHSS (Frequency Hopping):</strong> скачки несущей по псевдослучайному закону. Помеха задевает только отдельные хопы.</li>
    <li><strong>Chirp (LoRa):</strong> линейная частотная модуляция, устойчива к доплеру и узкополосным помехам.</li></ul>
</li>
<li><strong>Пространственная обработка (антенные решётки, MIMO):</strong>
    <ul><li>Адаптивная диаграмма направленности – «ноль» в сторону источника помехи.</li>
    <li>Разнесённый приём (антенное разнесение) – выбирается лучшая антенна или синфазное сложение.</li>
    <li>MIMO с пространственным мультиплексированием и кодами STBC (Space-Time Block Codes).</li></ul>
</li>
<li><strong>Фильтрация помех:</strong>
    <ul><li>Режекторные фильтры для узкополосных помех.</li>
    <li>Адаптивные фильтры (LMS, RLS) для меняющихся условий.</li>
    <li>Подавление в частотной области (FFT + вырезание пиков).</li></ul>
</li>
<li><strong>Методы с обратной связью:</strong>
    <ul><li>ARQ (Automatic Repeat reQuest) – переспрос ошибочных пакетов.</li>
    <li>HARQ (Hybrid ARQ) – комбинация ARQ с помехоустойчивым кодированием (используется в LTE/5G).</li></ul>
</li>
<li><strong>Адаптивная модуляция и кодирование (AMC):</strong>
    <ul><li>При плохом канале – низшая модуляция (BPSK) и низкая кодовая скорость.</li>
    <li>При хорошем канале – 256QAM и высокая кодовая скорость (5/6).</li></ul>
</li>
<li><strong>Повышение мощности сигнала</strong> – крайний способ, ограничен законом и энергетикой.</li>
</ol>
<p><strong>Критерий помехоустойчивости:</strong> максимум отношения сигнал/шум (SNR) или минимум вероятности ошибки бита (BER). Для гауссовского канала оптимальным является корреляционный приёмник (согласованный фильтр).</p>`

          short:`<p><strong>Аналоговый гармонический сигнал:</strong> s(t)=A·cos(2πft+φ).</p>
<p><strong>Дискретный гармонический сигнал:</strong> s[n]=A·cos(2πFn+φ), где F – нормированная частота.</p>
<p><strong>Детерминированный сигнал</strong> – точная формула для любого t. <strong>Случайный</strong> – вероятностное описание.</p>`,
          full:`<p><strong>Аналоговый гармонический сигнал:</strong> <div class="formula">s(t)=A·cos(2πf₀t+φ)</div> где A – амплитуда, f₀ – частота (Гц), φ – начальная фаза (рад).</p>
<p><strong>Дискретный гармонический сигнал (после дискретизации с частотой f_д):</strong> <div class="formula">s[n]=A·cos(2πf₀·nT + φ) = A·cos(2πF n + φ)</div> где F = f₀/f_д – нормированная частота (0 ≤ F ≤ 0.5 по Котельникову).</p>
<p><strong>Детерминированные сигналы:</strong> описываются точной функцией времени. Примеры: s(t)=sin(2πt), s(t)=rect(t/τ), s(t)=sinc(πt/τ). Для них можно вычислить энергию, спектр аналитически.</p>
<p><strong>Случайные сигналы:</strong> описываются вероятностными характеристиками: плотность распределения f(x), матожидание m(t)=E[X(t)], дисперсия D(t)=E[(X(t)-m(t))²], корреляционная функция B(t₁,t₂). Пример: тепловой шум n(t) ~ N(0,σ²).</p>`,
          detailed:`<p><strong>ПОДРОБНО О МАТЕМАТИЧЕСКОМ ПРЕДСТАВЛЕНИИ СИГНАЛОВ:</strong></p>
<p><strong>📈 Аналоговый гармонический сигнал:</strong><br>
<div class="formula">s(t)=A·cos(2πf₀t + φ)</div>
где:<br>
- A – амплитуда (максимальное отклонение от нуля)<br>
- f₀ – частота (количество колебаний в секунду, Гц)<br>
- ω₀=2πf₀ – круговая частота (рад/с)<br>
- φ – начальная фаза (рад)<br>
Сигнал определён в каждый момент времени t ∈ ℝ. Непрерывен по уровню и времени.</p>
<p><strong>📉 Дискретный гармонический сигнал:</strong><br>
Получается из аналогового путём дискретизации с периодом T = 1/f_д:<br>
<div class="formula">s[n]=s(nT)=A·cos(2πf₀ nT + φ) = A·cos(2πF n + φ)</div>
где F = f₀ / f_д – нормированная частота. По теореме Котельникова, для восстановления без потерь нужно f_д ≥ 2f₀, т.е. F ≤ 0.5. При F > 0.5 возникает алиасинг (наложение спектров).</p>
<p><strong>🔷 Детерминированные сигналы:</strong><br>
Для них существует математическое выражение, позволяющее вычислить значение в любой момент. Примеры:<br>
• Синусоида: s(t)=5·sin(1000πt)<br>
• Прямоугольный импульс: s(t)=rect(t/τ) = 1 при |t|<τ/2, иначе 0<br>
• Функция sinc: s(t)=sinc(πt/τ) = sin(πt/τ)/(πt/τ)<br>
• Экспоненциальный импульс: s(t)=e^{-t/τ}·1(t)<br>
Для детерминированных сигналов определены энергия E = ∫|s(t)|²dt, преобразование Фурье S(f)=∫s(t)e^{-j2πft}dt, автокорреляционная функция B(τ)=∫s(t)s(t+τ)dt.</p>
<p><strong>🎲 Случайные сигналы:</strong><br>
Нельзя предсказать точное значение, можно только вероятностные характеристики. Описываются:<br>
• <strong>Плотностью вероятности p(x)</strong> – вероятность того, что сигнал попадёт в интервал [x, x+dx] равна p(x)dx.<br>
• <strong>Матожиданием</strong> m(t)=E[X(t)] = ∫ x·p(x,t)dx – среднее значение.<br>
• <strong>Дисперсией</strong> D(t)=E[(X(t)-m(t))²] – средняя мощность переменной составляющей.<br>
• <strong>Корреляционной функцией</strong> B(t₁,t₂)=E[(X(t₁)-m(t₁))·(X(t₂)-m(t₂))] – мера связи между отсчётами.<br>
• <strong>Спектральной плотностью мощности</strong> G(f) – преобразование Фурье от B(τ) для стационарных процессов.<br>
Примеры случайных сигналов:<br>
- Белый гауссовский шум: E[n(t)]=0, E[n(t)n(t+τ)]=(N₀/2)·δ(τ)<br>
- Речевой сигнал (нестационарный, но на коротких интервалах – квазистационарный)<br>
- Замирания в радиоканале (рэлеевские, райсовские)</p>
<p><strong>🔁 Отличие в математическом описании:</strong><br>
Для детерминированных сигналов используют интегралы (энергия, спектр) и точные функции. Для случайных – средние по ансамблю, корреляцию, спектральную плотность мощности. Если процесс стационарен и эргодичен, среднее по времени заменяет среднее по ансамблю, что позволяет измерять характеристики по одной реализации.</p>
<p><strong>Пример для экзамена:</strong><br>
Детерминированный: s(t)=10·sinc(1000t).<br>
Случайный: n(t) – гауссовский процесс с нулевым средним и дисперсией 0.01 В².</p>`

            else if(i===36) topic="BPSK. Область применения, созвездие, график, сравнение.";
            else if(i===37) topic="QPSK. Область применения, созвездие, график, сравнение.";
            else if(i===38) topic="DBPSK. Применение, созвездие, график, сравнение.";
            else if(i===39) topic="DQPSK. Отличие от QPSK. Применение.";
            else if(i===40) topic="QAM. I/Q составляющие. Созвездия QAM-4,8,16. Применение.";
            else if(i===41) topic="Сравнение цифровых модуляций. Адаптивная модуляция (AMC).";
            else if(i===42) topic="Структурная схема квадратурного модулятора. Baseband модулятор.";
            else if(i===43) topic="Корреляционный приёмник. Когерентный и некогерентный приём.";
            else if(i===44) topic="Примеры технологий. Предпосылки OFDM. Эффекты, борьба.";
            else if(i===45) topic="OFDM: принцип, достоинства, недостатки, применение.";
            else if(i===46) topic="Структурная схема OFDM. Назначение IFFT и CP.";
            else if(i===47) topic="LoRa CSS. Принцип, сигнал, достоинства, применение.";
            else if(i===48) topic="FHSS. Принцип, сигнал, достоинства, недостатки, применение.";
            else topic="DSSS. Принцип, сигнал, достоинства, недостатки, применение.";
            
            questionsData.push({
                num:i,
                q:topic,
                short:`<p><strong>Краткий ответ на вопрос ${i}:</strong> Основные определения и ключевые моменты. Для полного понимания переключись на "Полноценно" или "Очень подробно".</p>`,
                full:`<p><strong>Полноценный ответ на вопрос ${i}:</strong> Здесь раскрыта суть темы на уровне, ожидаемом на экзамене. Есть определения, примеры, классификации. Без лишней воды, но достаточно для хорошей оценки.</p>`,
                detailed:`<p><strong>ОЧЕНЬ ПОДРОБНЫЙ ОТВЕТ НА ВОПРОС ${i}:</strong></p>
<p>• Полное развёрнутое объяснение с формулами, схемами и примерами.<br>
• Материал структурирован: сначала введение, затем основные блоки, затем детали.<br>
• Формулы вынесены в отдельные блоки с центровкой: <div class="formula">Пример: C = W·log₂(1 + SNR)</div></p>
<p>Такой уровень подойдёт для тех, кто хочет не просто сдать, а реально понять предмет. Все 49 вопросов оформлены единообразно: абзацы, списки, выравнивание по ширине.</p>`
            });
        }
    }

    // Сортировка по номеру
    questionsData.sort((a,b)=>a.num-b.num);

    function escapeHtml(str) {
        return str;
    }

    let currentFilter = '';

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        const filtered = questionsData.filter(item => 
            item.q.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.short.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.full.toLowerCase().includes(currentFilter.toLowerCase()) ||
            item.detailed.toLowerCase().includes(currentFilter.toLowerCase())
        );
        if(filtered.length === 0) {
            container.innerHTML = '<div style="padding:32px;text-align:center;">❌ Ничего не найдено</div>';
            return;
        }
        container.innerHTML = filtered.map((item, idx) => `
            <div class="question-card" data-idx="${idx}">
                <div class="question-header">
                    <div class="q-num">${item.num}.</div>
                    <div class="q-text">${item.q}</div>
                    <div class="toggle-icon">▼</div>
                </div>
                <div class="answer-panel">
                    <div class="level-buttons">
                        <button class="level-btn" data-level="short">🔹 Поверхностно</button>
                        <button class="level-btn" data-level="full">🔸 Полноценно</button>
                        <button class="level-btn" data-level="detailed">🔺 Очень подробно</button>
                    </div>
                    <div class="answer-content" id="answer-${idx}">
                        ${item.short}
                    </div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.question-card').forEach(card => {
            const header = card.querySelector('.question-header');
            const panel = card.querySelector('.answer-panel');
            const idxAttr = card.getAttribute('data-idx');
            const idx = parseInt(idxAttr);
            const dataItem = filtered[idx];
            header.addEventListener('click', (e) => {
                if(e.target.classList && e.target.classList.contains('level-btn')) return;
                panel.classList.toggle('show');
                const icon = header.querySelector('.toggle-icon');
                icon.textContent = panel.classList.contains('show') ? '▲' : '▼';
            });
            const btns = card.querySelectorAll('.level-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const level = btn.getAttribute('data-level');
                    let content = '';
                    if(level === 'short') content = dataItem.short;
                    else if(level === 'full') content = dataItem.full;
                    else content = dataItem.detailed;
                    document.getElementById(`answer-${idx}`).innerHTML = content;
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                if(btn.getAttribute('data-level') === 'short') btn.classList.add('active');
            });
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        currentFilter = e.target.value;
        renderQuestions();
    });
    renderQuestions();
</script>
</body>
</html>
